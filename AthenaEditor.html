// ── File Preview Panel (shown in Inspector when a Navigator file is selected) ──
function FilePreviewPanel({file,uploadedFiles}){
  const [audioPlaying,setAudioPlaying]=useState(false);
  const audioRef=useRef(null);
  const cvs=useRef(null);
  const animRef=useRef(null);
  const threeRef2=useRef(null);
  const [meshInfo,setMeshInfo]=useState(null);

  // Cleanup on unmount / file change
  useEffect(()=>{
    return()=>{
      if(animRef.current) cancelAnimationFrame(animRef.current);
      if(threeRef2.current){
        threeRef2.current.renderer.dispose();
      }
      if(audioRef.current){ audioRef.current.pause(); audioRef.current=null; }
    };
  },[]);

  // 3D model preview
  useEffect(()=>{
    if(!file||file.cat!=='models') return;
    if(!cvs.current) return;
    const mount=cvs.current;
    if(animRef.current) cancelAnimationFrame(animRef.current);
    if(threeRef2.current){ threeRef2.current.renderer.dispose(); threeRef2.current=null; }

    const W=mount.clientWidth||200, H=140;
    const renderer=new THREE.WebGLRenderer({antialias:true,canvas:mount});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(W,H);
    const scene2=new THREE.Scene(); scene2.background=new THREE.Color(0x080e14);
    const camera2=new THREE.PerspectiveCamera(45,W/H,0.01,5000);
    const ambient=new THREE.AmbientLight(0xffffff,0.5); scene2.add(ambient);
    const dirL=new THREE.DirectionalLight(0xffffff,0.8); dirL.position.set(5,10,8); scene2.add(dirL);
    threeRef2.current={renderer,scene2,camera2};

    const isGltf=file.isGltf&&file.dataUrl;
    const isObj=!file.isGltf&&file.content;

    const frameModel=(mesh)=>{
      const box=new THREE.Box3().setFromObject(mesh);
      if(box.isEmpty()){camera2.position.set(0,1,3);return;}
      const center=box.getCenter(new THREE.Vector3());
      const size=box.getSize(new THREE.Vector3()).length();
      mesh.position.sub(center); // center at origin
      camera2.position.set(0,size*0.3,size*1.2);
      camera2.lookAt(0,0,0);
    };

    const getStats=(mesh)=>{
      let verts=0,tris=0,anims=0;
      mesh.traverse(ch=>{
        if(ch.isSkinnedMesh||ch.isMesh){
          const geo=ch.geometry;
          if(geo){
            verts+=geo.attributes.position?.count||0;
            tris+=geo.index?(geo.index.count/3)|0:(geo.attributes.position?.count/3)|0;
          }
        }
      });
      return{verts,tris,anims};
    };

    let spinMesh=null;
    if(isGltf){
      if(!THREE.GLTFLoader){setMeshInfo({err:'GLTFLoader unavailable'});return;}
      const loader=new THREE.GLTFLoader();
      loader.parse(
        Uint8Array.from(atob(file.dataUrl.split(',')[1]),c=>c.charCodeAt(0)).buffer,'',
        gltf=>{
          const root=gltf.scene;
          root.traverse(ch=>{if(ch.isMesh&&ch.material)[].concat(ch.material).forEach(m=>{m.side=THREE.DoubleSide;});});
          const stats=getStats(root);
          const animCount=(gltf.animations||[]).length;
          frameModel(root);
          scene2.add(root);
          spinMesh=root;
          setMeshInfo({verts:stats.verts,tris:stats.tris,anims:animCount});
        },
        err=>{setMeshInfo({err:String(err)});}
      );
    } else if(isObj){
      try{
        const mesh=buildMeshFromOBJ(file.content,null,'LINEAR');
        const stats=getStats(mesh);
        frameModel(mesh);
        scene2.add(mesh);
        spinMesh=mesh;
        setMeshInfo({verts:stats.verts,tris:stats.tris,anims:0});
      }catch(e){setMeshInfo({err:String(e)});}
    }

    let angle=0;
    const animate=()=>{
      animRef.current=requestAnimationFrame(animate);
      if(spinMesh){angle+=0.012;spinMesh.rotation.y=angle;}
      renderer.render(scene2,camera2);
    };
    animate();
    return()=>{cancelAnimationFrame(animRef.current);renderer.dispose();threeRef2.current=null;};
  },[file]);

  if(!file) return null;
  const sizeKB=file.size?Math.round(file.size/1024)+'KB':'';

  return <div style={{borderBottom:`1px solid ${T.border}`,background:T.bg0}}>
    <div style={{padding:"6px 10px",borderBottom:`1px solid ${T.border}`,display:"flex",alignItems:"center",gap:6}}>
      <span style={{color:CAT_C[file.cat]||T.text,fontSize:12}}>{CAT_I[file.cat]||'▪'}</span>
      <span style={{color:T.textHi,fontSize:11,fontWeight:700,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{file.name}</span>
      <span style={{color:T.textMuted,fontSize:9}}>{file.cat} · {sizeKB}</span>
    </div>

    {/* Texture preview */}
    {file.cat==='textures'&&file.dataUrl&&<div style={{padding:"8px 10px",textAlign:"center"}}>
      <img src={file.dataUrl} style={{maxWidth:"100%",maxHeight:120,objectFit:"contain",imageRendering:"pixelated",border:`1px solid ${T.border}`,borderRadius:2}}/>
    </div>}

    {/* Model 3D spinning preview */}
    {file.cat==='models'&&<div>
      <canvas ref={cvs} style={{width:"100%",height:140,display:"block"}}/>
      {meshInfo&&!meshInfo.err&&<div style={{padding:"4px 10px",display:"flex",gap:10,fontSize:9,color:T.textMuted}}>
        <span style={{color:T.accent}}>▲ {meshInfo.tris.toLocaleString()} tris</span>
        <span>⬡ {meshInfo.verts.toLocaleString()} verts</span>
        {meshInfo.anims>0&&<span style={{color:T.anim}}>▶ {meshInfo.anims} anim{meshInfo.anims!==1?'s':''}</span>}
      </div>}
      {meshInfo?.err&&<div style={{padding:"4px 10px",fontSize:9,color:T.err}}>{meshInfo.err}</div>}
    </div>}

    {/* Font preview — simple info panel */}
    {file.cat==='fonts'&&<div style={{padding:"8px 10px"}}>
      <div style={{color:T.textMuted,fontSize:9,marginBottom:6}}>Font file:</div>
      <div style={{padding:"8px",background:T.bg1,border:`1px solid ${T.border}`,borderRadius:2}}>
        <div style={{color:T.textHi,fontSize:12,fontWeight:700,marginBottom:6}}>{file.name}</div>
        <div style={{color:T.textMuted,fontSize:10,fontFamily:"monospace",marginBottom:2}}>The quick brown fox jumps over the lazy dog</div>
        <div style={{color:T.textMuted,fontSize:10,fontFamily:"monospace"}}>ABCDEFGHIJKLMNOPQRSTUVWXYZ 0123456789</div>
      </div>
      <div style={{color:T.textMuted,fontSize:9,marginTop:4}}>
        Browser cannot render PS2 font files directly. Preview on hardware via AthenaEnv.
      </div>
    </div>}


    {/* Sound preview */}
    {file.cat==='sounds'&&file.dataUrl&&(()=>{
      const play=()=>{
        if(audioRef.current){audioRef.current.pause();audioRef.current=null;setAudioPlaying(false);return;}
        const a=new Audio(file.dataUrl);
        a.onended=()=>{audioRef.current=null;setAudioPlaying(false);};
        audioRef.current=a; a.play(); setAudioPlaying(true);
      };
      return <div style={{padding:"8px 10px",display:"flex",alignItems:"center",gap:8}}>
        <button onClick={play} style={audioPlaying?sBtnA({padding:"4px 14px"}):sBtn({padding:"4px 14px"})}>
          {audioPlaying?'⏹ Stop':'▶ Play'}
        </button>
        <span style={{color:T.textMuted,fontSize:9}}>{file.name}</span>
      </div>;
    })()}
    {file.cat==='sounds'&&!file.dataUrl&&<div style={{padding:"8px 10px",color:T.textMuted,fontSize:9}}>
      Sound not preloaded — refresh project to enable preview.
    </div>}

    {/* Script preview */}
    {(file.cat==='scripts'||file.cat==='other')&&file.content&&
      <pre style={{margin:"6px 10px",fontSize:9,color:"#80e8a0",background:T.bg1,border:`1px solid ${T.border}`,borderRadius:2,padding:"5px 8px",overflow:"auto",maxHeight:120,whiteSpace:"pre-wrap"}}>{file.content.slice(0,600)}{file.content.length>600?'\n// …':''}
      </pre>}
  </div>;
}

function Inspector({selObj,selUI,selObjs,selIds,onUpdComp,onAddComp,onRemComp,onUpdUI,scenes,activeSceneId,onLink,onUnlink,activeScene,uploadedFiles,selFileId,width=240}){
  const bycat=cat=>uploadedFiles.filter(f=>f.cat===cat);
  const wStyle={width,borderLeft:`1px solid ${T.border}`,background:T.bg1,display:"flex",flexDirection:"column",flexShrink:0,minWidth:160};

  // ── Multi-select panel ────────────────────────────────────
  if(selIds&&selIds.length>1&&selObjs&&selObjs.length>1){
    const primObj=selObjs[selObjs.length-1];
    // All component types that are shared by every selected object
    const allKeys=['transform','model','light','camera','sound','script','animator'];
    const sharedKeys=allKeys.filter(k=>selObjs.every(o=>o.components&&o.components[k]));
    const up=(ck,fld,val)=>onUpdComp(primObj.id,ck,fld,val);
    const anyExportOff=selObjs.some(o=>o.exportEnabled===false);
    const anyCtxOff=selObjs.some(o=>o.ctxEnabled===false);
    return(
      <div style={{...wStyle}}>
        <div style={sPH()}>
          <span style={{color:T.warn}}>⬡ {selIds.length} selected</span>
          <span style={{color:T.textMuted,fontSize:9}}>batch overwrite</span>
        </div>
        <div style={{flex:1,overflowY:"auto"}}>
          {/* Export / ctx toggles — apply to all selected */}
          <div style={{borderBottom:`1px solid ${T.border}`,padding:"8px 10px",background:T.bg2}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <Chk checked={!anyExportOff} onChange={v=>onUpdComp("__exportEnabled",primObj.id,null,v)}/>
              <span style={{color:T.textHi,fontSize:11,fontWeight:700}}>Include in Export</span>
              {anyExportOff&&<span style={{color:T.err,fontSize:9}}>some excluded</span>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <Chk checked={!anyCtxOff} onChange={v=>onUpdComp("__ctxEnabled",primObj.id,null,v)}/>
              <span style={{color:T.text,fontSize:11}}>Include in global ctx</span>
              {anyCtxOff&&<span style={{color:T.warn,fontSize:9}}>some excluded</span>}
            </div>
          </div>
          <Sec title="Selection" color={T.warn}>
            <div style={{color:T.textMuted,fontSize:9,marginBottom:4,lineHeight:1.5}}>Shift/Ctrl+click to add/remove.<br/>All changes overwrite every selected object.</div>
            {selObjs.map(o=>{const dt=o.components?.camera?'camera':o.components?.light?'light':o.components?.model?'model':o.components?.sound?'sound':'empty';return(
              <div key={o.id} style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                <span style={{color:OC[dt]||T.text,fontSize:10}}>{OI[dt]||"◇"}</span>
                <span style={{color:T.text,fontSize:10,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{o.name}</span>
              </div>);})}
          </Sec>
          {sharedKeys.includes("transform")&&(()=>{
            const [degMode,setDegMode]=useState(true);
            return <Sec title="Transform (all)" color={CC.transform}>
              <V3 label="Position" value={primObj.components.transform.position} onChange={(a,v)=>up("transform",`position.${a}`,v)} onReset={()=>up("transform","position",{x:0,y:0,z:0})}/>
              <div style={{display:"flex",alignItems:"center",gap:4,marginBottom:2}}>
                <span style={{color:T.textMuted,fontSize:10,flex:1}}>Rotation</span>
                <button onClick={()=>setDegMode(v=>!v)} style={sBtn({padding:"0 5px",fontSize:9,border:`1px solid ${T.border}`,color:T.textMuted})}>{degMode?'°':'rad'}</button>
                <button onClick={()=>up("transform","rotation",{x:0,y:0,z:0})} title="Reset rotation" style={sBtn({padding:"0 4px",fontSize:9,border:"none",background:"transparent",color:T.textMuted})}>↺</button>
              </div>
              <V3 label="" value={primObj.components.transform.rotation} degrees={degMode} onChange={(a,v)=>up("transform",`rotation.${a}`,v)}/>
              <V3 label="Scale" value={primObj.components.transform.scale} onChange={(a,v)=>up("transform",`scale.${a}`,v)} onReset={()=>up("transform","scale",{x:1,y:1,z:1})}/>
            </Sec>;
          })()}
          {sharedKeys.includes("model")&&<Sec title="Model (all)" color={CC.model}>
            <FR label="OBJ File"><FSel value={primObj.components.model.file} onChange={v=>up("model","file",v)} files={bycat("models")} placeholder="(choose OBJ)"/></FR>
            <FR label="Texture"><FSel value={primObj.components.model.textureFile||""} onChange={v=>up("model","textureFile",v)} files={bycat("textures")} placeholder="(embedded)"/></FR>
            <FR label="Pipeline"><select value={primObj.components.model.pipeline||"PL_DEFAULT"} onChange={e=>up("model","pipeline",e.target.value)} style={sInp()}><option value="PL_NO_LIGHTS">PL_NO_LIGHTS</option><option value="PL_DEFAULT">PL_DEFAULT</option><option value="PL_SPECULAR">PL_SPECULAR</option></select></FR>
            <FR label="Face Cull"><select value={primObj.components.model.face_culling||"CULL_FACE_NONE"} onChange={e=>up("model","face_culling",e.target.value)} style={sInp()}><option>CULL_FACE_NONE</option><option>CULL_FACE_BACK</option><option>CULL_FACE_FRONT</option></select></FR>
            <FR label="Shade"><select value={primObj.components.model.shade_model||"SHADE_GOURAUD"} onChange={e=>up("model","shade_model",e.target.value)} style={sInp()}><option>SHADE_GOURAUD</option><option>SHADE_FLAT</option></select></FR>
            <FR label="Tex Filter"><select value={primObj.components.model.textureFilter||"LINEAR"} onChange={e=>up("model","textureFilter",e.target.value)} style={sInp()}><option value="LINEAR">LINEAR (smooth)</option><option value="NEAREST">NEAREST (pixel)</option></select></FR>
            <FR label="Tex Map"><Chk checked={primObj.components.model.texture_mapping!==false} onChange={v=>up("model","texture_mapping",v)}/></FR>
            <FR label="Acc Clip"><Chk checked={!!primObj.components.model.accurate_clipping} onChange={v=>up("model","accurate_clipping",v)}/></FR>
          </Sec>}
          {sharedKeys.includes("light")&&<Sec title="Light (all)" color={CC.light}>
            <V3 label="Direction" value={primObj.components.light.direction} step={0.1} onChange={(a,v)=>up("light",`direction.${a}`,v)}/>
            <RGB01 label="Ambient"  value={primObj.components.light.ambient}  onChange={(ch,v)=>up("light",`ambient.${ch}`,v)}/>
            <RGB01 label="Diffuse"  value={primObj.components.light.diffuse}  onChange={(ch,v)=>up("light",`diffuse.${ch}`,v)}/>
            <RGB01 label="Specular" value={primObj.components.light.specular} onChange={(ch,v)=>up("light",`specular.${ch}`,v)}/>
          </Sec>}
          {sharedKeys.includes("camera")&&<Sec title="Camera (all)" color={CC.camera}>
            <FR label="FOV"><TF type="number" min={20} max={150} value={primObj.components.camera.fov||60} onChange={v=>up("camera","fov",v)}/></FR>
            <FR label="Near"><TF type="number" step={0.1} value={primObj.components.camera.near||1} onChange={v=>up("camera","near",v)}/></FR>
            <FR label="Far"><TF type="number" value={primObj.components.camera.far||4000} onChange={v=>up("camera","far",v)}/></FR>
            <V3 label="Target" value={primObj.components.camera.target||v3()} onChange={(a,vl)=>up("camera",`target.${a}`,vl)}/>
          </Sec>}
          {sharedKeys.includes("sound")&&<Sec title="Sound (all)" color={CC.sound}>
            <FR label="File"><FSel value={primObj.components.sound.file} onChange={v=>up("sound","file",v)} files={bycat("sounds")} placeholder="(choose audio)"/></FR>
            <FR label="Volume"><TF type="number" min={0} max={100} value={primObj.components.sound.volume} onChange={v=>up("sound","volume",v)}/></FR>
            <FR label="Loop"><Chk checked={primObj.components.sound.loop} onChange={v=>up("sound","loop",v)}/></FR>
            <FR label="Play On Start"><Chk checked={primObj.components.sound.playOnStart} onChange={v=>up("sound","playOnStart",v)}/></FR>
          </Sec>}
          {sharedKeys.includes("script")&&<Sec title="Script (all)" color={CC.script}>
            <FR label="File"><select value={primObj.components.script.file||""} onChange={e=>up("script","file",e.target.value)} style={sInp()}><option value="">— select script —</option>{bycat("scripts").map(f=><option key={f.id} value={f.name}>{f.name}</option>)}</select></FR>
            <FR label="ctx key"><TF value={primObj.components.script.ctxKey||""} onChange={v=>up("script","ctxKey",v)} placeholder={primObj.name.replace(/\W+/g,"_").toLowerCase()}/></FR>
          </Sec>}
          {sharedKeys.includes("animator")&&<Sec title="Animator (all)" color={CC.animator}>
            <FR label="GLTF"><FSel value={primObj.components.animator.file} onChange={v=>up("animator","file",v)} files={bycat("models")} placeholder="(choose GLTF)"/></FR>
            <FR label="Anim"><TF value={primObj.components.animator.defaultAnim} onChange={v=>up("animator","defaultAnim",v)}/></FR>
            <FR label="Loop"><Chk checked={primObj.components.animator.loop} onChange={v=>up("animator","loop",v)}/></FR>
          </Sec>}
        </div>
      </div>
    );
  }

  if(selUI){const el=selUI;const up=(f,v)=>onUpdUI(el.id,f,v);
  const upScript=(f,v)=>onUpdUI(el.id,"script",{...el.script,[f]:v});
  return(
    <div style={{...wStyle}}>
      <div style={sPH()}><span>UI Inspector</span></div>
      <div style={{flex:1,overflowY:"auto"}}>
        <Sec title={el.type} color={UIC[el.type]||T.text}>
          <FR label="Name"><TF value={el.name||el.type} onChange={v=>up("name",v)}/></FR>
          <FR label="X"><TF type="number" value={el.x} onChange={v=>up("x",v)}/></FR>
          <FR label="Y"><TF type="number" value={el.y} onChange={v=>up("y",v)}/></FR>
          <FR label="W"><TF type="number" value={el.width} onChange={v=>up("width",v)}/></FR>
          <FR label="H"><TF type="number" value={el.height} onChange={v=>up("height",v)}/></FR>
          <FR label="Z-index"><TF type="number" value={el.zindex||0} onChange={v=>up("zindex",parseInt(v)||0)}/></FR>
          <FR label="Visible"><Chk checked={el.visible} onChange={v=>up("visible",v)}/></FR>

          {(el.type==="Text"||el.type==="Button")&&<>
            <FR label="Text"><TF value={el.text} onChange={v=>up("text",v)}/></FR>
            <FR label="Font Size"><TF type="number" value={el.fontSize} onChange={v=>up("fontSize",v)}/></FR>
            <FR label="Font">
              <select value={el.fontFile||"default"} onChange={e=>up("fontFile",e.target.value)} style={sInp()}>
                <option value="default">default</option>
                {bycat("fonts").map(f=><option key={f.id} value={f.name}>{f.name}</option>)}
              </select>
            </FR>
            <FR label="Text Color">
              <input type="color"
                value={`#${(el.textColor?.r??200).toString(16).padStart(2,"0")}${(el.textColor?.g??200).toString(16).padStart(2,"0")}${(el.textColor?.b??200).toString(16).padStart(2,"0")}`}
                onChange={e=>{const hex=e.target.value;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);up("textColor",{r,g,b,a:el.textColor?.a??128});}}
                style={{width:40,height:24,border:"none",cursor:"pointer",borderRadius:2}}/>
              <TF type="number" value={el.textColor?.a??128} onChange={v=>up("textColor",{...el.textColor,a:parseInt(v)||0})} style={{width:50,marginLeft:4}} placeholder="alpha"/>
            </FR>
          </>}

          {(el.type==="Panel"||el.type==="Button")&&<>
            <FR label="Bg Color">
              <input type="color"
                value={`#${(el.bgColor?.r??50).toString(16).padStart(2,"0")}${(el.bgColor?.g??50).toString(16).padStart(2,"0")}${(el.bgColor?.b??80).toString(16).padStart(2,"0")}`}
                onChange={e=>{const hex=e.target.value;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);up("bgColor",{r,g,b,a:el.bgColor?.a??200});}}
                style={{width:40,height:24,border:"none",cursor:"pointer",borderRadius:2}}/>
              <TF type="number" value={el.bgColor?.a??200} onChange={v=>up("bgColor",{...el.bgColor,a:parseInt(v)||0})} style={{width:50,marginLeft:4}} placeholder="alpha"/>
            </FR>
          </>}

          {el.type==="Button"&&<>
            <FR label="Interactive"><Chk checked={el.interactive||false} onChange={v=>up("interactive",v)}/></FR>
          </>}

          {el.type==="ProgressBar"&&<>
            <FR label="Progress">
              <input type="range" min="0" max="1" step="0.01" value={el.progress??0.6}
                onChange={e=>up("progress",parseFloat(e.target.value))}
                style={{flex:1}}/>
              <span style={{color:T.text,fontSize:10,marginLeft:6,minWidth:30}}>{Math.round((el.progress??0.6)*100)}%</span>
            </FR>
            <FR label="Bar Color">
              <input type="color"
                value={`#${(el.barColor?.r??0).toString(16).padStart(2,"0")}${(el.barColor?.g??200).toString(16).padStart(2,"0")}${(el.barColor?.b??100).toString(16).padStart(2,"0")}`}
                onChange={e=>{const hex=e.target.value;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);up("barColor",{r,g,b,a:el.barColor?.a??200});}}
                style={{width:40,height:24,border:"none",cursor:"pointer",borderRadius:2}}/>
              <TF type="number" value={el.barColor?.a??200} onChange={v=>up("barColor",{...el.barColor,a:parseInt(v)||0})} style={{width:50,marginLeft:4}} placeholder="alpha"/>
            </FR>
            <FR label="Bg Color">
              <input type="color"
                value={`#${(el.barBgColor?.r??30).toString(16).padStart(2,"0")}${(el.barBgColor?.g??30).toString(16).padStart(2,"0")}${(el.barBgColor?.b??30).toString(16).padStart(2,"0")}`}
                onChange={e=>{const hex=e.target.value;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);up("barBgColor",{r,g,b,a:el.barBgColor?.a??200});}}
                style={{width:40,height:24,border:"none",cursor:"pointer",borderRadius:2}}/>
              <TF type="number" value={el.barBgColor?.a??200} onChange={v=>up("barBgColor",{...el.barBgColor,a:parseInt(v)||0})} style={{width:50,marginLeft:4}} placeholder="alpha"/>
            </FR>
          </>}

          {el.type==="Image"&&<>
            <FR label="Image"><FSel value={el.image} onChange={v=>up("image",v)} files={bycat("textures")} placeholder="(choose)"/></FR>
            <FR label="Filter"><select value={el.imageFilter||"LINEAR"} onChange={e=>up("imageFilter",e.target.value)} style={sInp()}><option value="LINEAR">LINEAR</option><option value="NEAREST">NEAREST</option></select></FR>
          </>}
        </Sec>

        {/* Script component — makes this UI element dynamic */}
        <Sec title="Script" color={T.script}>
          <FR label="File">
            <FSel value={el.script?.file||""} onChange={v=>upScript("file",v)} files={bycat("scripts")} placeholder="(none)"/>
          </FR>
          {el.script?.file&&<>
            <FR label="ctx key"><TF value={el.script?.ctxKey||""} onChange={v=>upScript("ctxKey",v)} placeholder={el.name||el.type}/></FR>
            <div style={{color:T.textMuted,fontSize:9,lineHeight:1.4,marginBottom:4}}>
              In your script, mutate <code style={{color:T.accent}}>ctx.ui.{el.script?.ctxKey||el.name||el.type}</code> to control this element at runtime.
            </div>
          </>}
        </Sec>
      </div>
    </div>
  );}

  // File selected in Navigator → show preview in Inspector
  if(selFileId&&!selObj&&!selUI&&!(selIds&&selIds.length>1)){
    const f=uploadedFiles.find(x=>x.id===selFileId);
    return <div style={{...wStyle}}>
      <div style={sPH()}><span style={{color:CAT_C[f?.cat]||T.text}}>Asset Preview</span></div>
      <div style={{flex:1,overflowY:"auto"}}>
        <FilePreviewPanel file={f} uploadedFiles={uploadedFiles}/>
      </div>
    </div>;
  }

  if(!selObj){return(
    <div style={{...wStyle}}>
      <div style={sPH()}><span>Scene Properties</span></div>
      <div style={{flex:1,overflowY:"auto"}}>
        {activeScene&&<>
          <Sec title="Render Settings" color={T.accent}>
            <FR label="Models Dir"><TF value={activeScene.modelsDir||"3dmodels"} placeholder="3dmodels" onChange={v=>onUpdComp("__dir",v)}/></FR>
            <FR label="Textures Dir"><TF value={activeScene.texturesDir||"textures"} placeholder="textures" onChange={v=>onUpdComp("__texdir",v)}/></FR>
            <div style={{color:T.textMuted,fontSize:"9px",marginBottom:4}}>os.chdir() folder for model / texture assets</div>
            <FR label="Framebuffer">
              <select value={activeScene.psm||"CT16S_Z16S"} onChange={e=>onUpdComp("__psm",e.target.value)} style={sInp()}>
                <option value="CT16S_Z16S">CT16S + Z16S — Performance ✓ (default)</option>
                <option value="CT32_Z24">CT32 + Z24 — Standard</option>
                <option value="CT32_Z32">CT32 + Z32 — High-end (most VRAM)</option>
                <option value="custom">Custom…</option>
              </select>
            </FR>
            {(activeScene.psm==="custom")&&<>
              <FR label="PSM Color">
                <TF value={activeScene.psmCustomColor||"Screen.CT16S"} onChange={v=>onUpdComp("__psmcc",v)} placeholder="Screen.CT16S"/>
              </FR>
              <FR label="PSM Depth">
                <TF value={activeScene.psmCustomDepth||"Screen.Z16S"} onChange={v=>onUpdComp("__psmcd",v)} placeholder="Screen.Z16S"/>
              </FR>
              <div style={{color:T.textMuted,fontSize:9,marginBottom:4,lineHeight:1.4}}>
                Valid values: Screen.CT32, Screen.CT16S, Screen.CT24 | Screen.Z32, Screen.Z24, Screen.Z16S
              </div>
            </>}
            <FR label="Debug Info">
              <Chk checked={activeScene.showDebugInfo||false} onChange={v=>onUpdComp("__debug",v)}/>
              <span style={{color:T.textMuted,fontSize:10,marginLeft:6}}>FPS + RAM + VRAM overlay</span>
            </FR>
          </Sec>
          <Sec title="Alpha Test" color={T.warn}>
            <FR label="Enable">
              <Chk checked={activeScene.alphaTestEnable||false} onChange={v=>onUpdComp("__alphaEnable",v)}/>
              <span style={{color:T.textMuted,fontSize:10,marginLeft:6}}>Global alpha cutout for foliage/masks</span>
            </FR>
            {activeScene.alphaTestEnable&&<>
              <FR label="Method">
                <select value={activeScene.alphaTestMethod||"ALPHA_GREATER"} onChange={e=>onUpdComp("__alphaMethod",e.target.value)} style={sInp()}>
                  <option value="ALPHA_NEVER">NEVER — all fail</option>
                  <option value="ALPHA_ALWAYS">ALWAYS — all pass</option>
                  <option value="ALPHA_LESS">LESS — alpha &lt; ref</option>
                  <option value="ALPHA_LEQUAL">LEQUAL — alpha ≤ ref</option>
                  <option value="ALPHA_EQUAL">EQUAL — alpha = ref</option>
                  <option value="ALPHA_GEQUAL">GEQUAL — alpha ≥ ref</option>
                  <option value="ALPHA_GREATER">GREATER — alpha &gt; ref ✓</option>
                  <option value="ALPHA_NEQUAL">NEQUAL — alpha ≠ ref</option>
                </select>
              </FR>
              <FR label="Ref (0–255)">
                <TF type="number" value={activeScene.alphaTestRef??50} onChange={v=>onUpdComp("__alphaRef",Math.max(0,Math.min(255,parseInt(v)||0)))}/>
                <span style={{color:T.textMuted,fontSize:9,marginLeft:6}}>50 = recommended</span>
              </FR>
              <FR label="Fail Action">
                <select value={activeScene.alphaTestFail||"ALPHA_FAIL_NO_UPDATE"} onChange={e=>onUpdComp("__alphaFail",e.target.value)} style={sInp()}>
                  <option value="ALPHA_FAIL_NO_UPDATE">NO_UPDATE — skip pixel ✓</option>
                  <option value="ALPHA_FAIL_FB_ONLY">FB_ONLY — write color</option>
                  <option value="ALPHA_FAIL_ZB_ONLY">ZB_ONLY — write depth</option>
                  <option value="ALPHA_FAIL_RGB_ONLY">RGB_ONLY — write RGB</option>
                </select>
              </FR>
              <FR label="Pixel Blend">
                <Chk checked={activeScene.pixelAlphaBlend||false} onChange={v=>onUpdComp("__alphaBlend",v)}/>
                <span style={{color:T.textMuted,fontSize:9,marginLeft:6}}>Enable for translucency</span>
              </FR>
            </>}
          </Sec>
          <Sec title="Background" color={T.textMuted}>
            <BG4 value={activeScene.background} onChange={(ch,v)=>onUpdComp("__bg",ch,v)}/>
          </Sec>
          <Sec title="Linked Scenes" color={T.accentDim}>
            {scenes.filter(s=>s.id!==activeSceneId).map(s=>{const lnk=activeScene.linkedScenes.includes(s.id);return(
              <div key={s.id} style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>
                <input type="checkbox" checked={lnk} style={{accentColor:T.accent}} onChange={e=>e.target.checked?onLink(s.id):onUnlink(s.id)}/>
                <span style={{fontSize:11,color:lnk?T.accent:T.text}}>⊡ {s.name}</span>
              </div>);})}
            {scenes.length<=1&&<div style={{color:T.textMuted,fontSize:11}}>No other scenes yet.</div>}
          </Sec>
        </>}
      </div>
    </div>
  );}

  const obj=selObj,comp=obj.components;
  const up=(ck,fld,val)=>onUpdComp(obj.id,ck,fld,val);
  const exportOn = obj.exportEnabled !== false;
  const ctxOn    = obj.ctxEnabled    !== false;
  const objVN    = obj.name.replace(/\W+/g,"_").toLowerCase();
  return(
    <div style={{...wStyle}}>
      <div style={{...sPH(),gap:6}}>
        <span style={{color:T.textHi,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{OI[obj.components?.camera?'camera':obj.components?.light?'light':obj.components?.model?'model':obj.components?.sound?'sound':'empty']||"◇"} {obj.name}</span>

en:`# Level Editor for AthenaEnv — Complete Interface Guide

## What is AthenaEditor?

AthenaEditor is a browser-based Unity-style level editor that exports executable PlayStation 2 JavaScript via AthenaEnv. It runs entirely in your browser — no installation needed — and produces \`main.js\` plus behavior scripts that run directly on PS2 hardware or in PCSX2.

**Key concepts:**
- Every level is a **Scene** — a tree of objects with components
- Every object gets a **Transform** (position, rotation, scale) automatically
- Additional behavior comes from **Components** (Model, Light, Camera, Sound, Script, Animator)
- **Scripts** are ES module files that receive a shared \`ctx\` object each frame
- **Export** generates one \`main.js\` per scene, ready to run on PS2

---

## Step-by-Step: Your First Scene

### 1. Load your assets
Click **⟳ Refresh** in the Navigator and select your project folder. The editor scans for:
- \`3dmodels/\` → OBJ, GLB, GLTF files
- \`textures/\` → PNG, JPG files  
- \`sounds/\` → OGG, WAV, ADP files
- \`fonts/\` → TTF, OTF files
- \`scripts/\` → JS behavior files

### 2. Add a 3D object
Click the **◈** button at the bottom of the Outliner. A new object of type "model" appears.

### 3. Assign a model file
Select the object. In the **Inspector** on the right, find the **Model** component. Under **File**, pick your OBJ or GLB from the dropdown.

### 4. Position the object
Use the **T** (Translate) gizmo: drag the colored arrows to move along X (red), Y (green), or Z (blue). Or type values directly in the Inspector's Transform section.

### 5. Export
**File → Export main.js**. A zip downloads containing \`main.js\` and any \`scripts/\` files. Copy them to your PS2 project folder.

---

## Panels in Detail

### Outliner (left panel)
Lists every object in the scene as a tree. Children are indented under their parents.

- **Single click** — select object, shows it in Inspector and highlights it in Viewport
- **Double-click** — rename the object inline
- **Shift/Ctrl+click** — add to multi-selection
- **◎ / ○ button** — toggle visibility (hidden objects don't export)
- **✕ button** — delete (asks confirmation)
- **⬡ button** — save selected object as a Prefab
- **⧉ button** — duplicate selected (or all selected in multi-mode)
- **+ button** — add empty object
- **Bottom row** ◈ ✦ ◉ ♫ — quick-add Model, Light, Camera, or Sound object

**UI Elements section:** Below the 3D objects, UI elements from the UI Editor also appear here. Click them to select and show in the UI Inspector.

### Viewport 3D (center)
Real-time Three.js preview of your scene.

| Action | How |
|---|---|
| Orbit camera | Left-drag |
| Pan camera | Right-drag |
| Zoom | Scroll wheel |
| Select object | Click on mesh |
| Add to selection | Shift or Ctrl + click |
| Frame selected | F or . key |
| Translate gizmo | Q key |
| Rotate gizmo | W key |
| Scale gizmo | E key |
| Toggle world/local | Tab key |

**Gizmo handles:**
- Red = X axis, Green = Y axis, Blue = Z axis
- In **Translate** mode, drag arrows to slide along an axis
- In **Rotate** mode, drag rings tangentially to spin around an axis
- In **Scale** mode, drag boxes to resize along an axis
- In **World** space, axes are always aligned to the world grid
- In **Local** space, axes follow the object's own rotation

### Inspector (right panel)
Shows all components of the selected object. When nothing is selected, shows Scene Properties.

**Object inspector sections:**
- **Transform** — always present. Position (X,Y,Z), Rotation (radians), Scale
- **Model** — 3D mesh: file, texture, filter, pipeline, culling, shade model, accurate clipping
- **Light** — directional light: direction, ambient/diffuse/specular color
- **Camera** — FOV, near/far clip planes, look-at target
- **Sound** — audio file, volume, loop, play on start
- **Script** — JS behavior file + ctx key binding
- **Animator** — GLB animation collection, default clip, loop

**Add Component** button appears at the bottom of each object's inspector.

**Scene Properties** (when nothing is selected):
- Models Dir / Textures Dir — folder names relative to the ELF
- Framebuffer — CT32+Z24 (standard) or CT16S+Z16S (performance, saves 50% VRAM)
- Debug Info — toggle FPS + RAM + VRAM overlay in exported game
- Alpha Test — global alpha cutout for foliage and masked textures
- Background color — clear color for the frame
- Linked Scenes — which scenes to include in the export bundle

### UI Editor (tab)
Switch to the **⬢ UI Editor** tab to design your HUD and menus on a 640×448 PS2 canvas.

**Adding elements:**
Click + Text, + Image, + Button, + Panel, or + ProgressBar in the toolbar.

**Selecting elements:**
Click on an element in the canvas. Its properties appear in the Inspector. Also visible in the Outliner under "▦ UI ELEMENTS".

**Moving elements:**
Click and drag an element directly on the canvas. Or type X/Y values in the Inspector.

**Per-element properties:**
- Name — used as the JS variable name in the export
- Position (X, Y), Size (W, H), Z-index
- Visibility toggle
- Type-specific: text, font, colors, progress, image source
- Script — attach a behavior script to make the element dynamic

**Duplicate:** Select an element, click **⧉ Duplicate** — appears offset by 10px.

### Navigator (bottom panel)
Manages project files and prefabs.

**Files tab:**
- Click **⟳ Refresh** to sync with your project folder
- Files appear grouped by category (3dmodels, textures, sounds, fonts, scripts)
- Click a file to select it (shows info in Inspector area if you implement file preview)
- ✕ to remove a file from the editor (does not delete from disk)

**Prefabs tab:**
- Shows saved prefab objects
- Click a prefab card to select it (shows in Inspector)
- **+ Place** — instantiates a copy into the active scene
- **🗑** — delete (asks confirmation)
- Saving a prefab with the same name as an existing one **overwrites** it

---

## Component Reference

### Model Component
| Field | Description |
|---|---|
| File | OBJ or GLB/GLTF filename from 3dmodels/ |
| Texture | PNG texture override |
| Filter | LINEAR (smooth) or NEAREST (pixel art) |
| Pipeline | PL_NO_LIGHTS, PL_DEFAULT, PL_SPECULAR |
| Culling | CULL_FACE_BACK (default), FRONT, NONE |
| Shade Model | SHADE_GOURAUD (smooth) or SHADE_FLAT (faceted) |
| Accurate Clipping | Prevent Z-fighting near clip plane (costs performance) |
| Tex Map | Enable/disable texture mapping |

### Animator Component
Requires a GLB/GLTF with embedded animations.
| Field | Description |
|---|---|
| GLTF | Same GLB file as the Model component |
| Anim | Animation clip name (e.g., "Walk", "Idle") |
| Loop | Whether the clip loops |

Only **one** \`AnimCollection\` is created per unique file in the export — objects sharing the same GLB share its collection.

### Script Component
| Field | Description |
|---|---|
| File | .js behavior script from scripts/ |
| ctx key | Property on \`ctx\` that maps back to this object's position |

Multiple objects can share the same script file. Each gets its own init/update call.

### Light Component
Sets up a directional light. In AthenaEnv, lights are global — only one active directional light per scene is typical.

---

## Export Details

When you click **File → Export main.js**, the editor generates:

1. **main.js** — contains:
   - Screen mode setup (PSM, zbuffering)
   - Render.init() + camera setup
   - Font loading (fonts/consola.TTF)
   - One \`RenderData\` per unique (file + texture + settings) combination — **deduplicated**
   - One \`RenderObject\` per visible model object
   - One \`AnimCollection\` per unique GLTF file — **deduplicated**
   - Sound streams for objects with Sound components
   - Alpha Test setup (if enabled in Scene Properties)
   - \`ctx\` shared context object
   - init() call for each scripted object
   - Game loop with Camera, pad, behaviors, render, UI

2. **scripts/BehaviorName.js** — one per unique script file referenced by any object

**Memory deduplication:**
- 10 trees using the same \`arbol.glb\` → 1 \`arbol_data\`, 1 \`arbol_anims\`, 10 \`RenderObject\`s
- This is the correct pattern — \`RenderObject\` is a lightweight instance; \`RenderData\` holds the geometry

---

## Keyboard Shortcuts

| Key | Action |
|---|---|
| Ctrl+Z | Undo |
| Ctrl+Y | Redo |
| Ctrl+Shift+Z | Redo (alternate) |
| Ctrl+D | Duplicate selected object(s) |
| Ctrl+S | Save project |
| Q | Translate gizmo |
| W | Rotate gizmo |
| E | Scale gizmo |
| Tab | Toggle World / Local space |
| F or . | Frame selected in viewport |
| Shift+Click | Add object to multi-selection |
| Ctrl+Click | Add / remove object from selection |

---

## Required Folder Structure

\`\`\`
MyGame/
  athena.elf           ← PS2 executable
  main.js              ← exported by AthenaEditor
  scripts/
    Player.js          ← exported behavior scripts
    Camera.js
  3dmodels/
    hero.glb
    level.obj
  textures/
    atlas.png
    ui_bg.png
  sounds/
    bgm.ogg
    jump.adp
  fonts/
    consola.TTF
\`\`\`

The \`modelsDir\` and \`texturesDir\` in Scene Properties control which subdirectory is used for \`os.chdir()\` at the start of the export.

---

## AthenaEnv Critical Notes

- \`new Image("missing.png")\` **crashes** PCSX2 — the export always checks file existence with \`std.open()\` first
- \`const\` redeclaration is a **fatal error** in QuickJS — variable names are auto-deduplicated in export
- ES modules (\`import/export\`) work fully in AthenaEnv — use them for all behaviors
- PNG textures must be **RGB** (not RGBA) to avoid crash on some models — check with an image editor
- \`try/catch\` catches JS errors only, not C-level AthenaEnv crashes
- Prefer \`Screen.CT16S + Z16S\` (performance mode) for most scenes — \`CT32\` is only needed for very smooth gradients
- Alpha Test (Scene Properties → Alpha Test) is the correct way to handle foliage and decals
`,
es:`# Level Editor para AthenaEnv — Guía Completa de Interfaz

## ¿Qué es AthenaEditor?

AthenaEditor es un editor de niveles estilo Unity que corre en el navegador y exporta JavaScript ejecutable en PlayStation 2 vía AthenaEnv. No requiere instalación y produce \`main.js\` más scripts de comportamiento que corren directamente en hardware PS2 o en PCSX2.

**Conceptos clave:**
- Cada nivel es una **Escena** — un árbol de objetos con componentes
- Todo objeto tiene automáticamente un **Transform** (posición, rotación, escala)
- El comportamiento viene de **Componentes**: Model, Light, Camera, Sound, Script, Animator
- Los **Scripts** son módulos ES que reciben un objeto compartido \`ctx\` por fotograma
- El **Export** genera un \`main.js\` por escena, listo para correr en PS2

---

## Paso a paso: Tu primera escena

### 1. Cargar assets
Hacé clic en **⟳ Refresh** en el Navigator y seleccioná la carpeta del proyecto. El editor escanea:
- \`3dmodels/\` → OBJ, GLB, GLTF
- \`textures/\` → PNG, JPG
- \`sounds/\` → OGG, WAV, ADP
- \`fonts/\` → TTF, OTF
- \`scripts/\` → archivos JS de comportamiento

### 2. Agregar un objeto 3D
Hacé clic en el botón **◈** en la parte inferior del Outliner. Aparece un nuevo objeto de tipo "model".

### 3. Asignar un archivo de modelo
Seleccioná el objeto. En el **Inspector** a la derecha, buscá el componente **Model**. En **File**, elegí tu OBJ o GLB del dropdown.

### 4. Posicionar el objeto
Usá el gizmo **T** (Trasladar): arrastrá las flechas de colores para mover en X (rojo), Y (verde) o Z (azul). O escribí valores directamente en la sección Transform del Inspector.

### 5. Exportar
**Archivo → Exportar main.js**. Descarga un zip con \`main.js\` y los archivos \`scripts/\`. Copialos a la carpeta de tu proyecto PS2.

---

## Paneles en detalle

### Outliner (panel izquierdo)
Lista todos los objetos de la escena como un árbol. Los hijos aparecen indentados bajo sus padres.

- **Click simple** — seleccionar objeto
- **Doble click** — renombrar el objeto
- **Shift/Ctrl+click** — agregar a selección múltiple
- **◎ / ○** — alternar visibilidad (los ocultos no se exportan)
- **✕** — eliminar (pide confirmación)
- **⬡** — guardar como Prefab
- **⧉** — duplicar seleccionado(s)
- **+** — agregar objeto vacío
- **Fila inferior** ◈ ✦ ◉ ♫ — agregar Model, Light, Camera o Sound rápidamente

**Sección UI ELEMENTS:** Debajo de los objetos 3D, los elementos del Editor UI también aparecen aquí.

### Viewport 3D (centro)
Vista previa en tiempo real con Three.js.

| Acción | Cómo |
|---|---|
| Orbitar cámara | Arrastrar izquierdo |
| Desplazar cámara | Arrastrar derecho |
| Zoom | Scroll |
| Seleccionar objeto | Click en malla |
| Agregar a selección | Shift o Ctrl + click |
| Enfocar seleccionado | F o . |
| Gizmo trasladar | Tecla Q |
| Gizmo rotar | Tecla W |
| Gizmo escalar | Tecla E |
| Toggle mundo/local | Tab |

### Inspector (panel derecho)
Muestra todos los componentes del objeto seleccionado. Sin selección, muestra Propiedades de Escena.

**Propiedades de Escena (nada seleccionado):**
- Carpeta Modelos / Texturas
- Framebuffer — CT32+Z24 (estándar) o CT16S+Z16S (rendimiento, 50% menos VRAM)
- Debug Info — overlay de FPS + RAM + VRAM en el juego exportado
- Alpha Test — recorte alfa global para follaje y máscaras
- Color de fondo
- Escenas vinculadas

### Editor UI (tab)
Cambiá al tab **⬢ Editor UI** para diseñar HUD y menús en un canvas 640×448 px.

**Agregar elementos:** Click en + Text, + Image, + Button, + Panel, o + ProgressBar.

**Seleccionar:** Click en un elemento en el canvas. Sus propiedades aparecen en el Inspector. También visible en el Outliner bajo "▦ UI ELEMENTS".

**Propiedades por elemento:**
- Nombre — usado como nombre de variable JS en el export
- Posición (X, Y), Tamaño (W, H), Z-index
- Visibilidad
- Específicas del tipo: texto, fuente, colores, progreso, imagen
- Script — adjuntá un behavior para hacer el elemento dinámico

### Navigator (panel inferior)
**Tab Archivos:** Click en **⟳ Refresh** para sincronizar con tu carpeta de proyecto. Los archivos aparecen agrupados por categoría.

**Tab Prefabs:** Muestra objetos guardados como prefabs. Click en un card para seleccionarlo. **+ Colocar** instancia una copia en la escena activa. Guardar un prefab con el mismo nombre **sobreescribe** el anterior.

---

## Referencia de componentes

### Componente Model
| Campo | Descripción |
|---|---|
| File | Archivo OBJ o GLB/GLTF de 3dmodels/ |
| Texture | Textura PNG externa (opcional) |
| Filter | LINEAR (suave) o NEAREST (pixel art) |
| Pipeline | PL_NO_LIGHTS, PL_DEFAULT, PL_SPECULAR |
| Culling | CULL_FACE_BACK (default), FRONT, NONE |
| Shade Model | SHADE_GOURAUD (suave) o SHADE_FLAT (facetado) |

### Componente Script
| Campo | Descripción |
|---|---|
| File | Archivo .js de comportamiento de scripts/ |
| ctx key | Propiedad en \`ctx\` que mapea la posición del objeto |

---

## Detalles del export

Cuando hacés **Archivo → Exportar main.js**, el editor genera:

1. **main.js** con:
   - Configuración de pantalla (PSM, zbuffering)
   - Render.init() + cámara
   - Carga de fuente (fonts/consola.TTF)
   - Un \`RenderData\` por combinación única (archivo + textura + configuración) — **deduplicado**
   - Un \`RenderObject\` por objeto de modelo visible
   - Un \`AnimCollection\` por archivo GLTF único — **deduplicado**
   - Setup de Alpha Test (si está activado)
   - Loop del juego con cámara, pad, behaviors, render, UI

2. **scripts/NombreBehavior.js** — uno por archivo script único referenciado

**Deduplicación de memoria:**
- 10 árboles usando el mismo \`arbol.glb\` → 1 \`arbol_data\`, 1 \`arbol_anims\`, 10 \`RenderObject\`s
- Este es el patrón correcto — \`RenderObject\` es liviano; \`RenderData\` contiene la geometría

---

## Atajos de teclado

| Tecla | Acción |
|---|---|
| Ctrl+Z | Deshacer |
| Ctrl+Y | Rehacer |
| Ctrl+D | Duplicar seleccionado(s) |
| Ctrl+S | Guardar proyecto |
| Q | Gizmo trasladar |
| W | Gizmo rotar |
| E | Gizmo escalar |
| Tab | Espacio mundial / local |
| F o . | Enfocar en viewport |
| Shift+Click | Agregar a selección múltiple |

---

## Estructura de carpetas requerida

\`\`\`
MiJuego/
  athena.elf           ← ejecutable PS2
  main.js              ← exportado por AthenaEditor
  scripts/
    Jugador.js
    Camara.js
  3dmodels/
    heroe.glb
    nivel.obj
  textures/
    atlas.png
  sounds/
    musica.ogg
  fonts/
    consola.TTF
\`\`\`

---

## Notas críticas de AthenaEnv

- \`new Image("faltante.png")\` **crashea** PCSX2 — el export siempre verifica con \`std.open()\`
- Redeclarar \`const\` es **error fatal** en QuickJS — los nombres de variables se deduplicanh en el export
- Los módulos ES (\`import/export\`) funcionan en AthenaEnv — usalos para todos los behaviors
- Las texturas PNG deben ser **RGB** (no RGBA) en algunos modelos — verificar con editor de imágenes
- \`try/catch\` solo captura errores JS, no crashes de nivel C
- Preferir \`CT16S + Z16S\` (modo rendimiento) para la mayoría de las escenas
- Alpha Test (Propiedades de Escena → Alpha Test) es la forma correcta de manejar follaje y decales
`}},

{id:2,section:"scripts",icon:"⌨",title:{en:"Player Controller",es:"Controlador del Jugador",pt:"Controlador do Jogador"},content:{
en:`# Player Controller

Manages input reading, physics movement, jumping, and basic actions.

Each Script component becomes a separate file in \`scripts/\`. It exports \`init(ctx)\` and \`update(ctx, pad)\`. \`ctx\` is the shared game-state object.

\`\`\`javascript
// scripts/Player.js

// ── Private state ─────────────────────────────────────
let posX = 0, posY = 0, posZ = 0;
let velY = 0;
let onGround = true;

const SPEED      = 0.08;
const GRAVITY    = -0.012;
const JUMP_FORCE = 0.18;

// ── Called once before the game loop ─────────────────
export function init(ctx) {
    ctx.player = { x: 0, y: 0, z: 0, alive: true };
}

// ── Called every frame ────────────────────────────────
export function update(ctx, pad) {
    const lx = Math.abs(pad.lx) > 25 ? pad.lx / 128.0 : 0;
    const ly = Math.abs(pad.ly) > 25 ? pad.ly / 128.0 : 0;

    posX += lx * SPEED;
    posZ += ly * SPEED;

    if (!onGround) velY += GRAVITY;

    if (pad.justPressed(Pads.CROSS) && onGround) {
        velY = JUMP_FORCE;
        onGround = false;
    }

    posY += velY;
    if (posY <= 0) { posY = 0; velY = 0; onGround = true; }

    // Expose position through ctx for camera and other systems
    ctx.player.x = posX;
    ctx.player.y = posY;
    ctx.player.z = posZ;

    // Update 3D object — variable name set by the editor export
    // player_renderobj.position = { x: posX, y: posY, z: posZ };
}
\`\`\`

**PS2 buttons reference:**
\`Pads.CROSS\` \`Pads.CIRCLE\` \`Pads.SQUARE\` \`Pads.TRIANGLE\`
\`Pads.L1\` \`Pads.L2\` \`Pads.R1\` \`Pads.R2\`
\`Pads.UP\` \`Pads.DOWN\` \`Pads.LEFT\` \`Pads.RIGHT\`
\`Pads.START\` \`Pads.SELECT\` \`Pads.L3\` \`Pads.R3\`

**Analog sticks:** \`pad.lx\` \`pad.ly\` \`pad.rx\` \`pad.ry\` — range -128 to +127, use dead zone > 25.

**Input methods:** \`pad.pressed(btn)\` — held down. \`pad.justPressed(btn)\` — first frame only.
`,
es:`# Controlador del Jugador (Player Controller)

Gestiona la lectura de controles, movimiento físico, saltos y acciones básicas.

Cada componente Script se convierte en un archivo separado en \`scripts/\`. Exporta \`init(ctx)\` y \`update(ctx, pad)\`. \`ctx\` es el objeto de estado compartido.

\`\`\`javascript
// scripts/Player.js

let posX = 0, posY = 0, posZ = 0;
let velY = 0;
let onGround = true;

const SPEED      = 0.08;
const GRAVITY    = -0.012;
const JUMP_FORCE = 0.18;

export function init(ctx) {
    ctx.player = { x: 0, y: 0, z: 0, vivo: true };
}

export function update(ctx, pad) {
    const lx = Math.abs(pad.lx) > 25 ? pad.lx / 128.0 : 0;
    const ly = Math.abs(pad.ly) > 25 ? pad.ly / 128.0 : 0;

    posX += lx * SPEED;
    posZ += ly * SPEED;

    if (!onGround) velY += GRAVITY;

    if (pad.justPressed(Pads.CROSS) && onGround) {
        velY = JUMP_FORCE; onGround = false;
    }

    posY += velY;
    if (posY <= 0) { posY = 0; velY = 0; onGround = true; }

    ctx.player.x = posX;
    ctx.player.y = posY;
    ctx.player.z = posZ;
}
\`\`\`

**Botones PS2:** \`Pads.CROSS\` \`Pads.CIRCLE\` \`Pads.SQUARE\` \`Pads.TRIANGLE\`
\`Pads.L1\` \`Pads.L2\` \`Pads.R1\` \`Pads.R2\` \`Pads.START\` \`Pads.SELECT\`

**Analógicos:** \`pad.lx\` \`pad.ly\` \`pad.rx\` \`pad.ry\` — rango -128 a +127, usar zona muerta > 25.

**Métodos:** \`pad.pressed(btn)\` — mantenido. \`pad.justPressed(btn)\` — solo primer frame.
`}},

{id:3,section:"scripts",icon:"◉",title:{en:"Camera Controller",es:"Controlador de Cámara",pt:"Controlador de Câmera"},content:{
en:`# Camera Controller

Controls camera behavior, following the player, view limits, and mode transitions.

\`\`\`javascript
// scripts/MainCamera.js

const CAM_DISTANCE = 8.0;
const CAM_HEIGHT   = 3.5;
const CAM_SMOOTH   = 0.08;

let camX = 0, camY = CAM_HEIGHT, camZ = CAM_DISTANCE;
let camYaw = 0;
let firstPerson = false;

export function init(ctx) {
    ctx.camera = { yaw: 0 };
}

export function update(ctx, pad) {
    if (!ctx.player) return;
    const px = ctx.player.x, py = ctx.player.y, pz = ctx.player.z;

    // Toggle first/third person with L3
    if (pad.justPressed(Pads.L3)) firstPerson = !firstPerson;

    // Rotate camera with right stick
    const rx = Math.abs(pad.rx) > 25 ? pad.rx / 512.0 : 0;
    camYaw += rx;
    ctx.camera.yaw = camYaw;

    if (firstPerson) {
        Camera.position(px, py + 1.7, pz);
        Camera.target(
            px + Math.sin(camYaw),
            py + 1.7,
            pz + Math.cos(camYaw)
        );
        return;
    }

    // Third person: smooth follow
    const targetX = px - Math.sin(camYaw) * CAM_DISTANCE;
    const targetZ = pz - Math.cos(camYaw) * CAM_DISTANCE;
    const targetY = py + CAM_HEIGHT;

    camX += (targetX - camX) * CAM_SMOOTH;
    camY += (targetY - camY) * CAM_SMOOTH;
    camZ += (targetZ - camZ) * CAM_SMOOTH;

    Camera.position(camX, camY, camZ);
    Camera.target(px, py + 1.0, pz);
}
\`\`\`

**AthenaEnv Camera API:**
- \`Camera.position(x, y, z)\` — set position each frame
- \`Camera.target(x, y, z)\` — look-at target
- \`Camera.orbit(dx, dy)\` — orbit by delta angles (radians)
- \`Camera.zoom(delta)\` — zoom in/out
- \`Camera.update()\` — must call once per frame (already in main.js)
`,
es:`# Controlador de Cámara

Controla cómo la cámara sigue al jugador y sus modos de vista.

\`\`\`javascript
// scripts/MainCamera.js

const CAM_DISTANCE = 8.0;
const CAM_HEIGHT   = 3.5;
const CAM_SMOOTH   = 0.08;

let camX = 0, camY = CAM_HEIGHT, camZ = CAM_DISTANCE;
let camYaw = 0;
let primeraPersoa = false;

export function init(ctx) {
    ctx.camera = { yaw: 0 };
}

export function update(ctx, pad) {
    if (!ctx.player) return;
    const px = ctx.player.x, py = ctx.player.y, pz = ctx.player.z;

    if (pad.justPressed(Pads.L3)) primeraPersona = !primeraPersona;

    const rx = Math.abs(pad.rx) > 25 ? pad.rx / 512.0 : 0;
    camYaw += rx;
    ctx.camera.yaw = camYaw;

    if (primeraPersona) {
        Camera.position(px, py + 1.7, pz);
        Camera.target(px + Math.sin(camYaw), py + 1.7, pz + Math.cos(camYaw));
        return;
    }

    const tx = px - Math.sin(camYaw) * CAM_DISTANCE;
    const tz = pz - Math.cos(camYaw) * CAM_DISTANCE;

    camX += (tx - camX) * CAM_SMOOTH;
    camY += (py + CAM_HEIGHT - camY) * CAM_SMOOTH;
    camZ += (tz - camZ) * CAM_SMOOTH;

    Camera.position(camX, camY, camZ);
    Camera.target(px, py + 1.0, pz);
}
\`\`\`

**API de Camera en AthenaEnv:**
- \`Camera.position(x, y, z)\` — establecer posición cada frame
- \`Camera.target(x, y, z)\` — punto al que mira
- \`Camera.orbit(dx, dy)\` — orbitar por ángulos delta
- \`Camera.zoom(delta)\` — acercar/alejar
- \`Camera.update()\` — llamar una vez por frame (ya está en main.js)
`}},

{id:4,section:"scripts",icon:"★",title:{en:"Game Manager",es:"Gestor del Juego",pt:"Gerenciador do Jogo"},content:{
en:`# Game Manager

Global state machine: start, pause, Game Over, win conditions, and level transitions.

\`\`\`javascript
// scripts/GameManager.js

const STATE_MENU     = 0;
const STATE_PLAYING  = 1;
const STATE_PAUSED   = 2;
const STATE_GAMEOVER = 3;
const STATE_WIN      = 4;

let state = STATE_MENU;

export function init(ctx) {
    ctx.game = {
        state: STATE_MENU,
        score: 0,
        lives: 3,
        level: 1,
        paused: false,
    };
}

export function update(ctx, pad) {
    ctx.game.state = state;
    ctx.game.paused = (state === STATE_PAUSED);

    switch (state) {
        case STATE_MENU:
            if (pad.justPressed(Pads.START)) {
                ctx.game.score = 0;
                ctx.game.lives = 3;
                state = STATE_PLAYING;
            }
            break;

        case STATE_PLAYING:
            if (pad.justPressed(Pads.START)) { state = STATE_PAUSED; break; }
            if (ctx.game.lives <= 0)  state = STATE_GAMEOVER;
            if (ctx.game.score >= 100) state = STATE_WIN;
            break;

        case STATE_PAUSED:
            if (pad.justPressed(Pads.START))  state = STATE_PLAYING;
            if (pad.justPressed(Pads.SELECT)) state = STATE_MENU;
            break;

        case STATE_GAMEOVER:
            if (pad.justPressed(Pads.CROSS)) state = STATE_MENU;
            break;

        case STATE_WIN:
            if (pad.justPressed(Pads.CROSS)) {
                ctx.game.level += 1;
                os.chdir("..");
                std.reload("level" + ctx.game.level + ".js");
            }
            break;
    }
}

// Helpers callable from other behaviors via ctx:
// ctx.addScore = (n) => { ctx.game.score += n; }
// ctx.loseLife = ()  => { ctx.game.lives -= 1; }
\`\`\`
`,
es:`# Gestor del Juego (Game Manager)

Máquina de estados global: inicio, pausa, Game Over, victoria y transiciones entre niveles.

\`\`\`javascript
// scripts/GameManager.js

const MENU     = 0, JUGANDO = 1, PAUSA = 2, GAMEOVER = 3, VICTORIA = 4;
let estado = MENU;

export function init(ctx) {
    ctx.juego = { estado: MENU, puntaje: 0, vidas: 3, nivel: 1 };
}

export function update(ctx, pad) {
    ctx.juego.estado = estado;

    switch (estado) {
        case MENU:
            if (pad.justPressed(Pads.START)) {
                ctx.juego.puntaje = 0; ctx.juego.vidas = 3;
                estado = JUGANDO;
            }
            break;
        case JUGANDO:
            if (pad.justPressed(Pads.START)) { estado = PAUSA; break; }
            if (ctx.juego.vidas <= 0)       estado = GAMEOVER;
            if (ctx.juego.puntaje >= 100)   estado = VICTORIA;
            break;
        case PAUSA:
            if (pad.justPressed(Pads.START))  estado = JUGANDO;
            if (pad.justPressed(Pads.SELECT)) estado = MENU;
            break;
        case GAMEOVER:
            if (pad.justPressed(Pads.CROSS)) estado = MENU;
            break;
        case VICTORIA:
            if (pad.justPressed(Pads.CROSS)) {
                ctx.juego.nivel += 1;
                os.chdir("..");
                std.reload("nivel" + ctx.juego.nivel + ".js");
            }
            break;
    }
}
\`\`\`
`}},

{id:5,section:"scripts",icon:"⬢",title:{en:"UI Manager",es:"Gestor de UI",pt:"Gerenciador de UI"},content:{
en:`# UI Manager (HUD)

Draws health bars, score, lives, and menus using AthenaEnv's 2D drawing API.

\`\`\`javascript
// scripts/UIManager.js
// Runs AFTER Screen.setParam(DEPTH_TEST_ENABLE, false) in the loop

// UI Images must be loaded in main.js via the Level Editor's UI Image elements.
// The editor generates: ui_img_0, ui_img_1, etc. — already available as globals.

const W = 640, H = 448;

// Colors (create once, reuse — creating Color objects each frame is wasteful)
const C_BLACK     = Color.new(0,   0,   0,   255);
const C_RED_BG    = Color.new(80,  0,   0,   200);
const C_RED_FG    = Color.new(220, 50,  50,  255);
const C_GREEN     = Color.new(0,   200, 100, 255);
const C_OVERLAY   = Color.new(0,   0,   0,   160);
const C_WHITE     = Color.new(255, 255, 255, 255);

export function init(ctx) {}

export function update(ctx, pad) {
    const g = ctx.game;
    if (!g) return;

    if (g.state === 1) { // PLAYING
        drawHUD(ctx);
    } else if (g.state === 2) { // PAUSED
        drawPause(ctx);
    } else if (g.state === 3) { // GAME OVER
        drawGameOver(ctx);
    } else if (g.state === 0) { // MENU
        drawMenu(ctx);
    }
}

function drawHUD(ctx) {
    const g = ctx.game;
    // Health bar background
    Draw.rect(8, 8, 160, 14, C_RED_BG);
    // Health bar fill — proportional
    const hp_pct = Math.max(0, Math.min(1, (ctx.player?.hp || 1) / 100));
    Draw.rect(8, 8, 160 * hp_pct, 14, C_RED_FG);
    // Score (font is declared in main.js)
    font.print(W - 90, 10, "SCORE " + g.score);
    font.print(8, 28, "LIVES: " + g.lives);
}

function drawPause(ctx) {
    Draw.rect(0, 0, W, H, C_OVERLAY);
    font.print(280, 200, "PAUSED");
    font.print(220, 230, "START: Resume");
    font.print(205, 250, "SELECT: Main Menu");
}

function drawGameOver(ctx) {
    Draw.rect(0, 0, W, H, C_OVERLAY);
    font.print(255, 190, "GAME OVER");
    font.print(230, 220, "X: Return to Menu");
}

function drawMenu(ctx) {
    font.print(220, 180, "MY PS2 GAME");
    font.print(245, 220, "PRESS START");
}
\`\`\`

**AthenaEnv 2D drawing API:**
- \`Draw.rect(x, y, w, h, color)\` — filled rectangle
- \`font.print(x, y, string)\` — draw text (font declared in main.js)
- \`img.draw(x, y)\` — draw image at position (size set via \`.width\` / \`.height\`)
`,
es:`# Gestor de Interfaz (UI Manager)

Dibuja barras de vida, puntaje, vidas y menús con la API 2D de AthenaEnv.

\`\`\`javascript
// scripts/UIManager.js

const W = 640, H = 448;

const C_ROJO_BG = Color.new(80, 0, 0, 200);
const C_ROJO_FG = Color.new(220, 50, 50, 255);
const C_OVERLAY = Color.new(0, 0, 0, 160);

export function init(ctx) {}

export function update(ctx, pad) {
    const g = ctx.juego;
    if (!g) return;
    if (g.estado === 1) dibujarHUD(ctx);
    else if (g.estado === 2) dibujarPausa();
    else if (g.estado === 3) dibujarGameOver();
    else if (g.estado === 0) dibujarMenu();
}

function dibujarHUD(ctx) {
    const hp = Math.max(0, Math.min(1, (ctx.jugador?.hp || 1) / 100));
    Draw.rect(8, 8, 160, 14, C_ROJO_BG);
    Draw.rect(8, 8, 160 * hp, 14, C_ROJO_FG);
    font.print(W - 100, 10, "PUNTAJE " + ctx.juego.puntaje);
    font.print(8, 28, "VIDAS: " + ctx.juego.vidas);
}

function dibujarPausa() {
    Draw.rect(0, 0, W, H, C_OVERLAY);
    font.print(280, 200, "PAUSA");
    font.print(220, 230, "START: Continuar");
    font.print(200, 250, "SELECT: Menú Principal");
}

function dibujarGameOver() {
    Draw.rect(0, 0, W, H, C_OVERLAY);
    font.print(255, 190, "GAME OVER");
    font.print(225, 220, "X: Volver al Menú");
}

function dibujarMenu() {
    font.print(220, 180, "MI JUEGO PS2");
    font.print(245, 220, "PRESIONÁ START");
}
\`\`\`
`}},

{id:6,section:"scripts",icon:"♥",title:{en:"Health & Damage",es:"Vida y Daño",pt:"Vida e Dano"},content:{
en:`# Health & Damage System

Modular component applicable to both player and enemies.

\`\`\`javascript
// scripts/HealthSystem.js
// Usage: attach to any object that takes damage

// Create a health instance (call from other behaviors)
function makeHealth(max, onDeath) {
    return { hp: max, maxHp: max, invTimer: 0, dead: false, onDeath: onDeath || function(){} };
}

export function init(ctx) {
    // Player health
    ctx.playerHp = makeHealth(100, () => {
        if (ctx.game) ctx.game.lives -= 1;
        if (ctx.game && ctx.game.lives <= 0) ctx.game.state = 3; // GAMEOVER
        else { ctx.playerHp.hp = ctx.playerHp.maxHp; ctx.playerHp.dead = false; }
    });
    // Enemies can be created similarly: ctx.enemies[i].hp = makeHealth(30, ...)
}

export function update(ctx, pad) {
    tickHealth(ctx.playerHp);
    // tick enemy health:
    // if (ctx.enemies) ctx.enemies.forEach(e => e.hp && tickHealth(e.hp));
}

function tickHealth(h) {
    if (!h) return;
    if (h.invTimer > 0) h.invTimer--;
}

// ── Public API ─────────────────────────────────────────
// Call these from other behaviors via ctx:

function damage(h, amount) {
    if (!h || h.invTimer > 0 || h.dead) return false;
    h.hp -= amount;
    if (h.hp <= 0) {
        h.hp = 0; h.dead = true; h.onDeath();
    } else {
        h.invTimer = 90; // ~1.5s invincibility at 60fps
    }
    return true;
}

function heal(h, amount) {
    if (!h || h.dead) return;
    h.hp = Math.min(h.hp + amount, h.maxHp);
}

// Expose so other behaviors can call:
// ctx.damage = damage;
// ctx.heal = heal;
// In init():  ctx.damage = damage;  ctx.heal = heal;
\`\`\`

**Usage from enemy behavior:**
\`\`\`javascript
// In enemy collision check:
if (ctx.damage && overlaps(enemy, ctx.player)) {
    ctx.damage(ctx.playerHp, 10);
}
\`\`\`
`,
es:`# Sistema de Vida y Daño

Componente modular aplicable al jugador y enemigos.

\`\`\`javascript
// scripts/HealthSystem.js

function crearVida(max, alMorir) {
    return { hp: max, maxHp: max, invTimer: 0, muerto: false, alMorir: alMorir||function(){} };
}

export function init(ctx) {
    ctx.vidaJugador = crearVida(100, () => {
        if (ctx.juego) ctx.juego.vidas -= 1;
        if (ctx.juego && ctx.juego.vidas <= 0) ctx.juego.estado = 3;
        else { ctx.vidaJugador.hp = ctx.vidaJugador.maxHp; ctx.vidaJugador.muerto = false; }
    });
    ctx.dañar = dañar;
    ctx.curar  = curar;
}

export function update(ctx, pad) {
    tickVida(ctx.vidaJugador);
}

function tickVida(v) {
    if (!v) return;
    if (v.invTimer > 0) v.invTimer--;
}

function dañar(v, cantidad) {
    if (!v || v.invTimer > 0 || v.muerto) return false;
    v.hp -= cantidad;
    if (v.hp <= 0) { v.hp = 0; v.muerto = true; v.alMorir(); }
    else { v.invTimer = 90; }
    return true;
}

function curar(v, cantidad) {
    if (!v || v.muerto) return;
    v.hp = Math.min(v.hp + cantidad, v.maxHp);
}
\`\`\`
`}},

{id:7,section:"scripts",icon:"⬟",title:{en:"Enemy AI",es:"IA de Enemigos",pt:"IA de Inimigos"},content:{
en:`# Enemy AI / Behavior

Patrol, player detection, chase, and attack patterns.

\`\`\`javascript
// scripts/EnemyManager.js

const PATROL  = 0, CHASE = 1, ATTACK = 2, RETURN = 3;
const DETECT  = 8.0, ATTACK_R = 1.5;
const PAT_SPD = 0.03, CHASE_SPD = 0.06;

function makeEnemy(x, z) {
    return { x, z, homeX: x, homeZ: z, state: PATROL,
             angle: 0, cooldown: 0, hp: 30, active: true };
}

function dist2(ax, az, bx, bz) {
    return Math.sqrt((ax-bx)**2 + (az-bz)**2);
}

function moveToward(e, tx, tz, spd) {
    const dx = tx - e.x, dz = tz - e.z;
    const len = Math.max(0.001, Math.sqrt(dx*dx + dz*dz));
    e.x += (dx/len) * spd;
    e.z += (dz/len) * spd;
}

export function init(ctx) {
    ctx.enemies = [
        makeEnemy(5, 0),
        makeEnemy(-5, 3),
        makeEnemy(0, -8),
    ];
}

export function update(ctx, pad) {
    if (!ctx.player || !ctx.enemies) return;
    const px = ctx.player.x, pz = ctx.player.z;

    ctx.enemies.forEach(e => {
        if (!e.active) return;
        const d = dist2(e.x, e.z, px, pz);

        switch (e.state) {
            case PATROL:
                e.angle += 0.02;
                e.x = e.homeX + Math.sin(e.angle) * 2;
                e.z = e.homeZ + Math.cos(e.angle) * 2;
                if (d < DETECT) e.state = CHASE;
                break;

            case CHASE:
                moveToward(e, px, pz, CHASE_SPD);
                if (d < ATTACK_R) e.state = ATTACK;
                if (d > DETECT * 2) e.state = RETURN;
                break;

            case ATTACK:
                if (e.cooldown <= 0) {
                    if (ctx.damage) ctx.damage(ctx.playerHp, 10);
                    e.cooldown = 90;
                }
                e.cooldown--;
                if (d > ATTACK_R) e.state = CHASE;
                break;

            case RETURN:
                moveToward(e, e.homeX, e.homeZ, PAT_SPD);
                if (dist2(e.x, e.z, e.homeX, e.homeZ) < 0.2) e.state = PATROL;
                break;
        }

        // Update 3D object position — match variable name from editor export
        // enemy_renderobj_N.position = { x: e.x, y: 0, z: e.z };
    });
}
\`\`\`
`,
es:`# IA de Enemigos (Enemy AI)

Patrullaje, detección, persecución y ataque.

\`\`\`javascript
// scripts/EnemyManager.js

const PATRULLA = 0, PERSEGUIR = 1, ATACAR = 2, VOLVER = 3;
const DETECTAR = 8.0, RANGO_ATAQUE = 1.5;

function crearEnemigo(x, z) {
    return { x, z, homeX: x, homeZ: z, estado: PATRULLA,
             angulo: 0, cooldown: 0, hp: 30, activo: true };
}

function dist2(ax, az, bx, bz) {
    return Math.sqrt((ax-bx)**2 + (az-bz)**2);
}

function moverHacia(e, tx, tz, vel) {
    const dx = tx-e.x, dz = tz-e.z;
    const len = Math.max(0.001, Math.sqrt(dx*dx+dz*dz));
    e.x += (dx/len)*vel; e.z += (dz/len)*vel;
}

export function init(ctx) {
    ctx.enemigos = [ crearEnemigo(5,0), crearEnemigo(-5,3) ];
}

export function update(ctx, pad) {
    if (!ctx.player || !ctx.enemigos) return;
    const px = ctx.player.x, pz = ctx.player.z;
    ctx.enemigos.forEach(e => {
        if (!e.activo) return;
        const d = dist2(e.x, e.z, px, pz);
        switch (e.estado) {
            case PATRULLA:
                e.angulo += 0.02;
                e.x = e.homeX + Math.sin(e.angulo) * 2;
                e.z = e.homeZ + Math.cos(e.angulo) * 2;
                if (d < DETECTAR) e.estado = PERSEGUIR;
                break;
            case PERSEGUIR:
                moverHacia(e, px, pz, 0.06);
                if (d < RANGO_ATAQUE) e.estado = ATACAR;
                if (d > DETECTAR*2)  e.estado = VOLVER;
                break;
            case ATACAR:
                if (e.cooldown <= 0) { if(ctx.dañar) ctx.dañar(ctx.vidaJugador, 10); e.cooldown=90; }
                e.cooldown--;
                if (d > RANGO_ATAQUE) e.estado = PERSEGUIR;
                break;
            case VOLVER:
                moverHacia(e, e.homeX, e.homeZ, 0.03);
                if (dist2(e.x,e.z,e.homeX,e.homeZ) < 0.2) e.estado = PATRULLA;
                break;
        }
    });
}
\`\`\`
`}},

{id:8,section:"scripts",icon:"♫",title:{en:"Audio Manager",es:"Gestor de Audio",pt:"Gerenciador de Áudio"},content:{
en:`# Audio Manager

Centralized system for BGM streaming and SFX playback.

\`\`\`javascript
// scripts/AudioManager.js

// IMPORTANT: Audio files must be in the 'sounds/' folder
// BGM: use OGG or WAV (Sound.Stream — streaming from disc)
// SFX: use ADP/ADPCM (Sound.Sfx — loaded in RAM, lower latency)

let bgm = null;
let currentBgm = "";
let musicVol = 80;
let sfxEnabled = true;

// Preload SFX — do this in init() to avoid lag during gameplay
let sfx = {};

export function init(ctx) {
    Sound.setVolume(musicVol);

    // Load sound effects (ADPCM format recommended for PS2)
    // sfx.jump   = Sound.Sfx("sounds/jump.adp");
    // sfx.coin   = Sound.Sfx("sounds/coin.adp");
    // sfx.damage = Sound.Sfx("sounds/damage.adp");
    // sfx.death  = Sound.Sfx("sounds/death.adp");

    ctx.audio = {
        playBGM,
        stopBGM,
        playSFX,
        setVolume,
    };
}

export function update(ctx, pad) {
    // Nothing needed each frame for basic audio
    // Could add: fade in/out based on game state
}

function playBGM(filename) {
    if (currentBgm === filename) return; // already playing
    if (bgm) { bgm.pause(); bgm = null; }
    const f = std.open("sounds/" + filename, "r");
    if (!f) return; // file missing — safe check
    f.close();
    bgm = Sound.Stream("sounds/" + filename);
    bgm.play();
    currentBgm = filename;
}

function stopBGM() {
    if (bgm) { bgm.pause(); }
    currentBgm = "";
}

function playSFX(sfxObj) {
    if (!sfxEnabled || !sfxObj) return;
    sfxObj.play(Sound.findChannel());
}

function setVolume(vol) {
    musicVol = Math.max(0, Math.min(100, vol));
    Sound.setVolume(musicVol);
}
\`\`\`

**AthenaEnv Audio API:**
- \`Sound.Stream("file.ogg")\` — streaming (BGM, long tracks)
- \`Sound.Sfx("file.adp")\` — in-RAM SFX (lower latency)
- \`sound.play()\` — start playback
- \`sound.pause()\` — pause
- \`Sound.setVolume(0-100)\` — master volume
- \`Sound.findChannel()\` — get free channel for SFX

**Recommended formats:**
- BGM: OGG Vorbis (good compression)
- SFX: ADP / ADPCM (native PS2, best performance)
`,
es:`# Gestor de Audio (Audio Manager)

Sistema centralizado para BGM y SFX.

\`\`\`javascript
// scripts/AudioManager.js
