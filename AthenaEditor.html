<script>
// ═══════════════════════════════════════════════════════════════
//  OBJ PARSER — takes raw text + optional texture dataURL
//  No fetch(), no blob URLs — works in sandboxed iframes
// ═══════════════════════════════════════════════════════════════
function buildMeshFromOBJ(text, texDataUrl, textureFilter) {
  const rP=[], rU=[], rN=[], fP=[], fU=[], fN=[];
  for (const raw of text.split('\n')) {
    const l=raw.trim(); if(!l||l[0]==='#') continue;
    const p=l.split(/\s+/);
    if(p[0]==='v')  rP.push(+p[1],+p[2],+p[3]);
    else if(p[0]==='vt') rU.push(+p[1],+(p[2]||0));
    else if(p[0]==='vn') rN.push(+p[1],+p[2],+p[3]);
    else if(p[0]==='f'){
      const vts=[];
      for(let i=1;i<p.length;i++){
        const tok=p[i].split('/');
        let vi=parseInt(tok[0]); if(vi<0) vi=rP.length/3+vi+1;
        let ti=tok[1]&&tok[1]!==''?parseInt(tok[1]):0; if(ti<0) ti=rU.length/2+ti+1;
        let ni=tok[2]?parseInt(tok[2]):0; if(ni<0) ni=rN.length/3+ni+1;
        vts.push({vi:vi-1, ti:ti?ti-1:-1, ni:ni?ni-1:-1});
      }
      for(let i=1;i<vts.length-1;i++){
        for(const vx of [vts[0],vts[i],vts[i+1]]){
          const pi=vx.vi*3; fP.push(rP[pi]||0,rP[pi+1]||0,rP[pi+2]||0);
          if(vx.ti>=0){const ti=vx.ti*2;fU.push(rU[ti]||0,rU[ti+1]||0);}else fU.push(0,0);
          if(vx.ni>=0){const ni=vx.ni*3;fN.push(rN[ni]||0,rN[ni+1]||0,rN[ni+2]||0);}else fN.push(0,1,0);
        }
      }
    }
  }
  if(fP.length===0) throw new Error('No geometry in OBJ');
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.Float32BufferAttribute(fP,3));
  geo.setAttribute('uv',new THREE.Float32BufferAttribute(fU,2));
  const hasRealNormals=fN.some((v,i)=>i%3===2&&v!==0)||fN.some((v,i)=>i%3===0&&v!==0);
  if(hasRealNormals) geo.setAttribute('normal',new THREE.Float32BufferAttribute(fN,3));
  else geo.computeVertexNormals();

  const nearest = (textureFilter||'LINEAR') === 'NEAREST';
  let mat;
  if(texDataUrl){
    const tex=new THREE.TextureLoader().load(texDataUrl);
    tex.flipY=true;  // standard UV convention — V=0 at top, matches AthenaEnv
    if(nearest){
      tex.magFilter=THREE.NearestFilter;
      tex.minFilter=THREE.NearestFilter;
    } else {
      tex.magFilter=THREE.LinearFilter;
      tex.minFilter=THREE.LinearMipmapLinearFilter;
    }
    mat=new THREE.MeshStandardMaterial({map:tex,side:THREE.DoubleSide});
  }else{
    mat=new THREE.MeshStandardMaterial({color:0x5577cc,side:THREE.DoubleSide});
  }
  return new THREE.Mesh(geo,mat);
}

function disposeGrp(g){
  g.traverse(ch=>{
    if(ch.geometry)ch.geometry.dispose();
    if(ch.material)[].concat(ch.material).forEach(m=>{if(m.map)m.map.dispose();m.dispose();});
  });
}

// ── GLTF/GLB loader from dataURL ───────────────────────────────
function loadGLTFFromDataURL(dataUrl) {
  return new Promise((resolve, reject) => {
    if (!THREE.GLTFLoader) { reject(new Error('GLTFLoader not available')); return; }
    const loader = new THREE.GLTFLoader();
    loader.parse(
      // Convert dataURL to ArrayBuffer
      Uint8Array.from(atob(dataUrl.split(',')[1]), c => c.charCodeAt(0)).buffer,
      '',
      gltf => {
        const root = gltf.scene;
        root.traverse(ch => {
          if (ch.isMesh && ch.material) {
            // Keep original materials from GLTF
            [].concat(ch.material).forEach(mat => {
              mat.side = THREE.DoubleSide;
            });
          }
        });
        resolve(root);
      },
      err => reject(err)
    );
  });
}

// ── Read file as text (OBJ) or dataURL (image) ─────────────────
function readFileAs(file, mode) {
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(new Error('Read failed'));
    if(mode==='text') r.readAsText(file);
    else r.readAsDataURL(file);
  });
}

// ── Gizmo geometry factory ──────────────────────────────────────
function makeGizmoGroup(mode, isLocal) {
  const g=new THREE.Group(); g.userData.isGizmo=true;
  const AXES=[
    {n:'x', col:0xff2244},
    {n:'y', col:0x22cc66},
    {n:'z', col:0x2266ff},
  ];
  AXES.forEach(({n,col})=>{
    const mat=new THREE.MeshBasicMaterial({color:col,depthTest:false,depthWrite:false,transparent:true,opacity:0.9});
    // Invisible hit-zone material (larger clickable area)
    const hitMat=new THREE.MeshBasicMaterial({color:col,depthTest:false,depthWrite:false,transparent:true,opacity:0.0});
    const axGrp=new THREE.Group();

    if(mode==='translate'){
      const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.035,0.035,1.1,8),mat); shaft.position.y=0.55;
      const tip  =new THREE.Mesh(new THREE.ConeGeometry(0.1,0.28,8),mat); tip.position.y=1.24;
      // Invisible wider hit zone along the shaft
      const hit  =new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.14,1.4,8),hitMat); hit.position.y=0.7;
      hit.userData.gizmoAxis=n; hit.userData.isGizmo=true;
      shaft.userData.gizmoAxis=n; tip.userData.gizmoAxis=n;
      axGrp.add(shaft,tip,hit);
    } else if(mode==='rotate'){
      const ring=new THREE.Mesh(new THREE.TorusGeometry(1.1,0.05,8,48),mat);
      // Wider invisible torus for easier clicking
      const hitRing=new THREE.Mesh(new THREE.TorusGeometry(1.1,0.2,8,48),hitMat);
      ring.userData.gizmoAxis=n; hitRing.userData.gizmoAxis=n;
      ring.userData.isGizmo=true; hitRing.userData.isGizmo=true;
      axGrp.add(ring,hitRing);
      // Correct ring orientations:
      // X ring → in YZ plane (hole faces +X) → rotate group around Y by π/2
      // Y ring → in XZ plane (hole faces +Y) → rotate group around X by π/2
      // Z ring → in XY plane (hole faces +Z) → no rotation (default)
      if(n==='x') axGrp.rotation.y= Math.PI/2;
      if(n==='y') axGrp.rotation.x= Math.PI/2;
      // z: no rotation needed
    } else { // scale
      const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,1,8),mat); shaft.position.y=0.5;
      const box  =new THREE.Mesh(new THREE.BoxGeometry(0.2,0.2,0.2),mat); box.position.y=1.1;
      const hit  =new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.14,1.3,8),hitMat); hit.position.y=0.65;
      hit.userData.gizmoAxis=n; hit.userData.isGizmo=true;
      shaft.userData.gizmoAxis=n; box.userData.gizmoAxis=n;
      axGrp.add(shaft,box,hit);
    }

    // Orient translate/scale arrows along their axis
    if(mode!=='rotate'){
      if(n==='x') axGrp.rotation.z=-Math.PI/2;
      if(n==='z') axGrp.rotation.x= Math.PI/2;
      // y: no rotation needed (cylinder points up by default)
    }

    axGrp.traverse(ch=>{ if(ch.isMesh){ ch.renderOrder=999; ch.userData.isGizmo=true; if(!ch.userData.gizmoAxis)ch.userData.gizmoAxis=n; }});
    axGrp.userData.gizmoAxis=n;
    g.add(axGrp);
  });
  return g;
}
</script>

<script type="text/babel">
const {useState,useRef,useEffect,useCallback,useMemo}=React;

const T={bg0:"#060a0f",bg1:"#0b1018",bg2:"#0f1620",bg3:"#131d2a",border:"#1a2638",borderHi:"#243448",accent:"#00ccff",accentDim:"#005566",sel:"#0a2a3e",text:"#9ab8d0",textHi:"#d0e8ff",textMuted:"#354a5e",success:"#00cc88",warn:"#ffaa33",err:"#ff3355",model:"#4488ff",light:"#ffdd44",sound:"#44ffaa",anim:"#ffaa44",script:"#ff66cc",tex:"#55ffee",cam:"#88ffcc",empty:"#667788"};
const OC={model:T.model,light:T.light,camera:T.cam,sound:T.sound,empty:T.empty};
const OI={model:"◈",light:"✦",camera:"◉",sound:"♫",empty:"◇"};
const CC={transform:T.textMuted,model:T.model,animator:T.anim,light:T.light,sound:T.sound,script:T.script,camera:T.cam};
const UIC={Text:T.accent,Image:T.tex,Button:T.success,Panel:T.anim,ProgressBar:T.warn};
const UIC_I={Text:"T",Image:"🖼",Button:"⬜",Panel:"▬",ProgressBar:"▰"};
const CAT_C={models:T.model,textures:T.tex,sounds:T.sound,fonts:T.warn,scripts:T.script,other:T.textMuted};
const CAT_I={models:"◈",textures:"⬛",sounds:"♫",fonts:"A",scripts:"⌨",other:"▪"};

const sBtn=(e={})=>({background:T.bg3,border:`1px solid ${T.border}`,color:T.text,padding:"2px 8px",cursor:"pointer",fontSize:"11px",borderRadius:"2px",fontFamily:"monospace",outline:"none",...e});
const sBtnA=(e={})=>({...sBtn(),background:T.accentDim,border:`1px solid ${T.accent}`,color:T.accent,fontWeight:700,...e});
const sInp=(e={})=>({background:T.bg0,border:`1px solid ${T.border}`,color:T.textHi,padding:"2px 5px",fontSize:"11px",width:"100%",fontFamily:"monospace",outline:"none",borderRadius:"2px",boxSizing:"border-box",...e});
const sPH=(e={})=>({padding:"5px 10px",background:T.bg2,borderBottom:`1px solid ${T.border}`,fontSize:"10px",fontWeight:700,letterSpacing:"0.1em",color:T.textMuted,textTransform:"uppercase",display:"flex",alignItems:"center",justifyContent:"space-between",userSelect:"none",flexShrink:0,...e});

let _uid=0,_oN=0,_sN=0;
const uid=()=>`i${++_uid}_${Math.random().toString(36).slice(2,6)}`;
const v3=(x=0,y=0,z=0)=>({x,y,z});
const rgb=(r=0,g=0,b=0)=>({r,g,b});
const mkTransform=()=>({type:"transform",position:v3(),rotation:v3(),scale:v3(1,1,1)});
const mkModel=()=>({type:"model",file:"",textureFile:"",textureFilter:"LINEAR",pipeline:"PL_DEFAULT",face_culling:"CULL_FACE_BACK",shade_model:"SHADE_GOURAUD",texture_mapping:true,accurate_clipping:false});
const mkLight=()=>({type:"light",direction:v3(0,1,1),ambient:rgb(0.12,0.15,0.2),diffuse:rgb(0.5,0.5,0.5),specular:rgb(1,1,1)});
const mkCameraComp=()=>({type:"camera",fov:60,near:1.0,far:4000.0,target:v3(0,0,0)});
const mkSound=()=>({type:"sound",file:"",volume:100,loop:false,playOnStart:true});
const mkAnimator=()=>({type:"animator",file:"",defaultAnim:"ArmatureAction",loop:true});
const mkScript=()=>({type:"script",file:"",ctxKey:""});
const mkObject=(name,type="empty")=>({id:uid(),name:name||`Object_${++_oN}`,type,children:[],visible:true,exportEnabled:true,ctxEnabled:true,components:{transform:mkTransform()}});
const mkUIEl=(type)=>({id:uid(),name:`${type}_${++_oN}`,type,x:60+Math.random()*200|0,y:40+Math.random()*150|0,
  width:type==="Panel"?200:type==="Button"?120:160,height:type==="Panel"?80:type==="Button"?36:22,
  text:type==="Text"?"Hello World":type==="Button"?"Button":"",fontSize:14,
  fontFile:"default",textColor:{r:200,g:200,b:200,a:128},
  bgColor:{r:50,g:50,b:80,a:200},
  barColor:{r:0,g:200,b:100,a:200},barBgColor:{r:30,g:30,b:30,a:200},
  progress:0.6,interactive:false,
  image:"",imageFilter:"LINEAR",visible:true,zindex:0,
  script:{file:"",ctxKey:""}});
const mkScene=(name)=>({id:uid(),name:name||`Scene_${++_sN}`,objects:[],linkedScenes:[],uiElements:[],
  modelsDir:"3dmodels",texturesDir:"textures",background:{r:40,g:40,b:40,a:128},
  psm:"CT16S_Z16S",psmCustomColor:"Screen.CT16S",psmCustomDepth:"Screen.Z16S",showDebugInfo:false,
  alphaTestEnable:true,alphaTestMethod:"ALPHA_GREATER",alphaTestRef:50,alphaTestFail:"ALPHA_FAIL_NO_UPDATE",pixelAlphaBlend:true});

const findObj=(arr,id)=>{for(const o of arr){if(o.id===id)return o;const f=findObj(o.children,id);if(f)return f;}return null;};
const mutObj=(arr,id,fn)=>{for(const o of arr){if(o.id===id){fn(o);return true;}if(mutObj(o.children,id,fn))return true;}return false;};
const f3=n=>typeof n==="number"?parseFloat(n.toFixed(3)):0;
function categorize(name){const e=name.split(".").pop().toLowerCase();if(["obj","gltf","glb"].includes(e))return"models";if(["png","jpg","jpeg","bmp","tga"].includes(e))return"textures";if(["ogg","wav","adp","adpcm","mp3"].includes(e))return"sounds";if(["ttf","otf"].includes(e))return"fonts";return"other";}

// ═══════════════════════════════════════════════════════════════
//  EXPORT — multi-file, ES module scripts
//  Returns { main: string, scripts: [{filename, content}] }
// ═══════════════════════════════════════════════════════════════

function generateProject(project, uploadedFiles=[]) {
  const scene = project.scenes.find(s => s.id === project.activeSceneId);
  if (!scene) return { main:"// No active scene", scripts:[] };

  const L = []; const w = (...ls) => L.push(...ls); const nl = () => w("");
  const bg = scene.background;
  const dir = scene.modelsDir || "3dmodels";
  const texDir = scene.texturesDir || "textures";

  const camObj = scene.objects.find(o => o.visible && o.exportEnabled!==false && o.components.camera);
  const camPos = camObj ? camObj.components.transform.position : v3(0,2,10);
  const camTgt = camObj ? camObj.components.camera.target : v3(0,0,0);
  const camFov = camObj ? (camObj.components.camera.fov||60) : 60;

  // Only include script objects that have a .file assigned
  const scriptObjs = scene.objects.filter(o => o.visible && o.exportEnabled!==false && o.components.script && o.components.script.file);
  const modelObjs  = scene.objects.filter(o => o.visible && o.exportEnabled!==false && o.components.model && o.components.model.file);

  // ── Collect script files from uploadedFiles ───────────────
  // Each unique script file is included once in the output
  const seenScripts = new Map(); // filename → content
  scriptObjs.forEach(obj => {
    const sc = obj.components.script;
    const fname = sc.file; // e.g. "Player.js"
    if (!seenScripts.has(fname)) {
      const uploaded = uploadedFiles.find(f => f.name === fname && f.cat === 'scripts');
      seenScripts.set(fname, uploaded ? uploaded.content : `// ${fname} — not found in project\nexport function init(ctx){}\nexport function update(ctx,pad){}`);
    }
  });
  const scriptFiles = [...seenScripts.entries()].map(([filename, content]) => ({
    filename: `scripts/${filename}`, content
  }));

  // ── main.js ───────────────────────────────────────────────
  w(`// ════════════════════════════════════════════════════`);
  w(`// AthenaEditor — ${project.name}  |  ${scene.name}`);
  w(`// ════════════════════════════════════════════════════`);
  nl();

  // Import all behavior scripts — one import per unique file, alias = sanitized filename
  if (scriptObjs.length) {
    w(`// ── Behavior imports ─────────────────────────────────`);
    seenScripts.forEach((_, fname) => {
      const alias = fname.replace(/\W+/g,"_").replace(/\.js$/i,"").toLowerCase();
      w(`import { init as init_${alias}, update as update_${alias} } from './scripts/${fname}';`);
    });
    nl();
  }

  w(`Screen.setFrameCounter(true);`, `Screen.setVSync(true);`); nl();
  // PSM from scene setting
  const psmMap = {
    'CT32_Z32':   ['Screen.CT32',  'Screen.Z32'],
    'CT32_Z24':   ['Screen.CT32',  'Screen.Z24'],
    'CT16S_Z16S': ['Screen.CT16S', 'Screen.Z16S'],
  };
  let psmColor, psmDepth;
  if (scene.psm === 'custom') {
    psmColor = scene.psmCustomColor || 'Screen.CT16S';
    psmDepth = scene.psmCustomDepth || 'Screen.Z16S';
  } else {
    [psmColor, psmDepth] = psmMap[scene.psm||'CT16S_Z16S'] || ['Screen.CT16S','Screen.Z16S'];
  }
  w(`const canvas = Screen.getMode();`,
    `canvas.zbuffering = true;`,
    `canvas.psm  = ${psmColor};`,
    `canvas.psmz = ${psmDepth};`,
    `Screen.setMode(canvas);`); nl();
  w(`Render.init();`, `Render.setView(${camFov}.0, 1.0, 4000.0);`); nl();
  w(`os.chdir("fonts");`);
  w(`const font = new Font("consola.TTF");`);
  w(`os.chdir("..");`);
  w(`font.scale = 0.6;`,
    `font.outline = 1.0;`,
    `font.outline_color = Color.new(0, 0, 0);`); nl();
  w(`Camera.position(${f3(camPos.x)}, ${f3(camPos.y)}, ${f3(camPos.z)});`,
    `Camera.target(${f3(camTgt.x)}, ${f3(camTgt.y)}, ${f3(camTgt.z)});`,
    `Camera.orbit(0.0, 0.5);`); nl();

  // Lights (exportEnabled only)
  scene.objects.filter(o => o.visible && o.exportEnabled!==false && o.components.light).forEach(obj => {
    const vn = obj.name.replace(/\W+/g,"_").toLowerCase();
    const l = obj.components.light;
    w(`const ${vn}_light = Lights.new();`,
      `Lights.set(${vn}_light, Lights.DIRECTION, ${f3(l.direction.x)}, ${f3(l.direction.y)}, ${f3(l.direction.z)});`,
      `Lights.set(${vn}_light, Lights.AMBIENT,   ${f3(l.ambient.r)}, ${f3(l.ambient.g)}, ${f3(l.ambient.b)});`,
      `Lights.set(${vn}_light, Lights.DIFFUSE,   ${f3(l.diffuse.r)}, ${f3(l.diffuse.g)}, ${f3(l.diffuse.b)});`,
      `Lights.set(${vn}_light, Lights.SPECULAR,  ${f3(l.specular.r)}, ${f3(l.specular.g)}, ${f3(l.specular.b)});`); nl();
  });

  // Unique JS variable name generator (prevents const redeclaration)
  const usedVars = new Set();
  const makeVN = (name) => {
    let base = name.replace(/\W+/g,"_").toLowerCase();
    if (!usedVars.has(base)) { usedVars.add(base); return base; }
    let i = 2;
    while (usedVars.has(`${base}_${i}`)) i++;
    usedVars.add(`${base}_${i}`);
    return `${base}_${i}`;
  };

  // RenderData dedup key — identical for same file+tex+settings combos
  const rdKeyFor = obj => {
    const m = obj.components.model;
    return `${m.file}||${m.textureFile||''}||${m.textureFilter||'LINEAR'}||${m.pipeline||'PL_DEFAULT'}||${m.face_culling||'CULL_FACE_BACK'}||${m.shade_model||'SHADE_GOURAUD'}||${!!m.accurate_clipping}`;
  };

  // These maps are populated during the model block and read when building ctx
  const rdMap  = new Map(); // rdKey → { dataVN, texVN }
  const rdOrder= [];        // ordered unique keys
  const animMap= new Map(); // animFile → animVN

  w(`const gray = Color.new(${bg.r}, ${bg.g}, ${bg.b}, ${bg.a!==undefined?bg.a:128});`); nl();

  // Models — deduplicate RenderData by (file, textureFile) key
  if (modelObjs.length) {
    w(`os.chdir("${dir}");`); nl();

    // Build dedup map: key → { dataVN, texVN, model component }
    modelObjs.forEach(obj => {
      const m = obj.components.model;
      const key = rdKeyFor(obj);
      if (!rdMap.has(key)) {
        const baseName = m.file.replace(/\W+/g,"_").replace(/\.[^.]+$/,"").toLowerCase();
        const dataVN = makeVN(`${baseName}_data`);
        const texVN = (m.textureFile && m.textureFile.trim()) ? makeVN(`${baseName}_tex`) : null;
        rdMap.set(key, { dataVN, texVN, m });
        rdOrder.push(key);
      }
    });

    // Emit unique textures + RenderDatas
    rdOrder.forEach(key => {
      const { dataVN, texVN, m } = rdMap.get(key);
      const hasTex = texVN !== null;
      const tf = m.textureFilter || 'LINEAR';

      if (hasTex) {
        w(`let ${texVN} = null;`);
        w(`{ const _t = std.open("${m.textureFile}", "r"); if (_t) { _t.close();`);
        w(`    ${texVN} = new Image("${m.textureFile}");`);
        w(`} else {`);
        w(`    os.chdir(".."); os.chdir("${texDir}");`);
        w(`    const _t2 = std.open("${m.textureFile}", "r"); if (_t2) { _t2.close();`);
        w(`        ${texVN} = new Image("${m.textureFile}");`);
        w(`    } os.chdir(".."); os.chdir("${dir}");`);
        w(`}}`);
      }
      w(`const ${dataVN} = new RenderData("${m.file}"${hasTex?`, ${texVN}`:""});`,
        `${dataVN}.pipeline = Render.${m.pipeline||"PL_DEFAULT"};`,
        `${dataVN}.face_culling = Render.${m.face_culling||"CULL_FACE_BACK"};`,
        `${dataVN}.shade_model = Render.${m.shade_model||"SHADE_GOURAUD"};`,
        `${dataVN}.accurate_clipping = ${!!m.accurate_clipping};`);
      if (hasTex) w(`if (${texVN}) ${texVN}.filter = ${tf};`);
      if (!hasTex) w(`try { ${dataVN}.getTexture(0).filter = ${tf}; } catch(e){}`);
      nl();
    });

    // Emit one RenderObject per scene object, referencing the shared _data
    modelObjs.forEach(obj => {
      const m = obj.components.model, t = obj.components.transform;
      const key = rdKeyFor(obj);
      const { dataVN } = rdMap.get(key);
      const vn = makeVN(obj.name);
      w(`const ${vn} = new RenderObject(${dataVN});`,
        `${vn}.position = {x:${f3(t.position.x)}, y:${f3(t.position.y)}, z:${f3(t.position.z)}};`,
        `${vn}.rotation = {x:${f3(t.rotation.x)}, y:${f3(t.rotation.y)}, z:${f3(t.rotation.z)}};`,
        `${vn}.scale    = {x:${f3(t.scale.x)}, y:${f3(t.scale.y)}, z:${f3(t.scale.z)}};`);
      if (obj.components.animator && obj.components.animator.file) {
        const a = obj.components.animator;
        // Deduplicate: one AnimCollection per unique anim file
        if (!animMap.has(a.file)) {
          const animVN = makeVN(a.file.replace(/\W+/g,"_").replace(/\.[^.]+$/,"").toLowerCase() + "_anims");
          animMap.set(a.file, animVN);
          w(`const ${animVN} = new AnimCollection("${a.file}");`);
        }
        const animVN = animMap.get(a.file);
        w(`${vn}.playAnim(${animVN}["${a.defaultAnim}"], ${!!a.loop});`);
      }
      obj._vn = vn;
      nl();
    });

    w(`os.chdir("..");`); nl();
  }

  // Sounds (exportEnabled only)
  scene.objects.filter(o => o.visible && o.exportEnabled!==false && o.components.sound && o.components.sound.file).forEach(obj => {
    const vn = obj.name.replace(/\W+/g,"_").toLowerCase();
    const s = obj.components.sound;
    w(`const ${vn}_snd = Sound.Stream("sounds/${s.file}");`);
    if (s.playOnStart) w(`${vn}_snd.play();`);
    nl();
  });

  // Shared ctx object — scripts communicate through this
  if (scriptFiles.length) {
    // Partition by ctxEnabled so only opted-in objects appear in ctx
    const ctxMdl   = modelObjs.filter(o => o.ctxEnabled!==false && o._vn);
    const ctxLight  = scene.objects.filter(o => o.visible && o.exportEnabled!==false && o.ctxEnabled!==false && o.components.light);
    const ctxSound  = scene.objects.filter(o => o.visible && o.exportEnabled!==false && o.ctxEnabled!==false && o.components.sound && o.components.sound.file);

    w(`// ════════════════════════════════════════════════════`);
    w(`// ctx — shared game state + all scene resource refs`);
    w(`// Access from ANY behavior script without editing main.js`);
    w(`// ════════════════════════════════════════════════════`);
    w(`const ctx = {`);
    w(`    pad: null,     // updated each frame`);
    w(``);

    // ── RenderObjects ─────────────────────────────────────
    w(`    // ── RenderObjects — mutate .position / .rotation / .scale / .playAnim() ──`);
    w(`    // ctx.RenderObjects.player.rotation = { x:0, y:ctx.player.rotY, z:0 };`);
    w(`    RenderObjects: {`);
    ctxMdl.forEach(obj => w(`        ${obj._vn}: ${obj._vn},`));
    w(`    },`);
    w(``);

    // ── RenderDatas ───────────────────────────────────────
    w(`    // ── RenderDatas — swap pipeline, texture, shade_model at runtime ──`);
    w(`    // ctx.RenderDatas.player.pipeline = Render.PL_SPECULAR;`);
    w(`    RenderDatas: {`);
    ctxMdl.forEach(obj => {
      const e = rdMap.get(rdKeyFor(obj));
      if (e) w(`        ${obj._vn}: ${e.dataVN},`);
    });
    w(`    },`);
    w(``);

    // ── textures ──────────────────────────────────────────
    const ctxHasTex = ctxMdl.some(obj => rdMap.get(rdKeyFor(obj))?.texVN);
    w(`    // ── textures — model Image refs (filter, color, swap at runtime) ──`);
    w(`    // ctx.textures.player.filter = NEAREST;`);
    w(`    textures: {`);
    ctxMdl.forEach(obj => {
      const e = rdMap.get(rdKeyFor(obj));
      if (e?.texVN) w(`        ${obj._vn}: ${e.texVN},`);
    });
    w(`    },`);
    w(``);

    // ── animCollections ───────────────────────────────────
    w(`    // ── animCollections — play different clips at runtime ──`);
    w(`    // ctx.animCollections.player["Walk"] → pass to .playAnim()`);
    w(`    animCollections: {`);
    ctxMdl.forEach(obj => {
      const aFile = obj.components.animator?.file;
      const aVN   = aFile ? animMap.get(aFile) : null;
      if (aVN) w(`        ${obj._vn}: ${aVN},`);
    });
    w(`    },`);
    w(``);

    // ── lights ────────────────────────────────────────────
    w(`    // ── lights — IDs for Lights.set() — change direction/color ──`);
    w(`    // Lights.set(ctx.lights.sun, Lights.DIRECTION, x, y, z);`);
    w(`    lights: {`);
    ctxLight.forEach(obj => {
      const vn = obj.name.replace(/\W+/g,"_").toLowerCase();
      w(`        ${vn}: ${vn}_light,`);
    });
    w(`    },`);
    w(``);

    // ── sounds ────────────────────────────────────────────
    w(`    // ── sounds — Sound.Stream refs — play/pause/seek ──`);
    w(`    // ctx.sounds.bgm.position = 0; ctx.sounds.bgm.play();`);
    w(`    sounds: {`);
    ctxSound.forEach(obj => {
      const vn = obj.name.replace(/\W+/g,"_").toLowerCase();
      w(`        ${vn}: ${vn}_snd,`);
    });
    w(`    },`);
    w(`};`); nl();
  }

  // UI Images — load before loop (still needed for Image type elements)
  const uiImageEls = (scene.uiElements||[]).filter(e => e.visible && e.type==="Image" && e.image);
  if (uiImageEls.length) {
    w(`// ── UI Images ────────────────────────────────────────`);
    uiImageEls.forEach((el,i) => {
      const vn = `ui_img_${i}`;
      w(`let ${vn} = null;`);
      // Try textures/ first
      w(`os.chdir("${texDir}");`);
      w(`{ const _f = std.open("${el.image}", "r"); if (_f) { _f.close();`);
      w(`    ${vn} = new Image("${el.image}");`);
      w(`    ${vn}.width = ${el.width}; ${vn}.height = ${el.height}; ${vn}.filter = ${el.imageFilter||'LINEAR'};`);
      w(`} }`);
      // If not found, try models dir
      w(`os.chdir("..");`);
      w(`if (!${vn}) {`);
      w(`    os.chdir("${dir}");`);
      w(`    { const _f2 = std.open("${el.image}", "r"); if (_f2) { _f2.close();`);
      w(`        ${vn} = new Image("${el.image}");`);
      w(`        ${vn}.width = ${el.width}; ${vn}.height = ${el.height}; ${vn}.filter = ${el.imageFilter||'LINEAR'};`);
      w(`    } }`);
      w(`    os.chdir("..");`);
      w(`}`);
    });
    nl();
  }

  w(`let pad = Pads.get();`, `let lx=0, ly=0;`); nl();

  // Alpha test global setup (if enabled)
  if (scene.alphaTestEnable) {
    w(`// ── Alpha Test ────────────────────────────────────────────`);
    w(`Screen.setParam(Screen.ALPHA_TEST_ENABLE, true);`);
    w(`Screen.setParam(Screen.ALPHA_TEST_METHOD, Screen.${scene.alphaTestMethod||'ALPHA_GREATER'});`);
    w(`Screen.setParam(Screen.ALPHA_TEST_REF, ${scene.alphaTestRef||50});`);
    w(`Screen.setParam(Screen.ALPHA_TEST_FAIL, Screen.${scene.alphaTestFail||'ALPHA_FAIL_NO_UPDATE'});`);
    w(`Screen.setParam(Screen.PIXEL_ALPHA_BLEND_ENABLE, ${!!scene.pixelAlphaBlend});`);
    nl();
  }

  // Call init() for each behavior before loop
  if (scriptObjs.length) {
    w(`// ── Init behaviors ───────────────────────────────────`);
    // Each unique file's init is called once, but we call per-object so multiple
    // objects sharing the same script each get their own init pass
    scriptObjs.forEach(obj => {
      const sc = obj.components.script;
      const alias = sc.file.replace(/\W+/g,"_").replace(/\.js$/i,"").toLowerCase();
      w(`init_${alias}(ctx);`);
    });
    nl();
  }

  // Sort UI elements by zindex — declared BEFORE the game loop
  const sortedUI = [...(scene.uiElements||[]).filter(e=>e.visible)].sort((a,b)=>(a.zindex||0)-(b.zindex||0));

  // ── Dynamic UI objects (mutable at runtime) — MUST be before the game loop ──
  if (sortedUI.length) {
    w(`// ── UI Objects (mutate at runtime to animate / update) ──`);
    sortedUI.forEach(el => {
      const ff = el.fontFile && el.fontFile!=="default" ? el.fontFile : null;
      const vn = (el.name||el.type).replace(/\W+/g,"_").toLowerCase();
      const tc = el.textColor||{r:200,g:200,b:200,a:128};
      const bc = el.bgColor||{r:50,g:50,b:80,a:200};
      const brc = el.barColor||{r:0,g:200,b:100,a:200};
      const bbc = el.barBgColor||{r:30,g:30,b:30,a:200};
      const txt = (el.text||"").replace(/\\/g,"\\\\").replace(/"/g,'\\"');
      const fontVar = ff ? `"fonts/${ff}"` : `"default"`;
      w(`const ${vn} = {`);
      w(`    type: "${el.type}",`);
      w(`    x: ${el.x}, y: ${el.y}, w: ${el.width}, h: ${el.height},`);
      w(`    visible: ${el.visible},`);
      if (el.type==="Text"||el.type==="Button") {
        w(`    text: "${txt}",`);
        w(`    font: new Font(${fontVar}),`);
        w(`    fontSize: ${el.fontSize||14},`);
        w(`    color: Color.new(${tc.r},${tc.g},${tc.b},${tc.a}),`);
      }
      if (el.type==="Panel"||el.type==="Button") {
        w(`    bgColor: Color.new(${bc.r},${bc.g},${bc.b},${bc.a}),`);
      }
      if (el.type==="ProgressBar") {
        w(`    progress: ${(el.progress??0.6).toFixed(3)},`);
        w(`    barColor: Color.new(${brc.r},${brc.g},${brc.b},${brc.a}),`);
        w(`    bgColor: Color.new(${bbc.r},${bbc.g},${bbc.b},${bbc.a}),`);
      }
      if (el.type==="Image" && el.image) {
        const imgIdx = uiImageEls.findIndex(e=>e===el);
        w(`    image: ui_img_${imgIdx},`);
      }
      w(`};`);
      if (el.type==="Text"||el.type==="Button") {
        w(`${vn}.font.scale = ${(el.fontSize||14)/14 * 0.6};`);
      }
      nl();
    });

    // Generate draw function
    w(`// ── drawUI() — call once per frame after DEPTH_TEST=false ─`);
    w(`function drawUI() {`);
    sortedUI.forEach(el => {
      const vn = (el.name||el.type).replace(/\W+/g,"_").toLowerCase();
      w(`    if (${vn}.visible) {`);
      if (el.type==="Panel") {
        w(`        Draw.rect(${vn}.x, ${vn}.y, ${vn}.w, ${vn}.h, ${vn}.bgColor);`);
      } else if (el.type==="Text") {
        w(`        ${vn}.font.color = ${vn}.color;`);
        w(`        ${vn}.font.print(${vn}.x, ${vn}.y, ${vn}.text);`);
      } else if (el.type==="Button") {
        w(`        Draw.rect(${vn}.x, ${vn}.y, ${vn}.w, ${vn}.h, ${vn}.bgColor);`);
        w(`        ${vn}.font.color = ${vn}.color;`);
        w(`        ${vn}.font.print(${vn}.x + 5, ${vn}.y + Math.floor(${vn}.h / 2) - 5, ${vn}.text);`);
        if (el.interactive) {
          w(`        // TODO: check pad input + hover for button interaction`);
        }
      } else if (el.type==="ProgressBar") {
        w(`        Draw.rect(${vn}.x, ${vn}.y, ${vn}.w, ${vn}.h, ${vn}.bgColor);`);
        w(`        Draw.rect(${vn}.x, ${vn}.y, Math.floor(${vn}.w * ${vn}.progress), ${vn}.h, ${vn}.barColor);`);
      } else if (el.type==="Image") {
        w(`        if (${vn}.image) ${vn}.image.draw(${vn}.x, ${vn}.y);`);
      }
      w(`    }`);
    });
    w(`}`); nl();

    // Collect scripts for UI elements
    const uiScriptObjs = sortedUI.filter(el=>el.script?.file);
    uiScriptObjs.forEach(el => {
      const fname = el.script.file;
      if (!seenScripts.has(fname)) {
        const uploaded = uploadedFiles.find(f => f.name === fname && f.cat === 'scripts');
        seenScripts.set(fname, uploaded ? uploaded.content : `// ${fname}\nexport function init(ctx){}\nexport function update(ctx,pad){}`);
      }
    });

    // Expose all UI elements in ctx.ui (+ sub-objects for fonts and images)
    if (scriptFiles.length || uiScriptObjs.length) {
      w(`// ── ctx.ui — UI element refs + fonts + images ─────────────`);
      w(`ctx.ui = {`);
      sortedUI.forEach(el => {
        const vn = (el.name||el.type).replace(/\W+/g,"_").toLowerCase();
        w(`    ${vn},`);
      });
      const fontEls = sortedUI.filter(el => el.type==="Text" || el.type==="Button");
      if (fontEls.length) {
        w(`    fonts: {`);
        fontEls.forEach(el => {
          const vn = (el.name||el.type).replace(/\W+/g,"_").toLowerCase();
          w(`        ${vn}: ${vn}.font,`);
        });
        w(`    },`);
      }
      if (uiImageEls.length) {
        w(`    images: {`);
        uiImageEls.forEach((el,i) => {
          const vn = (el.name||el.type).replace(/\W+/g,"_").toLowerCase();
          w(`        ${vn}: ui_img_${i},`);
        });
        w(`    },`);
      }
      w(`};`); nl();
    }
  }

  // Game loop
  w(`// ─── Game Loop ─────────────────────────────────────────`);
  w(`while (true) {`);
  w(`    Screen.clear(gray);`);
  w(`    Camera.update();`);
  w(`    pad.update();`); nl();
  if (scriptObjs.length) w(`    ctx.pad = pad;`); nl();

  w(`    lx = ((pad.lx > 25 || pad.lx < -25) ? pad.lx : 0) / 1024.0;`);
  w(`    ly = ((pad.ly > 25 || pad.ly < -25) ? pad.ly : 0) / 1024.0;`);
  if (!camObj || !camObj.components.script) {
    w(`    if (lx !== 0 || ly !== 0) { Camera.orbit(lx, ly); }`);
    w(`    if (pad.pressed(Pads.R2)) { Camera.zoom(0.2); }`);
    w(`    else if (pad.pressed(Pads.L2)) { Camera.zoom(-0.2); }`);
  }
  w(`    if (pad.justPressed(Pads.TRIANGLE)) { os.chdir(".."); std.reload("main.js"); }`); nl();

  // Call update() for each scripted object, then auto-apply ctx-key → position binding.
  // For rotation/scale/animation, scripts use ctx.RenderObjects.<name> directly — no binding needed.
  if (scriptObjs.length) {
    w(`    // ── Update behaviors ─────────────────────────────────`);
    w(`    // ctx.RenderObjects / RenderDatas / textures / lights / sounds — direct refs.`);
    w(`    // Pattern A (position shortcut): write ctx.player.x/y/z → auto-applied below.`);
    w(`    // Pattern B (full control):      ctx.RenderObjects.player.rotation = {x,y,z};`);
    scriptObjs.forEach(obj => {
      const sc = obj.components.script;
      const alias = sc.file.replace(/\W+/g,"_").replace(/\.js$/i,"").toLowerCase();
      // ctxKey: explicit override or default to sanitized object name
      const ctxKey = (sc.ctxKey||"").trim() || obj.name.replace(/\W+/g,"_").toLowerCase();
      w(`    update_${alias}(ctx, pad);`);
      // Pattern A auto-binding: position only (opt-in via ctx key)
      if (obj.components.model && obj.components.model.file && obj._vn) {
        w(`    if (ctx.${ctxKey} && ctx.${ctxKey}.x !== undefined)`);
        w(`        ${obj._vn}.position = {x:ctx.${ctxKey}.x, y:ctx.${ctxKey}.y||0, z:ctx.${ctxKey}.z||0};`);
      }
    });
    nl();
  }

  w(`    Screen.setParam(Screen.DEPTH_TEST_ENABLE, true);`,
    `    Screen.setParam(Screen.DEPTH_TEST_METHOD, Screen.DEPTH_GEQUAL);`); nl();

  modelObjs.forEach(obj => w(`    ${obj._vn || obj.name.replace(/\W+/g,"_").toLowerCase()}.render();`));
  if (modelObjs.length) nl();

  w(`    Screen.setParam(Screen.DEPTH_TEST_ENABLE, false);`); nl();

  if (sortedUI && sortedUI.length) {
    w(`    drawUI();`); nl();
  }

  if (scene.showDebugInfo) {
    w(`    const _rs = Render.stats();`);
    w(`    const _ei = System.getCPUInfo();`);
    w(`    const _fm = \`RAM: \${Math.floor(System.getMemoryStats().used/1048576)}MB / \${Math.floor(_ei.RAMSize/1048576)}MB\`;`);
    w(`    font.print(10, 10, Screen.getFPS(360) + " FPS | " + _fm);`);
    w(`    font.print(10, 30, "Static VRAM: " + Screen.getMemoryStats(Screen.VRAM_USED_STATIC)/1024 + "KB | Dynamic VRAM: " + Screen.getMemoryStats(Screen.VRAM_USED_DYNAMIC)/1024 + "KB");`);
  } else {
    w(`    font.print(10, 10, Screen.getFPS(360) + " FPS");`);
  }
  nl();
  if (scene.linkedScenes.length) {
    scene.linkedScenes.forEach(lid => {
      const ls = project.scenes.find(s => s.id === lid);
      if (ls) w(`    // if (cond) { std.reload("${ls.name}.js"); }`);
    });
    nl();
  }
  w(`    Screen.flip();`, `}`);

  return { main: L.join("\n"), scripts: scriptFiles.map(({filename,content})=>({filename,content})) };
}

// ═══════════════════════════════════════════════════════════════
//  3D VIEWPORT WITH GIZMOS
// ═══════════════════════════════════════════════════════════════
function Viewport3D({sceneData, selectedId, selectedIds, onSelect, onToggleSel, onUpdateTransform, uploadedFiles, gizmoMode, gizmoSpace, pivotMode, viewLighting, onToggleLighting, snapEnabled, snapSize}) {
  const mountRef = useRef(null);
  const threeRef = useRef(null);
  const gizmoRef = useRef({grp:null, mode:'translate', axis:null, dragging:false, startMouse:{x:0,y:0}, startVal:null, axisDir:new THREE.Vector3()});
  const snapRef = useRef({enabled:false, size:0.5});
  useEffect(()=>{ snapRef.current={enabled:!!snapEnabled, size:snapSize||0.5}; },[snapEnabled,snapSize]);
  const cancelRef = useRef(Symbol());
  const sceneDataRef = useRef(sceneData);
  const viewLightingRef = useRef(viewLighting);
  useEffect(()=>{ sceneDataRef.current = sceneData; }, [sceneData]);
  useEffect(()=>{ viewLightingRef.current = viewLighting; }, [viewLighting]);

  // ── Init Three.js ───────────────────────────────────────────
  useEffect(()=>{
    const mount=mountRef.current; if(!mount)return;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setSize(mount.clientWidth,mount.clientHeight);
    renderer.sortObjects=true;
    mount.appendChild(renderer.domElement);

    const scene=new THREE.Scene();
    // Background color will be updated when sceneData changes
    scene.background=new THREE.Color(0x07101a);
    const camera=new THREE.PerspectiveCamera(60,mount.clientWidth/mount.clientHeight,0.01,5000);
    camera.position.set(0,6,16);

    const controls=new THREE.OrbitControls(camera,renderer.domElement);
    controls.enableDamping=true; controls.dampingFactor=0.07;
    controls.screenSpacePanning=true;

    // Block OrbitControls when pointer hits a gizmo handle (capture phase fires before controls)
    const capturePointerDown=(e)=>{
      const gz=gizmoRef.current;
      if(!gz||!gz.grp)return;
      const rect=renderer.domElement.getBoundingClientRect();
      const ndc=new THREE.Vector2(
        ((e.clientX-rect.left)/rect.width)*2-1,
        -((e.clientY-rect.top)/rect.height)*2+1
      );
      const ray=new THREE.Raycaster(); ray.setFromCamera(ndc,camera);
      const gizmoMeshes=[];
      gz.grp.traverse(ch=>{if(ch.isMesh&&ch.userData.gizmoAxis)gizmoMeshes.push(ch);});
      const hits=ray.intersectObjects(gizmoMeshes,false);
      if(hits.length>0){
        // Prevent OrbitControls from receiving this event
        e.stopPropagation();
        controls.enabled=false;
        // Set up drag state
        const axis=hits[0].object.userData.gizmoAxis;
        gz.dragging=true; gz.axis=axis;
        gz.activeId=gz.currentSelectedId||null;
        gz.multiIds=gz.selectedIds&&gz.selectedIds.length>1?gz.selectedIds:(gz.activeId?[gz.activeId]:[]);
        gz.pivotMode=gz.pivotMode||'individual'; // snapshot at drag start
        gz.startMouse={x:e.clientX,y:e.clientY};
        if(gz.activeId){
          // Store per-object start values for all selected
          gz.startVals={};
          gz.multiIds.forEach(mid=>{
            const g=threeRef.current?.meshMap[mid]; if(!g)return;
            const isLight=g.userData.isLightObj||false;
            let initLightDir=null;
            if(isLight){
              const sd=sceneDataRef.current;
              if(sd){
                const flatObjs=[];
                const flatten=os=>os.forEach(o=>{flatObjs.push(o);flatten(o.children||[]);});
                flatten(sd.objects||[]);
                const lo=flatObjs.find(o=>o.id===mid);
                if(lo&&lo.components.light){const d=lo.components.light.direction;initLightDir={x:d.x,y:d.y,z:d.z};}
              }
            }
            gz.startVals[mid]={
              px:g.position.x,py:g.position.y,pz:g.position.z,
              rx:g.rotation.x,ry:g.rotation.y,rz:g.rotation.z,
              sx:g.scale.x,sy:g.scale.y,sz:g.scale.z,
              isLight,initLightDir,
            };
          });
          gz.startVal=gz.startVals[gz.activeId]||null; // compat
          const selGrp=threeRef.current?.meshMap[gz.activeId];
          if(selGrp){
            const objPos=selGrp.position.clone().project(camera);
            const rect2=renderer.domElement.getBoundingClientRect();
            gz.objScreenCenter={x:(objPos.x+1)/2*rect2.width+rect2.left,y:(1-objPos.y)/2*rect2.height+rect2.top};
          }
        }
      }
    };
    renderer.domElement.addEventListener('pointerdown', capturePointerDown, true);

    scene.add(new THREE.GridHelper(200,80,0x1a2638,0x0e1c2c));
    scene.add(new THREE.AxesHelper(5));
    const ambLight=new THREE.AmbientLight(0xffffff,0.5); scene.add(ambLight);
    const dirLight=new THREE.DirectionalLight(0xffffff,0.8); dirLight.position.set(5,10,8); scene.add(dirLight);
    threeRef.current={renderer,scene,camera,controls,meshMap:{},ambLight,dirLight};

    let animId;
    const animate=()=>{
      animId=requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene,camera);
    };
    animate();

    const ro=new ResizeObserver(()=>{
      renderer.setSize(mount.clientWidth,mount.clientHeight);
      camera.aspect=mount.clientWidth/mount.clientHeight;
      camera.updateProjectionMatrix();
    });
    ro.observe(mount);

    return()=>{
      cancelAnimationFrame(animId);
      ro.disconnect();
      renderer.domElement.removeEventListener('pointerdown', capturePointerDown, true);
      controls.dispose();
      renderer.dispose();
      if(mount.contains(renderer.domElement)) mount.removeChild(renderer.domElement);
    };
  },[]);

  // ── Sync background color whenever it changes ───────────────
  useEffect(()=>{
    const three=threeRef.current; if(!three||!sceneData?.background) return;
    const bg=sceneData.background;
    three.scene.background=new THREE.Color(bg.r/255,bg.g/255,bg.b/255);
  },[sceneData?.background]);

  // ── Sync lighting: Unlit=bright neutral, Shaded=match Sun object ──
  useEffect(()=>{
    const three=threeRef.current; if(!three) return;
    if(viewLighting==='shaded'){
      const sunObj=sceneData?.objects?.find(o=>o.visible&&o.components?.light);
      const L=sunObj?.components?.light;
      if(L){
        const ar=L.ambient?.r??0.12, ag=L.ambient?.g??0.12, ab=L.ambient?.b??0.12;
        const ambIntensity=Math.max(ar,ag,ab)||0.001;
        three.ambLight.color.setRGB(ar/ambIntensity, ag/ambIntensity, ab/ambIntensity);
        three.ambLight.intensity=ambIntensity;
        const dr=L.diffuse?.r??0.5, dg=L.diffuse?.g??0.5, db=L.diffuse?.b??0.5;
        const difIntensity=Math.max(dr,dg,db)||0.001;
        three.dirLight.color.setRGB(dr/difIntensity, dg/difIntensity, db/difIntensity);
        three.dirLight.intensity=difIntensity;
        const d=L.direction||{x:0,y:1,z:1};
        three.dirLight.position.set(d.x,d.y,d.z);
      } else {
        three.ambLight.color.set(0xffffff); three.ambLight.intensity=0.12;
        three.dirLight.color.set(0xffffff); three.dirLight.intensity=0.5;
        three.dirLight.position.set(0,1,1);
      }
    } else {
      // Unlit — bright neutral
      three.ambLight.color.set(0xffffff); three.ambLight.intensity=0.5;
      three.dirLight.color.set(0xffffff); three.dirLight.intensity=0.8;
      three.dirLight.position.set(5,10,8);
    }
  },[viewLighting, sceneData?.objects]);

  // ── Rebuild scene objects ───────────────────────────────────
  useEffect(()=>{
    const three=threeRef.current; if(!three)return;
    const token=Symbol(); cancelRef.current=token;
    const alive=()=>cancelRef.current===token;

    // Sync background color from scene settings
    if(sceneData?.background){
      const bg=sceneData.background;
      three.scene.background=new THREE.Color(bg.r/255,bg.g/255,bg.b/255);
    }

    Object.values(three.meshMap).forEach(g=>{three.scene.remove(g);disposeGrp(g);});
    three.meshMap={};

    (sceneData?.objects||[]).forEach(obj=>{
      if(!obj.visible)return;
      const t=obj.components.transform;
      const grp=new THREE.Group();
      grp.position.set(t.position.x,t.position.y,t.position.z);
      grp.rotation.set(t.rotation.x,t.rotation.y,t.rotation.z,'XYZ');
      grp.scale.set(t.scale.x||1,t.scale.y||1,t.scale.z||1);
      grp.userData.objId=obj.id;
      three.scene.add(grp);
      three.meshMap[obj.id]=grp;
      grp.userData.pipeline=obj.components?.model?.pipeline||'';

      if(obj.components.model){
        const m=obj.components.model;
        const mf=uploadedFiles.find(f=>f.name===m.file&&f.cat==="models");
        if(!m.file){
          addBox(grp,obj.id,0x4488ff,true,'nf');
        } else if(!mf){
          addBox(grp,obj.id,0xffaa33,true,'mf');
          const ax=new THREE.AxesHelper(0.7); grp.add(ax);
        } else {
          addBox(grp,obj.id,0x00ccff,true,'loading');

          // Embedded texture fallback: if no textureFile set, try same basename + .png
          let texDataUrl=null;
          if(m.textureFile){
            const tf=uploadedFiles.find(f=>f.name===m.textureFile&&f.dataUrl);
            if(tf) texDataUrl=tf.dataUrl;
          } else {
            // Try same base name with .png/.jpg
            const base=m.file.replace(/\.[^.]+$/,'');
            const auto=uploadedFiles.find(f=>f.dataUrl&&(f.name===base+'.png'||f.name===base+'.jpg'||f.name===base+'.jpeg'));
            if(auto) texDataUrl=auto.dataUrl;
          }

          const removePlaceholder=()=>{const ph=grp.getObjectByName('loading');if(ph){grp.remove(ph);ph.geometry&&ph.geometry.dispose();}};

          if(mf.isGltf){
            // GLB/GLTF path
            loadGLTFFromDataURL(mf.dataUrl)
              .then(root=>{
                if(!alive())return;
                removePlaceholder();
                // Scale ×0.5 for viewport preview
                root.scale.multiplyScalar(0.5);
                root.userData.objId=obj.id;
                const noLightsGltf=(m.pipeline||'')=='PL_NO_LIGHTS';
                root.userData.noLights=noLightsGltf;
                root.traverse(ch=>{
                  if(!ch.isMesh) return;
                  ch.userData.objId=obj.id;
                  ch.userData.noLights=noLightsGltf;
                  if(ch.geometry && ch.geometry.hasAttribute('color')){
                    ch.geometry.deleteAttribute('color');
                  }
                  const nearest=(m.textureFilter||'LINEAR')==='NEAREST';
                  const wasArray=Array.isArray(ch.material);
                  const oldMats=[].concat(ch.material);
                  const newMats=oldMats.map(mat=>{
                    let map=null;
                    if(texDataUrl){
                      const tex=new THREE.TextureLoader().load(texDataUrl);
                      tex.flipY=false;
                      if(nearest){ tex.magFilter=THREE.NearestFilter; tex.minFilter=THREE.NearestFilter; }
                      map=tex;
                    } else if(mat.map){
                      map=mat.map;
                      map.magFilter=nearest?THREE.NearestFilter:THREE.LinearFilter;
                      map.minFilter=nearest?THREE.NearestFilter:THREE.LinearMipmapLinearFilter;
                      map.needsUpdate=true;
                    }
                    const bm=new THREE.MeshBasicMaterial({
                      map, side:THREE.DoubleSide,
                      transparent:mat.transparent||false,
                      alphaTest:mat.alphaTest||0,
                    });
                    mat.dispose();
                    return bm;
                  });
                  // Restore original shape: single mat or array
                  ch.material=wasArray?newMats:newMats[0];
                });
                grp.add(root);
                // Apply face_culling, shade_model, and alphaTest=0.5 (masked preview)
                const cullMode=m.face_culling||'CULL_FACE_NONE';
                const flat=(m.shade_model||'SHADE_GOURAUD')==='SHADE_FLAT';
                const side=cullMode==='CULL_FACE_BACK'?THREE.FrontSide:cullMode==='CULL_FACE_FRONT'?THREE.BackSide:THREE.DoubleSide;
                root.traverse(ch=>{
                  if(!ch.isMesh)return;
                  [].concat(ch.material).forEach(mat=>{
                    mat.side=side; mat.flatShading=flat;
                    // Always preview alpha channel as cutout so transparent pixels are visible in editor
                    if(mat.map){mat.alphaTest=0.5;mat.transparent=false;}
                    mat.needsUpdate=true;
                  });
                });
              })
              .catch(err=>{
                if(!alive())return;
                console.warn('[AthenaEditor] GLTF load error:',m.file,err.message);
                removePlaceholder();
                addBox(grp,obj.id,0xff3355,true,'err');
              });
          } else {
            // OBJ path — pass textureFilter
            const noLights=(m.pipeline||'')==='PL_NO_LIGHTS';
            try{
              const mesh=buildMeshFromOBJ(mf.content, texDataUrl, m.textureFilter||'LINEAR');
              if(!alive())return;
              removePlaceholder();
              mesh.userData.objId=obj.id;
              mesh.userData.noLights=noLights;
              mesh.traverse(ch=>{if(ch.isMesh){ch.userData.objId=obj.id;ch.userData.noLights=noLights;}});
              grp.add(mesh);
              // Apply face_culling, shade_model, alphaTest
              {
                const cullMode=m.face_culling||'CULL_FACE_NONE';
                const flat=(m.shade_model||'SHADE_GOURAUD')==='SHADE_FLAT';
                const side=cullMode==='CULL_FACE_BACK'?THREE.FrontSide:cullMode==='CULL_FACE_FRONT'?THREE.BackSide:THREE.DoubleSide;
                mesh.traverse(ch=>{if(ch.isMesh)[].concat(ch.material).forEach(mat=>{
                  // PL_NO_LIGHTS: force MeshBasicMaterial so shaded mode lighting doesn't affect it
                  if(noLights&&mat.isMeshStandardMaterial){
                    const bm=new THREE.MeshBasicMaterial({map:mat.map||null,color:mat.color,side,transparent:mat.transparent,alphaTest:mat.alphaTest});
                    mat.dispose(); ch.material=bm; mat=bm;
                  } else {
                    mat.side=side; mat.flatShading=flat;
                  }
                  if(mat.map){mat.alphaTest=0.5;mat.transparent=false;}
                  mat.needsUpdate=true;
                });});
              }
            }catch(err){
              if(!alive())return;
              console.warn('[AthenaEditor] OBJ parse error:',m.file,err.message);
              removePlaceholder();
              addBox(grp,obj.id,0xff3355,true,'err');
            }
          }
        }
      } else if(obj.type==='light'){
        grp.userData.isLightObj=true;
        const sp=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshBasicMaterial({color:0xffdd44}));
        sp.userData.objId=obj.id; grp.add(sp);
        if(obj.components.light){
          const l=obj.components.light;
          // Negate direction for arrow: arrow shows where light comes FROM, not where it points TO
          const dir=new THREE.Vector3(-l.direction.x,-l.direction.y,-l.direction.z).normalize();
          grp.add(new THREE.ArrowHelper(dir,new THREE.Vector3(),2,0xffdd44,0.3,0.15));
        }
      } else if(obj.type==='camera'){
        const sp=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.3,0.5),new THREE.MeshBasicMaterial({color:0x88ffcc,wireframe:true}));
        sp.userData.objId=obj.id; grp.add(sp);
        const fc=new THREE.Mesh(new THREE.ConeGeometry(0.12,0.3,4),new THREE.MeshBasicMaterial({color:0x88ffcc,wireframe:true}));
        fc.rotation.x=-Math.PI/2; fc.position.z=-0.4; grp.add(fc);
      } else if(obj.type==='sound'){
        const sp=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshBasicMaterial({color:0x44ffaa,wireframe:true}));
        sp.userData.objId=obj.id; grp.add(sp);
      } else {
        grp.add(new THREE.AxesHelper(1));
        const sp=new THREE.Mesh(new THREE.SphereGeometry(0.1,6,6),new THREE.MeshBasicMaterial({color:0x667788}));
        sp.userData.objId=obj.id; grp.add(sp);
      }
    });
  },[sceneData,uploadedFiles]);

  // Keep gizmo mode in ref so document handlers can read it without stale closure
  useEffect(()=>{gizmoRef.current.mode=gizmoMode||'translate';},[gizmoMode]);
  // Keep gizmoSpace in ref
  useEffect(()=>{gizmoRef.current.space=gizmoSpace||'world';},[gizmoSpace]);
  // Keep pivotMode in ref
  useEffect(()=>{gizmoRef.current.pivotMode=pivotMode||'individual';},[pivotMode]);
  // Keep current selectedId + selectedIds in ref for the capture-phase native handler
  useEffect(()=>{gizmoRef.current.currentSelectedId=selectedId;},[selectedId]);
  useEffect(()=>{gizmoRef.current.selectedIds=selectedIds||[];},[selectedIds]);

  // ── Gizmo update ────────────────────────────────────────────
  useEffect(()=>{
    const three=threeRef.current; const gz=gizmoRef.current; if(!three)return;
    if(gz.grp){three.scene.remove(gz.grp);disposeGrp(gz.grp);gz.grp=null;}
    const ids=selectedIds&&selectedIds.length?selectedIds:(selectedId?[selectedId]:[]);
    if(!ids.length)return;
    // Compute median pivot position across all selected objects
    const positions=ids.map(id=>three.meshMap[id]?.position).filter(Boolean);
    if(!positions.length)return;
    const pivot=positions.reduce((acc,p)=>{acc.x+=p.x;acc.y+=p.y;acc.z+=p.z;return acc;},{x:0,y:0,z:0});
    pivot.x/=positions.length; pivot.y/=positions.length; pivot.z/=positions.length;
    const primGrp=three.meshMap[selectedId||ids[0]];
    const gizmo=makeGizmoGroup(gizmoMode||'translate');
    gizmo.position.set(pivot.x,pivot.y,pivot.z);
    if((gizmoSpace||'world')==='local'&&primGrp){
      gizmo.quaternion.copy(primGrp.quaternion);
    }
    const dist=three.camera.position.distanceTo(gizmo.position);
    const s=Math.max(0.5,dist)*0.12;
    gizmo.scale.set(s,s,s);
    three.scene.add(gizmo);
    gz.grp=gizmo;
    gz.mode=gizmoMode||'translate';
    gz.pivotPos=new THREE.Vector3(pivot.x,pivot.y,pivot.z); // stored for median rotate
  },[selectedId,selectedIds,gizmoMode,gizmoSpace,sceneData]);

  // Per-frame gizmo: median-aware position update
  useEffect(()=>{
    const three=threeRef.current; const gz=gizmoRef.current;
    if(!three||!gz.grp||!selectedId)return;
    const ids=selectedIds&&selectedIds.length?selectedIds:[selectedId];
    let gx=0,gy=0,gz_=0,cnt=0;
    if((pivotMode||'individual')==='median'&&ids.length>1){
      ids.forEach(id=>{const g=three.meshMap[id];if(g){gx+=g.position.x;gy+=g.position.y;gz_+=g.position.z;cnt++;}});
      if(cnt){gx/=cnt;gy/=cnt;gz_/=cnt;}
    } else {
      const grp=three.meshMap[selectedId]; if(!grp)return;
      gx=grp.position.x;gy=grp.position.y;gz_=grp.position.z;
    }
    gz.grp.position.set(gx,gy,gz_);
    const dist=Math.max(0.5,three.camera.position.distanceTo(gz.grp.position));
    gz.grp.scale.set(dist*0.15,dist*0.15,dist*0.15);
  });

  // ── Selection highlight ─────────────────────────────────────
  useEffect(()=>{
    const three=threeRef.current; if(!three)return;
    const ids=selectedIds&&selectedIds.length?selectedIds:(selectedId?[selectedId]:[]);
    Object.entries(three.meshMap).forEach(([id,grp])=>{
      const isSel=ids.includes(id);
      grp.traverse(ch=>{
        if(!ch.isMesh||ch.userData.isGizmo||!ch.material)return;
        [].concat(ch.material).forEach(m=>{
          if(m.emissive===undefined)return;
          m.emissive.set(isSel?0x002244:0x000000);
        });
      });
    });
  },[selectedId,selectedIds]);

  // ── Mouse interaction ───────────────────────────────────────
  const getMouseNDC=(clientX,clientY,el)=>{
    const r=el.getBoundingClientRect();
    return new THREE.Vector2(((clientX-r.left)/r.width)*2-1,-((clientY-r.top)/r.height)*2+1);
  };

  // Attach document-level mousemove + mouseup while dragging so fast mouse
  // movements that exit the viewport div are still captured
  useEffect(()=>{
    const gz=gizmoRef.current;
    const onMove=(e)=>{
      const three=threeRef.current;
      if(!three||!gz.dragging||!gz.activeId)return;
      const selGrp=three.meshMap[gz.activeId]; if(!selGrp)return;
      const dx=e.clientX-gz.startMouse.x;
      const dy=e.clientY-gz.startMouse.y;
      const camRight=new THREE.Vector3(); camRight.setFromMatrixColumn(three.camera.matrixWorld,0);
      const camUp=new THREE.Vector3();    camUp.setFromMatrixColumn(three.camera.matrixWorld,1);

      const WORLD_AXES={x:new THREE.Vector3(1,0,0),y:new THREE.Vector3(0,1,0),z:new THREE.Vector3(0,0,1)};
      let axDir=WORLD_AXES[gz.axis].clone();
      if((gz.space||'world')==='local') axDir.applyQuaternion(selGrp.quaternion);
      const axS2=new THREE.Vector2(axDir.dot(camRight), axDir.dot(camUp));
      if(axS2.lengthSq()<0.0001) axS2.set(1,0);
      axS2.normalize();
      const mouseDelta=new THREE.Vector2(dx,-dy);
      const scalar=mouseDelta.dot(axS2);
      const dist=Math.max(0.5, three.camera.position.distanceTo(selGrp.position));
      const delta=scalar*dist*0.003;

      // Get all objects to move (multi-select or just the active one)
      const allIds=gz.multiIds&&gz.multiIds.length>1?gz.multiIds:[gz.activeId];

      if(gz.mode==='translate'){
        const moveDir=axDir.clone().normalize();
        const sn=snapRef.current;
        allIds.forEach(id=>{
          const g=three.meshMap[id]; if(!g)return;
          const sv=gz.startVals?gz.startVals[id]:gz.startVal;
          if(!sv)return;
          let nx=sv.px+moveDir.x*delta;
          let ny=sv.py+moveDir.y*delta;
          let nz=sv.pz+moveDir.z*delta;
          if(sn.enabled){const s=sn.size;nx=Math.round(nx/s)*s;ny=Math.round(ny/s)*s;nz=Math.round(nz/s)*s;}
          g.position.x=nx; g.position.y=ny; g.position.z=nz;
        });
        // Move gizmo: in median mode track the median, in individual track primary
        if(gz.grp){
          if((gz.pivotMode||'individual')==='median'&&allIds.length>1){
            const positions=allIds.map(id=>three.meshMap[id]?.position).filter(Boolean);
            const med=positions.reduce((a,p)=>{a.x+=p.x;a.y+=p.y;a.z+=p.z;return a;},{x:0,y:0,z:0});
            med.x/=positions.length; med.y/=positions.length; med.z/=positions.length;
            gz.grp.position.set(med.x,med.y,med.z);
          } else {
            gz.grp.position.copy(selGrp.position);
          }
        }
      } else if(gz.mode==='rotate'){
        const axScreen2=new THREE.Vector2(axDir.dot(camRight), axDir.dot(camUp));
        const tangent=new THREE.Vector2(-axScreen2.y, axScreen2.x);
        if(tangent.lengthSq()<0.0001) tangent.set(1,0);
        tangent.normalize();
        const dragScalar=mouseDelta.dot(tangent)*-0.015;
        const camDir=new THREE.Vector3().subVectors(three.camera.position, selGrp.position).normalize();
        const facing=camDir.dot(axDir);
        const totalAngle=dragScalar*(facing>=0?1:-1);
        const useMedian=(gz.pivotMode||'individual')==='median'&&gz.pivotPos&&allIds.length>1;
        allIds.forEach(id=>{
          const g=three.meshMap[id]; if(!g)return;
          const sv=gz.startVals?gz.startVals[id]:gz.startVal;
          if(!sv)return;
          const startQuat=new THREE.Quaternion().setFromEuler(new THREE.Euler(sv.rx,sv.ry,sv.rz,'XYZ'));
          let rotAxis=WORLD_AXES[gz.axis].clone();
          if((gz.space||'world')==='local') rotAxis.applyQuaternion(startQuat);
          const deltaQuat=new THREE.Quaternion().setFromAxisAngle(rotAxis,totalAngle);
          if(useMedian){
            // Orbit position around pivot
            const pivot=gz.pivotPos;
            const startPos=new THREE.Vector3(sv.px,sv.py,sv.pz);
            const fromPivot=startPos.clone().sub(pivot);
            fromPivot.applyQuaternion(deltaQuat);
            g.position.copy(pivot.clone().add(fromPivot));
            // Also rotate the object itself
            const newQuat=deltaQuat.clone().multiply(startQuat);
            g.rotation.setFromQuaternion(newQuat,'XYZ');
          } else {
            const newQuat=deltaQuat.multiply(startQuat);
            g.rotation.setFromQuaternion(newQuat,'XYZ');
          }
        });
      } else {
        const sc=Math.max(0.001,1+scalar*0.006);
        allIds.forEach(id=>{
          const g=three.meshMap[id]; if(!g)return;
          const sv=gz.startVals?gz.startVals[id]:gz.startVal;
          if(!sv)return;
          g.scale.x=sv.sx*(gz.axis==='x'?sc:1);
          g.scale.y=sv.sy*(gz.axis==='y'?sc:1);
          g.scale.z=sv.sz*(gz.axis==='z'?sc:1);
        });
      }
    };
    const onUp=(e)=>{
      const three=threeRef.current;
      if(!three||!gz.dragging)return;
      gz.dragging=false;
      three.controls.enabled=true;
      const id=gz.activeId; gz.activeId=null;
      if(!id)return;
      const allIds=gz.multiIds&&gz.multiIds.length>1?gz.multiIds:[id];
      allIds.forEach(mid=>{
        const g=three.meshMap[mid]; if(!g)return;
        const sv=gz.startVals?gz.startVals[mid]:(mid===id?gz.startVal:null);
        const isLight=sv&&sv.isLight;
        let lightDir=null;
        if(isLight&&sv.initLightDir){
          const startQ=new THREE.Quaternion().setFromEuler(new THREE.Euler(sv.rx,sv.ry,sv.rz,'XYZ'));
          const currentQ=g.quaternion.clone();
          const deltaQ=currentQ.multiply(startQ.invert());
          const d=sv.initLightDir;
          const dirVec=new THREE.Vector3(d.x,d.y,d.z).applyQuaternion(deltaQ);
          lightDir={x:parseFloat(dirVec.x.toFixed(3)),y:parseFloat(dirVec.y.toFixed(3)),z:parseFloat(dirVec.z.toFixed(3))};
        }
        onUpdateTransform(mid,{
          position:{x:g.position.x,y:g.position.y,z:g.position.z},
          rotation:{x:g.rotation.x,y:g.rotation.y,z:g.rotation.z},
          scale:{x:g.scale.x,y:g.scale.y,z:g.scale.z},
          lightDir,
        });
      });
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup',   onUp);
    return()=>{
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup',   onUp);
    };
  },[onUpdateTransform]);

  // ── Click-to-select: discriminate click vs drag by movement distance ──────
  const clickRef = useRef({startX:0, startY:0, isDrag:false});

  const handlePointerDown = useCallback(e => {
    clickRef.current = {startX:e.clientX, startY:e.clientY, isDrag:false};
  }, []);

  const handlePointerMove = useCallback(e => {
    const d = clickRef.current;
    const dist = Math.sqrt((e.clientX-d.startX)**2 + (e.clientY-d.startY)**2);
    if (dist > 4) d.isDrag = true;
  }, []);

  const handlePointerUp = useCallback(e => {
    const three = threeRef.current;
    if (!three || clickRef.current.isDrag) return;
    const rect = three.renderer.domElement.getBoundingClientRect();
    const ndc = new THREE.Vector2(
      ((e.clientX - rect.left) / rect.width)  * 2 - 1,
      -((e.clientY - rect.top)  / rect.height) * 2 + 1
    );
    const ray = new THREE.Raycaster();
    ray.setFromCamera(ndc, three.camera);
    const allMeshes = [];
    Object.entries(three.meshMap).forEach(([id, grp]) => {
      grp.traverse(ch => { if (ch.isMesh && !ch.userData.isGizmo) allMeshes.push({mesh:ch, id}); });
    });
    const hits = ray.intersectObjects(allMeshes.map(t => t.mesh), false);
    const multiKey = e.shiftKey || e.ctrlKey || e.metaKey;
    if (hits.length) {
      const found = allMeshes.find(t => t.mesh === hits[0].object);
      if (found) {
        if (multiKey && onToggleSel) { onToggleSel(found.id); return; }
        onSelect(found.id); return;
      }
    }
    if (!multiKey) onSelect(null);
  }, [onSelect, onToggleSel]);

  // F/. key → frame selected  |  A key → frame all
  useEffect(()=>{
    const handler=(e)=>{
      const three=threeRef.current; if(!three) return;
      const isA=e.key==='a'||e.key==='A';
      const isF=e.key==='f'||e.key==='.'||e.key==='F';
      if(!isF&&!isA) return;
      if(isA){
        // Union bounding box of all scene meshes
        const box=new THREE.Box3();
        Object.values(three.meshMap).forEach(grp=>{
          const b=new THREE.Box3().setFromObject(grp);
          if(!b.isEmpty()) box.union(b);
        });
        if(box.isEmpty()) return;
        const center=box.getCenter(new THREE.Vector3());
        const size=box.getSize(new THREE.Vector3()).length();
        const dist=Math.max(size*0.8, 3);
        const dir=three.camera.position.clone().sub(center).normalize();
        three.camera.position.copy(center.clone().add(dir.multiplyScalar(dist)));
        three.controls.target.copy(center);
        three.controls.update();
        return;
      }
      if(!selectedId) return;
      const grp=three.meshMap[selectedId]; if(!grp) return;
      const target=grp.position.clone();
      const box=new THREE.Box3().setFromObject(grp);
      const size=box.isEmpty()?1:box.getSize(new THREE.Vector3()).length();
      const dist=Math.max(size*2, 3);
      const dir=three.camera.position.clone().sub(target).normalize();
      three.camera.position.copy(target.clone().add(dir.multiplyScalar(dist)));
      three.controls.target.copy(target);
      three.controls.update();
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[selectedId]);

  // Compute CSS background from scene data for wrapper div (prevents flash of dark bg)
  const bgCss = sceneData?.background
    ? `rgb(${sceneData.background.r},${sceneData.background.g},${sceneData.background.b})`
    : '#07101a';

  return(
    <div style={{flex:1,position:"relative",overflow:"hidden",background:bgCss}}>
      <div ref={mountRef} style={{width:"100%",height:"100%"}}
        onPointerDown={handlePointerDown}
        onPointerMove={handlePointerMove}
        onPointerUp={handlePointerUp}
      />
      <div style={{position:"absolute",bottom:8,left:8,color:T.textMuted,fontSize:10,pointerEvents:"none",
        background:"rgba(6,10,15,0.8)",padding:"3px 8px",borderRadius:2,lineHeight:"1.7"}}>
Click: select  •  F/. : frame  •  A: frame all  •  Q: translate  •  W: rotate  •  E: scale  •  Tab: world/local  •  L: lighting  •  G: snap  •  H: hide  •  Ctrl+C/V: copy/paste  •  Del: delete  •  Left: orbit  •  Right: pan  •  Scroll: zoom
      </div>
    </div>
  );
}

function addBox(grp,objId,color,wireframe,name){
  const m=new THREE.Mesh(new THREE.BoxGeometry(1,1,1),new THREE.MeshBasicMaterial({color,wireframe}));
  m.userData.objId=objId; if(name)m.name=name; grp.add(m);

function UIEditor({scene,sel,onSelect,onAdd,onUpdate,onDelete,onDuplicate,uploadedFiles}){
  const cvs=useRef(null),dragRef=useRef(null),scRef=useRef(1);
  const imgCache=useRef({});  // name → HTMLImageElement
  const [,rr]=useState(0); const PW=640,PH=448;

  // Pre-load images from uploadedFiles into HTMLImageElement cache
  useEffect(()=>{
    (uploadedFiles||[]).forEach(f=>{
      if(f.cat!=='textures'||!f.dataUrl||imgCache.current[f.name]) return;
      const img=new Image();
      img.onload=()=>{ imgCache.current[f.name]=img; draw(); };
      img.src=f.dataUrl;
    });
  },[uploadedFiles]);

  const draw=useCallback(()=>{
    const c=cvs.current; if(!c||!scene)return;
    const ctx=c.getContext("2d"),sc=scRef.current,W=c.width,H=c.height;
    ctx.fillStyle="#080c10"; ctx.fillRect(0,0,W,H);
    const fx=(W-PW*sc)/2,fy=(H-PH*sc)/2;
    const bg=scene.background;
    ctx.fillStyle=`rgb(${bg.r},${bg.g},${bg.b})`; ctx.fillRect(fx,fy,PW*sc,PH*sc);
    ctx.strokeStyle=T.borderHi; ctx.lineWidth=1; ctx.strokeRect(fx,fy,PW*sc,PH*sc);
    ctx.fillStyle=T.textMuted; ctx.font="9px monospace"; ctx.fillText("PS2  640×448",fx,fy-4);
    ctx.strokeStyle="rgba(255,255,255,0.04)"; ctx.lineWidth=1;
    for(let x=0;x<=PW;x+=64){ctx.beginPath();ctx.moveTo(fx+x*sc,fy);ctx.lineTo(fx+x*sc,fy+PH*sc);ctx.stroke();}
    for(let y=0;y<=PH;y+=64){ctx.beginPath();ctx.moveTo(fx,fy+y*sc);ctx.lineTo(fx+PW*sc,fy+y*sc);ctx.stroke();}
    // Sort by zindex for correct draw order
    const sorted=[...(scene.uiElements||[])].sort((a,b)=>(a.zindex||0)-(b.zindex||0));
    sorted.forEach(el=>{
      if(!el.visible)return;
      const ex=fx+el.x*sc,ey=fy+el.y*sc,ew=el.width*sc,eh=el.height*sc;
      const col=UIC[el.type]||T.text,isSel=el.id===sel;
      if(el.type==="Panel"||el.type==="Button"){const bc=el.bgColor||{r:50,g:50,b:80,a:200};ctx.fillStyle=`rgba(${bc.r},${bc.g},${bc.b},${bc.a/255})`;ctx.fillRect(ex,ey,ew,eh);}
      if(el.type==="ProgressBar"){const bb=el.barBgColor||{r:30,g:30,b:30,a:200};const bc=el.barColor||{r:0,g:200,b:100,a:200};const prog=el.progress??0.6;ctx.fillStyle=`rgba(${bb.r},${bb.g},${bb.b},${bb.a/255})`;ctx.fillRect(ex,ey,ew,eh);ctx.fillStyle=`rgba(${bc.r},${bc.g},${bc.b},${bc.a/255})`;ctx.fillRect(ex,ey,ew*prog,eh);}
      ctx.strokeStyle=isSel?T.accent:col+"88"; ctx.lineWidth=isSel?2:1; ctx.strokeRect(ex,ey,ew,eh);
      if(isSel){ctx.fillStyle="rgba(0,200,255,0.08)";ctx.fillRect(ex,ey,ew,eh);ctx.fillStyle=T.accent;ctx.fillRect(ex+ew-5,ey+eh-5,5,5);}
      const fs=Math.max(8,Math.min(el.fontSize||14,18)*sc);
      // Text color from el.textColor for Text/Button, else use type color
      const tc=el.textColor||{r:200,g:200,b:200,a:128};
      if(el.type==="Text"||el.type==="Button"){
        ctx.fillStyle=`rgba(${tc.r},${tc.g},${tc.b},${tc.a/255})`;
        ctx.font=`${fs}px monospace`; ctx.textAlign="left";
        ctx.fillText(el.text||el.type,ex+3,ey+eh/2+fs*0.35);
        // Show font name as a small label if custom font
        if(el.fontFile&&el.fontFile!=="default"){
          ctx.fillStyle=T.accent+"cc"; ctx.font=`${Math.max(7,fs*0.5)}px monospace`;
          ctx.fillText(el.fontFile,ex+3,ey+eh-2);
        }
      }
      else if(el.type==="Image"){
        const img=imgCache.current[el.image];
        if(img&&img.complete){
          ctx.drawImage(img,ex,ey,ew,eh);
        }else{
          ctx.fillStyle=col+"22";ctx.fillRect(ex,ey,ew,eh);
          ctx.fillStyle=col;ctx.font="9px monospace";ctx.textAlign="left";
          ctx.fillText(el.image?el.image:"(no image)",ex+3,ey+eh/2+3);
        }
      }
      else if(el.type==="ProgressBar"){
        // Show progress % label
        ctx.fillStyle=T.textMuted; ctx.font=`${Math.max(8,eh*0.5)}px monospace`; ctx.textAlign="left";
        ctx.fillText(Math.round((el.progress??0.6)*100)+"%",ex+3,ey+eh/2+4);
      }
      else if(el.type!=="Panel"){ctx.fillStyle=col;ctx.font="9px monospace";ctx.textAlign="left";ctx.fillText(el.type,ex+3,ey+eh/2+3);}
    });
  },[scene,sel]);
  useEffect(()=>{draw();},[draw]);
  useEffect(()=>{
    const c=cvs.current; if(!c)return;
    const ro=new ResizeObserver(()=>{c.width=c.offsetWidth;c.height=c.offsetHeight;scRef.current=Math.min((c.width-40)/PW,(c.height-40)/PH);draw();});
    ro.observe(c); c.width=c.offsetWidth; c.height=c.offsetHeight; scRef.current=Math.min((c.width-40)/PW,(c.height-40)/PH); draw(); return()=>ro.disconnect();
  },[draw]);
  const hitEl=(ex,ey)=>{const c=cvs.current,sc=scRef.current,fx=(c.width-PW*sc)/2,fy=(c.height-PH*sc)/2,mx=(ex-fx)/sc,my=(ey-fy)/sc;const els=scene?.uiElements||[];for(let i=els.length-1;i>=0;i--){const el=els[i];if(mx>=el.x&&mx<=el.x+el.width&&my>=el.y&&my<=el.y+el.height)return el;}return null;};
  const dn=e=>{const r=cvs.current.getBoundingClientRect(),h=hitEl(e.clientX-r.left,e.clientY-r.top);if(h){onSelect(h.id);dragRef.current={id:h.id,mx:e.clientX,my:e.clientY,ox:h.x,oy:h.y};}else onSelect(null);};
  const mv=e=>{if(!dragRef.current)return;const sc=scRef.current,dx=(e.clientX-dragRef.current.mx)/sc,dy=(e.clientY-dragRef.current.my)/sc;onUpdate(dragRef.current.id,"x",Math.round(dragRef.current.ox+dx));onUpdate(dragRef.current.id,"y",Math.round(dragRef.current.oy+dy));draw();rr(n=>n+1);};
  return <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
    <div style={{padding:"4px 8px",background:T.bg2,borderBottom:`1px solid ${T.border}`,display:"flex",gap:6,alignItems:"center",flexShrink:0,flexWrap:"wrap"}}>
      <span style={{color:T.textMuted,fontSize:10}}>ADD:</span>
      {["Text","Image","Button","Panel","ProgressBar"].map(tp=><button key={tp} onClick={()=>onAdd(tp)} style={sBtn({color:UIC[tp],fontSize:10,padding:"2px 7px"})}>+ {tp}</button>)}
      {sel&&<button onClick={()=>onDuplicate(sel)} style={sBtn({color:T.success,fontSize:10})}>⧉ Duplicate</button>}
      {sel&&<button onClick={()=>onDelete(sel)} style={sBtn({color:T.err,marginLeft:"auto",fontSize:10})}>✕ Delete</button>}
    </div>
    <canvas ref={cvs} style={{flex:1,width:"100%",cursor:"default",display:"block"}} onMouseDown={dn} onMouseMove={mv} onMouseUp={()=>{dragRef.current=null;}}/>
  </div>;
}

// Number input that allows free editing — doesn't snap back while typing
function NumInput({value, onChange, step=0.1, style:extraStyle={}}){
  const [local, setLocal] = useState(String(value));
  const [focused, setFocused] = useState(false);

  // Sync from outside only when not focused
  useEffect(()=>{
    if(!focused) setLocal(String(value));
  },[value, focused]);

  const commit=(v)=>{
    const n=parseFloat(v);
    if(!isNaN(n)) onChange(n);
    else setLocal(String(value)); // revert if invalid
  };

  return <input
    lang="en"
    type="text"
    inputMode="decimal"
    value={local}
    onChange={e=>setLocal(e.target.value)}
    onFocus={()=>setFocused(true)}
    onBlur={e=>{ setFocused(false); commit(e.target.value); }}
    onKeyDown={e=>{
      if(e.key==='Enter'){ e.preventDefault(); commit(local); e.target.blur(); return; }
      if(e.key==='Escape'){ e.preventDefault(); setLocal(String(value)); e.target.blur(); return; }
      if(e.key==='ArrowUp')  { e.preventDefault(); const n=(parseFloat(local)||0)+step; setLocal(String(parseFloat(n.toFixed(6)))); onChange(parseFloat(n.toFixed(6))); return; }
      if(e.key==='ArrowDown'){ e.preventDefault(); const n=(parseFloat(local)||0)-step; setLocal(String(parseFloat(n.toFixed(6)))); onChange(parseFloat(n.toFixed(6))); return; }
      // Any letter key: commit and blur so shortcuts (F, Q, W, E, Tab) work immediately after
      if(e.key.length===1 && /[a-zA-Z]/.test(e.key)){
        e.preventDefault(); // don't type the letter
        commit(local);
        e.target.blur();
      }
    }}
    style={{...sInp(),...extraStyle}}
  />;
}
