## Step 5 — Draw the Full Menu

\`\`\`javascript
// In scripts/UIManager.js — called from update() when menu is open

function drawMenu(ctx) {
    const m = ctx.menu;
    if (!m || !m.open) return;

    const W = 640, H = 448;
    // Background overlay
    Draw.rect(0, 0, W, H, Color.new(0, 0, 0, 180));

    // Panel
    const PX = 30, PY = 20, PW = 580, PH = 410;
    Draw.rect(PX, PY, PW, PH, Color.new(10, 12, 30, 240));
    Draw.rect(PX, PY, PW, 2, Color.new(100, 140, 255, 200));

    // Tab bar
    const tabW = PW / TABS.length;
    TABS.forEach((tab, i) => {
        const tx = PX + i * tabW;
        const isActive = tab === m.tab;
        Draw.rect(tx, PY + 2, tabW - 2, 28, isActive
            ? Color.new(60, 80, 200, 220)
            : Color.new(20, 25, 60, 180));
        font.color = isActive
            ? Color.new(255, 255, 255, 220)
            : Color.new(130, 150, 200, 160);
        font.print(tx + 8, PY + 12, tab.charAt(0).toUpperCase() + tab.slice(1));
    });

    // Tab navigation hint
    font.color = Color.new(120, 120, 160, 140);
    font.print(PX + 4, PY + 396, "L1/R1: tabs   ▲: close   ✕: confirm   ○: cancel");

    // Content area
    const CY = PY + 36;
    switch (m.tab) {
        case "status":    drawStatus(ctx, PX+8, CY);    break;
        case "inventory": drawInventory(ctx, PX+8, CY); break;
        case "quests":    drawQuests(ctx, PX+8, CY);    break;
        case "log":       drawLog(ctx, PX+8, CY);       break;
        case "system":    drawSystem(ctx, PX+8, CY);    break;
    }
}

function drawStatus(ctx, x, y) {
    const p = ctx.player;
    if (!p) return;
    font.color = Color.new(200, 220, 255, 200);
    font.print(x, y,      "HP:    " + p.hp + " / " + p.maxHp);
    font.print(x, y + 20, "Level: " + (p.level || 1));
    font.print(x, y + 40, "EXP:   " + (p.exp || 0));
    // HP bar
    Draw.rect(x + 200, y + 3, 200, 12, Color.new(80, 0, 0, 200));
    Draw.rect(x + 200, y + 3, Math.floor(200 * p.hp / p.maxHp), 12, Color.new(220, 50, 50, 220));
}

function drawInventory(ctx, x, y) {
    const inv = ctx.player?.inventory || [];
    const m = ctx.menu;
    if (!inv.length) { font.color = Color.new(130,130,160,160); font.print(x, y, "(empty)"); return; }
    inv.forEach((item, i) => {
        const isSel = i === m.cursor.item;
        if (isSel) Draw.rect(x - 4, y + i*22 - 2, 300, 20, Color.new(60,80,200,120));
        font.color = isSel ? Color.new(255,255,200,220) : Color.new(200,200,220,180);
        font.print(x, y + i * 22, item.name);
    });
}

function drawSystem(ctx, x, y) {
    const s = ctx.menu.system;
    s.items.forEach((item, i) => {
        const isSel = i === s.cursor;
        if (isSel) Draw.rect(x-4, y+i*30-2, 200, 26, Color.new(60,80,200,120));
        font.color = isSel ? Color.new(255,255,200,220) : Color.new(200,200,220,180);
        font.print(x, y + i * 30, item);
    });
    if (s.confirmPending) {
        Draw.rect(160, 180, 320, 80, Color.new(10,10,40,240));
        Draw.rect(160, 180, 320, 2, Color.new(200,100,100,200));
        font.color = Color.new(255,200,100,220);
        font.print(200, 200, "Are you sure?");
        font.print(200, 225, s.confirmPending);
        font.color = Color.new(160,160,180,180);
        font.print(200, 248, "[X] Yes   [O] No");
    }
}

function drawQuests(ctx, x, y) {
    const qs = ctx.game?.quests || [];
    if (!qs.length) { font.color=Color.new(130,130,160,160); font.print(x,y,"No active quests."); return; }
    qs.forEach((q, i) => {
        font.color = q.complete ? Color.new(100,200,100,180) : Color.new(220,200,100,200);
        font.print(x, y + i*22, (q.complete ? "✓ " : "• ") + q.name);
        if (q.desc) { font.color=Color.new(150,150,180,140); font.print(x+12, y+i*22+14, q.desc); }
    });
}

function drawLog(ctx, x, y) {
    const log = ctx.game?.log || [];
    const LINES = 16;
    const recent = log.slice(-LINES);
    recent.forEach((entry, i) => {
        font.color = Color.new(180, 180, 200, 160);
        font.print(x, y + i * 18, entry);
    });
}

- Add \`ctx.game.log.push("Found sword.")\` from any script to populate the log

- For tab slide animation, offset content X by \`Math.floor((1-ease) * 50 * dir)\` during transition
- System > Options can set \`Sound.setVolume()\` and store preferences to Memory Card

## Paso 2 — Input y navegación de pestañas

\`\`\`javascript
export function update(ctx, pad) {
    const m = ctx.menu;
    if (!m) return;

    if (pad.justPressed(Pads.SELECT)) {
        m.abierto = !m.abierto;
        m.sonidos[m.abierto ? "abrir" : "cerrar"].play(Sound.findChannel());
        return;
    }

    if (!m.abierto) return;
    ctx.jugador.menuAbierto = true;

    if (pad.justPressed(Pads.L1)) cambiarPestaña(ctx, -1);
    if (pad.justPressed(Pads.R1)) cambiarPestaña(ctx, +1);
    if (pad.justPressed(Pads.TRIANGLE)) {
        m.abierto = false;
        ctx.jugador.menuAbierto = false;
        m.sonidos.cerrar.play(Sound.findChannel());
        return;
    }

    switch (m.pestaña) {
        case "inventario": actualizarInventario(ctx, pad); break;
        case "sistema":    actualizarSistema(ctx, pad);    break;
    }
}

function cambiarPestaña(ctx, dir) {
    const m = ctx.menu;
    const idx = PESTAÑAS.indexOf(m.pestaña);
    m.pestaña = PESTAÑAS[(idx + dir + PESTAÑAS.length) % PESTAÑAS.length];
    m.cursor.item = 0;
    m.sonidos.pestaña.play(Sound.findChannel());
}

## Paso 3 — Pestaña Sistema

\`\`\`javascript
function actualizarSistema(ctx, pad) {
    const s = ctx.menu.sistema;
    const m = ctx.menu;

    if (s.confirmarPendiente) {
        if (pad.justPressed(Pads.CROSS)) ejecutarSistema(ctx, s.confirmarPendiente);
        if (pad.justPressed(Pads.CIRCLE)) { s.confirmarPendiente = null; m.sonidos.cancelar.play(Sound.findChannel()); }
        return;
    }

    if (pad.justPressed(Pads.UP))   { s.cursor = (s.cursor-1+s.items.length)%s.items.length; m.sonidos.cursor.play(Sound.findChannel()); }
    if (pad.justPressed(Pads.DOWN)) { s.cursor = (s.cursor+1)%s.items.length; m.sonidos.cursor.play(Sound.findChannel()); }
    if (pad.justPressed(Pads.CROSS)) {
        const item = s.items[s.cursor];
        if (item === "Salir al Menú") s.confirmarPendiente = item;
        else { m.sonidos.confirmar.play(Sound.findChannel()); ejecutarSistema(ctx, item); }
    }
}

function ejecutarSistema(ctx, accion) {
    ctx.menu.sistema.confirmarPendiente = null;
    if (accion === "Guardar") guardarJuego(ctx);
    if (accion === "Cargar")  cargarJuego(ctx);
    if (accion === "Salir al Menú") std.reload("MenuPrincipal.js");
}

function DocsModal({onClose,lang}){
  const [page,setPage]=useState(1);
  const doc=DOCS.find(d=>d.id===page)||DOCS[0];
  const L=lang||'en';
  const docTitle=typeof doc.title==='object'?(doc.title[L]||doc.title.en):doc.title;
  const docContent=typeof doc.content==='object'?(doc.content[L]||doc.content.en):doc.content;

  const renderContent=(text)=>{
    const lines=text.trim().split('\n');
    const out=[];
    let inCode=false; let codeBuf=[];
    let inTable=false; let tableRows=[];
    lines.forEach((line,i)=>{
      if(line.startsWith('```')){
        if(inCode){ out.push(<pre key={i} style={{background:T.bg0,border:`1px solid ${T.border}`,borderRadius:3,padding:"10px 12px",margin:"8px 0",fontSize:10,lineHeight:"1.7",color:"#80e8a0",fontFamily:"monospace",overflowX:"auto",whiteSpace:"pre"}}>{codeBuf.join('\n')}</pre>); codeBuf=[]; inCode=false; }
        else{ inCode=true; } return;
      }
      if(inCode){ codeBuf.push(line); return; }
      // Table detection
      if(line.startsWith('|')){
        if(!line.includes('---')){ tableRows.push(line.split('|').slice(1,-1).map(c=>c.trim())); }
        if(!inTable) inTable=true;
        return;
      } else if(inTable){
        inTable=false;
        const header=tableRows[0]; const rows=tableRows.slice(2);
        out.push(<table key={i+'t'} style={{borderCollapse:'collapse',fontSize:10,margin:'6px 0',width:'100%'}}>
          <thead><tr>{header.map((h,hi)=><th key={hi} style={{padding:'3px 8px',background:T.bg3,color:T.accent,textAlign:'left',border:`1px solid ${T.border}`}}>{h}</th>)}</tr></thead>
          <tbody>{rows.map((r,ri)=><tr key={ri}>{r.map((c,ci)=><td key={ci} style={{padding:'3px 8px',border:`1px solid ${T.border}`,color:T.text,fontFamily:'monospace'}}>{c}</td>)}</tr>)}</tbody>
        </table>);
        tableRows=[];
      }
      if(line.startsWith('# ')){out.push(<h2 key={i} style={{color:T.textHi,fontSize:14,fontWeight:700,margin:"10px 0 6px",borderBottom:`1px solid ${T.border}`,paddingBottom:4}}>{line.slice(2)}</h2>);return;}
      if(line.startsWith('## ')){out.push(<h3 key={i} style={{color:T.accent,fontSize:12,fontWeight:700,margin:"8px 0 4px"}}>{line.slice(3)}</h3>);return;}
      if(line.startsWith('**')&&line.endsWith('**')&&!line.slice(2,-2).includes('**')){out.push(<div key={i} style={{color:T.warn,fontSize:11,fontWeight:700,margin:"4px 0"}}>{line.slice(2,-2)}</div>);return;}
      if(line.startsWith('- ')){out.push(<div key={i} style={{color:T.text,fontSize:11,margin:"2px 0",paddingLeft:12}}>• {line.slice(2)}</div>);return;}
      if(!line.trim()){out.push(<div key={i} style={{height:4}}/>);return;}
      const parts=line.split(/(\*\*[^*]+\*\*)/g).map((p,j)=>{
        if(p.startsWith('**')&&p.endsWith('**'))return <strong key={j} style={{color:T.textHi}}>{p.slice(2,-2)}</strong>;
        const cp=p.split(/(`[^`]+`)/g).map((c,k)=>{
          if(c.startsWith('`')&&c.endsWith('`'))return <code key={k} style={{background:T.bg3,color:T.accent,padding:"0 3px",borderRadius:2,fontSize:10}}>{c.slice(1,-1)}</code>;
          return c;
        });
        return cp;
      });
      out.push(<div key={i} style={{color:T.text,fontSize:11,margin:"2px 0",lineHeight:"1.7"}}>{parts}</div>);
    });
    return out;
  };

  return <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9999}}>
    <div style={{background:T.bg1,border:`1px solid ${T.border}`,borderRadius:6,width:"min(900px,96vw)",height:"min(680px,92vh)",display:"flex",flexDirection:"column",overflow:"hidden"}}>

        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <button onClick={()=>{

            const lines=[];
            DOCS.forEach(d=>{

              const content=typeof d.content==='object'?(d.content[L]||d.content.en):d.content;
              lines.push('---\n');
              lines.push('# ' + title + '\n\n');
              lines.push(content + '\n\n');
            });
            const md=lines.join('');
            const b64=btoa(unescape(encodeURIComponent(md)));
            const a=document.createElement('a');
            a.href='data:text/markdown;base64,'+b64;
            a.download='AthenaEditor-Docs.md';
            document.body.appendChild(a);a.click();document.body.removeChild(a);
          }} style={sBtnA({padding:"2px 10px",fontSize:10})}>⬇ Download Docs</button>
          <button onClick={onClose} style={sBtn({padding:"1px 7px"})}>✕</button>
        </div>
      </div>
      <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
        <div style={{width:210,borderRight:`1px solid ${T.border}`,background:T.bg0,overflowY:"auto",flexShrink:0}}>
          {(['editor','scripts']).map(sec=>{
            const secDocs=DOCS.filter(d=>d.section===sec);
            const secLabel=sec==='editor'
              ? (L==='es'?'🗂 USO DEL EDITOR':L==='pt'?'🗂 USO DO EDITOR':'🗂 EDITOR GUIDE')
              : (L==='es'?'📜 EJEMPLOS DE SCRIPTS':L==='pt'?'📜 EXEMPLOS DE SCRIPTS':'📜 SCRIPT EXAMPLES');
            return <div key={sec}>
              <div style={{padding:"8px 10px 4px",color:T.textMuted,fontSize:9,fontWeight:700,letterSpacing:"0.1em",
                borderBottom:`1px solid ${T.border}`,background:T.bg2}}>{secLabel}</div>
              {secDocs.map(d=>{
                const dt=typeof d.title==='object'?(d.title[L]||d.title.en):d.title;
                return(
                  <button key={d.id} onClick={()=>setPage(d.id)}
                    style={sBtn({width:"100%",textAlign:"left",border:"none",borderLeft:d.id===page?`3px solid ${T.accent}`:"3px solid transparent",borderRadius:0,padding:"7px 10px",background:d.id===page?T.sel:"transparent",color:d.id===page?T.textHi:T.text,fontSize:10,display:"flex",alignItems:"center",gap:6})}>
                    <span style={{color:d.id===page?T.accent:T.textMuted,fontSize:11,flexShrink:0}}>{d.icon}</span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{dt}</span>
                  </button>
                );
              })}
            </div>;
          })}
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"16px 20px"}}>
          {renderContent(docContent)}
        </div>
      </div>
    </div>
  </div>;
}
function OItem({obj,depth,sel,selIds,onSel,onToggleSel,onRangeSel,onDel,onToggle,onRename}){
  const [ed,setEd]=useState(false);const [v,setV]=useState(obj.name);
  const [confirmDel,setConfirmDel]=useState(false);
  const isSel=selIds&&selIds.length?selIds.includes(obj.id):obj.id===sel;
  const isPrimary=obj.id===sel;
  const displayType=obj.components?.camera?'camera':obj.components?.light?'light':obj.components?.model?'model':obj.components?.sound?'sound':'empty';
  const col=OC[displayType]||T.empty;
  const commit=()=>{setEd(false);if(v.trim())onRename(obj.id,v.trim());};
  return <>
    <div onClick={e=>{
        if(e.shiftKey){ onRangeSel&&onRangeSel(obj.id); }
        else if(e.ctrlKey||e.metaKey){ onToggleSel&&onToggleSel(obj.id); }
        else{ onSel(obj.id);setConfirmDel(false); }
      }}
      onDoubleClick={()=>{setEd(true);setV(obj.name);}}
      style={{display:"flex",alignItems:"center",padding:`3px 8px 3px ${8+depth*14}px`,cursor:"pointer",minHeight:22,
        background:confirmDel?T.err+"22":isSel?T.sel:"transparent",
        borderLeft:isPrimary?`2px solid ${T.accent}`:isSel?`2px solid ${T.accentDim}`:"2px solid transparent",
        color:isSel?T.textHi:T.text,fontSize:12,gap:5,userSelect:"none"}}>
      <span style={{color:col,fontSize:12,flexShrink:0}}>{OI[displayType]||"◇"}</span>
      {ed?<input autoFocus value={v} onChange={e=>setV(e.target.value)} onBlur={commit}
        onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape")setEd(false);}}
        style={{...sInp({padding:"0 2px",fontSize:12,width:"100%"})}} onClick={e=>e.stopPropagation()}/>
       :<span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
          color:confirmDel?T.err:isPrimary?"#ff9900":undefined}}>{confirmDel?`Delete "${obj.name}"?`:obj.name}</span>}
      <div style={{display:"flex",gap:2,opacity:isSel?1:0,pointerEvents:isSel?"auto":"none",flexShrink:0}}>
        {!confirmDel&&<button onClick={e=>{e.stopPropagation();onToggle(obj.id);}} title={obj.visible?"Hide":"Show"}
          style={sBtn({padding:"0 3px",border:"none",background:"transparent",color:obj.visible?T.accent:T.textMuted,fontSize:10})}>{obj.visible?"◎":"○"}</button>}
        {confirmDel
          ?<>
            <button onClick={e=>{e.stopPropagation();onDel(obj.id);}}
              style={sBtn({padding:"0 5px",border:`1px solid ${T.err}`,background:T.err+"33",color:T.err,fontSize:10,fontWeight:700})}>Yes</button>
            <button onClick={e=>{e.stopPropagation();setConfirmDel(false);}}
              style={sBtn({padding:"0 5px",fontSize:10})}>No</button>
          </>
          :<button onClick={e=>{e.stopPropagation();setConfirmDel(true);}} title="Delete"
            style={sBtn({padding:"0 3px",border:"none",background:"transparent",color:T.err,fontSize:11})}>✕</button>}
      </div>
    </div>
    {obj.children.map(ch=><OItem key={ch.id} obj={ch} depth={depth+1} sel={sel} selIds={selIds} onSel={onSel} onToggleSel={onToggleSel} onRangeSel={onRangeSel} onDel={onDel} onToggle={onToggle} onRename={onRename}/>)}
  </>;
}
function Outliner({objects,uiElements,sel,selIds,selUI,onSel,onToggleSel,onRangeSel,onSelUI,onDel,onDelUI,onToggle,onToggleUI,onRename,onRenameUI,onAdd,onAddUI,onSavePrefab,onDuplicate,width=200}){
  const [filter,setFilter]=useState('');
  const filterLC=filter.toLowerCase().trim();
  const filterTree=(objs)=>{
    if(!filterLC) return objs;
    return objs.reduce((acc,o)=>{
      const ch=filterTree(o.children||[]);
      if(o.name.toLowerCase().includes(filterLC)||ch.length) acc.push({...o,children:ch});
      return acc;
    },[]);
  };
  const visibleObjs=filterTree(objects);
  const visibleUI=(uiElements||[]).filter(e=>!filterLC||e.name?.toLowerCase().includes(filterLC)||e.type.toLowerCase().includes(filterLC));

      <input value={filter} onChange={e=>setFilter(e.target.value)}
        onKeyDown={e=>{if(e.key==='Escape')setFilter('');}}
        placeholder="Filter objects…"
        style={sInp({fontSize:10,padding:"2px 5px"})}/>
      {filter&&<button onClick={()=>setFilter('')} style={sBtn({padding:"0 5px",fontSize:10,color:T.textMuted})}>✕</button>}

    <div style={{flex:1,overflowY:"auto",padding:"4px 0"}}>
      {selIds&&selIds.length>1&&<div style={{padding:"2px 8px",color:T.warn,fontSize:9,borderBottom:`1px solid ${T.border}`,marginBottom:2}}>
        {selIds.length} selected — Ctrl+click: add/remove · Shift+click: range
      </div>}
      {objects.length===0&&(uiElements||[]).length===0&&<div style={{padding:"20px 12px",color:T.textMuted,fontSize:11,textAlign:"center"}}>No objects.<br/>Click + to add.</div>}
      {visibleObjs.map(obj=><OItem key={obj.id} obj={obj} depth={0} sel={sel} selIds={selIds||[]} onSel={id=>{onSel(id);onSelUI(null);}} onToggleSel={onToggleSel} onRangeSel={onRangeSel} onDel={onDel} onToggle={onToggle} onRename={onRename}/>)}
      {/* UI Elements section */}
      {visibleUI.length>0&&<>
        <div style={{padding:"4px 8px 2px",color:T.textMuted,fontSize:9,fontWeight:700,letterSpacing:"0.08em",marginTop:4,display:"flex",alignItems:"center",gap:4}}>

          <button onClick={()=>onAddUI("Text")} style={sBtn({padding:"0 4px",fontSize:9,marginLeft:"auto",color:T.success})}>+</button>
        </div>
        {visibleUI.map(el=>{
          const isSel=el.id===selUI;
          return(

                background:isSel?T.sel:"transparent",borderLeft:isSel?`2px solid ${T.accent}`:"2px solid transparent"}}>

              <button onClick={e=>{e.stopPropagation();onToggleUI(el.id);}}
                style={sBtn({padding:"0 2px",fontSize:9,color:el.visible?T.textMuted:T.err,border:"none",background:"transparent"})}>
                {el.visible?"◉":"○"}
              </button>
              <button onClick={e=>{e.stopPropagation();onDelUI(el.id);}}
                style={sBtn({padding:"0 2px",fontSize:9,color:T.err,border:"none",background:"transparent"})}>✕</button>
            </div>);
        })}

    </div>
    <div style={{padding:6,borderTop:`1px solid ${T.border}`,display:"flex",gap:4}}>

  </div>;

function AthenaEditor(){
  const [project,setProject]=useState(()=>{
    const s=mkScene("MainScene");
    const sun=mkObject("Sun","light"); sun.components.light=mkLight();
    const player=mkObject("Player","model"); player.components.model=mkModel();
    // Camera as an object in the outliner
    const cam=mkObject("Main Camera","camera");
    cam.components.camera=mkCameraComp();
    cam.components.transform.position=v3(0,2,10);
    s.objects=[sun,player,cam];
    return{name:"MyPS2Game",scenes:[s],activeSceneId:s.id,prefabs:[]};
  });
  const [uploadedFiles,setUploadedFiles]=useState([]);
  const uploadedFilesRef=useRef([]);
  useEffect(()=>{uploadedFilesRef.current=uploadedFiles;},[uploadedFiles]);
  const [selId,setSelId]=useState(null);
  const [selIds,setSelIds]=useState([]); // multi-select set

  // Select single (clears multi)
  const selectOne=(id)=>{setSelId(id);setSelIds(id?[id]:[]);};
  // Toggle id in multi-select set (ctrl click)
  const toggleSel=(id)=>{
    setSelIds(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];
      setSelId(next.length?next[next.length-1]:null);
      return next;
    });
  };

  // Shift-click: select range between lastSel and clicked id in flat outliner order
  const rangeSel=(id)=>{
    if(!activeScene) return;
    const flat=[];
    const collect=(objs)=>objs.forEach(o=>{flat.push(o.id);collect(o.children||[]);});
    collect(activeScene.objects||[]);
    const anchorId=selId;
    if(!anchorId){ selectOne(id); return; }
    const ai=flat.indexOf(anchorId), bi=flat.indexOf(id);
    if(ai<0||bi<0){ toggleSel(id); return; }
    const lo=Math.min(ai,bi), hi=Math.max(ai,bi);
    const range=flat.slice(lo,hi+1);
    setSelIds(prev=>{
      const merged=[...new Set([...prev,...range])];
      setSelId(id);
      return merged;
    });
  };
  const [selUIId,setSelUIId]=useState(null);
  const [tab,setTab]=useState("viewport");
  const [navTab,setNavTab]=useState("files");
  const [navSelFile,setNavSelFile]=useState(null);
  const [navSelPrefab,setNavSelPrefab]=useState(null);

  const activeScene=project.scenes.find(s=>s.id===project.activeSceneId);
  const selObj=selId?findObj(activeScene?.objects||[],selId):null;
  const selUI=selUIId?(activeScene?.uiElements||[]).find(e=>e.id===selUIId):null;

  // All selected objects (flat, from active scene)
  const selObjs=useMemo(()=>{
    if(!activeScene) return [];
    const flat=[];
    const collect=(objs)=>objs.forEach(o=>{flat.push(o);collect(o.children||[]);});
    collect(activeScene.objects||[]);
    return flat.filter(o=>selIds.includes(o.id));
  },[activeScene,selIds]);

  const selNavFile=(id)=>{setNavSelFile(id);if(id){selectOne(null);setSelUIId(null);setNavSelPrefab(null);}};
  const selNavPrefab=(pid)=>{setNavSelPrefab(pid);if(pid){selectOne(null);setSelUIId(null);setNavSelFile(null);}};

  // Prefab: save edits back to prefabs array
  const updPrefab=(pf)=>mut(p=>{const i=p.prefabs.findIndex(x=>x._pid===pf._pid);if(i>=0)p.prefabs[i]=structuredClone(pf);});

  // Prefab: apply component changes to every instance in every scene
  const applyPrefab=(pf)=>mut(p=>{
    p.scenes.forEach(scene=>{
      const apply=(objs)=>objs.forEach(obj=>{
        if(obj.name===pf.name){
          // Update components, keep position/id/name/children
          const pos=obj.components?.transform?.position;
          const rot=obj.components?.transform?.rotation;
          const scl=obj.components?.transform?.scale;
          obj.components=structuredClone(pf.components||{});
          if(pos&&obj.components.transform){obj.components.transform.position=pos;obj.components.transform.rotation=rot;obj.components.transform.scale=scl;}
        }
        apply(obj.children||[]);
      });
      apply(scene.objects||[]);
    });
    // Also update the prefab itself
    const i=p.prefabs.findIndex(x=>x._pid===pf._pid);
    if(i>=0)p.prefabs[i]=structuredClone(pf);
  });
  const [modal,setModal]=useState(null);
  const [expData,setExpData]=useState(null);
  const [showDocs,setShowDocs]=useState(false);
  const [gizmoMode,setGizmoMode]=useState("translate");
  const [gizmoSpace,setGizmoSpace]=useState("world"); // 'world' | 'local'
  const [pivotMode,setPivotMode]=useState("individual"); // 'individual' | 'median'
  const [viewLighting,setViewLighting]=useState("unlit"); // 'unlit' | 'shaded'
  const [snapEnabled,setSnapEnabled]=useState(false);
  const [snapSize,setSnapSize]=useState(0.5);

  // ── Layout / Vista state ─────────────────────────────────────
  const [layout,setLayout]=useState({
    showOutliner:true, showInspector:true, showNavigator:true,
    outlinerWidth:200, inspectorWidth:240, navigatorHeight:148,
  });
  const setL=useCallback(patch=>setLayout(l=>({...l,...patch})),[]);

  const [lang,setLang]=useState('en');
  // Keep _lang global in sync for the t() helper
  useEffect(()=>{ _lang=lang; },[lang]);

  // ── Undo / Redo history ──────────────────────────────────────
  const historyRef=useRef({past:[],future:[]});
  const clipboardRef=useRef(null);
  const MAX_HISTORY=50;
  // Always-current ref so saveProject doesn't capture stale closure
  const projectRef=useRef(project);
  useEffect(()=>{projectRef.current=project;},[project]);

  const mut=useCallback(fn=>setProject(p=>{
    const np=structuredClone(p);
    fn(np);
    // Push old state to past, clear future
    const h=historyRef.current;
    h.past.push(p);
    if(h.past.length>MAX_HISTORY) h.past.shift();
    h.future=[];
    return np;
  }),[]);

  const undo=useCallback(()=>{
    const h=historyRef.current;
    if(!h.past.length) return;
    setProject(cur=>{
      h.future.push(cur);
      return h.past.pop();
    });
  },[]);

  const redo=useCallback(()=>{
    const h=historyRef.current;
    if(!h.future.length) return;
    setProject(cur=>{
      h.past.push(cur);
      return h.future.pop();
    });
  },[]);
  const AS=p=>p.scenes.find(s=>s.id===p.activeSceneId);

  const addObj=type=>mut(p=>{
    const o=mkObject(null,type);
    if(type==="model")   o.components.model=mkModel();
    if(type==="light")   o.components.light=mkLight();
    if(type==="sound")   o.components.sound=mkSound();
    if(type==="camera")  o.components.camera=mkCameraComp();
    AS(p).objects.push(o);
  });
  const delObj=id=>{mut(p=>{const s=AS(p);const toDelete=selIds.length>1&&selIds.includes(id)?selIds:[id];const del=new Set(toDelete);const remove=arr=>arr.filter(o=>{if(del.has(o.id))return false;o.children=remove(o.children||[]);return true;});s.objects=remove(s.objects);});if(selIds.includes(id))selectOne(null);};
  const toggleVis=id=>mut(p=>mutObj(AS(p).objects,id,o=>{o.visible=!o.visible;}));
  const renameObj=(id,name)=>mut(p=>mutObj(AS(p).objects,id,o=>{o.name=name;}));

  const addComp=(oid,key)=>{
    // Apply to all selected objects if multi-select, otherwise just to oid
    const targets=selIds.length>1?selIds:[oid];
    mut(p=>targets.forEach(tid=>mutObj(AS(p).objects,tid,o=>{if(!o.components[key]){
      if(key==="model")    o.components.model=mkModel();
      else if(key==="camera")   o.components.camera=mkCameraComp();
      else if(key==="animator") o.components.animator=mkAnimator();
      else if(key==="light")    o.components.light=mkLight();
      else if(key==="sound")    o.components.sound=mkSound();
      else if(key==="script")   o.components.script=mkScript();
    }})));
  };
  const remComp=(oid,key)=>{if(key==="transform")return;mut(p=>mutObj(AS(p).objects,oid,o=>{delete o.components[key];}));};

  const updComp=(oid,ck,fld,val)=>{
    if(oid==="__dir")    {mut(p=>{AS(p).modelsDir=ck;});return;}
    if(oid==="__texdir") {mut(p=>{AS(p).texturesDir=ck;});return;}
    if(oid==="__bg")     {mut(p=>{AS(p).background[ck]=fld;});return;}
    if(oid==="__psm")    {mut(p=>{AS(p).psm=ck;});return;}
    if(oid==="__debug")  {mut(p=>{AS(p).showDebugInfo=ck;});return;}
    if(oid==="__psmcc")  {mut(p=>{AS(p).psmCustomColor=ck;});return;}
    if(oid==="__psmcd")  {mut(p=>{AS(p).psmCustomDepth=ck;});return;}
    if(oid==="__alphaEnable") {mut(p=>{AS(p).alphaTestEnable=ck;});return;}
    if(oid==="__alphaMethod") {mut(p=>{AS(p).alphaTestMethod=ck;});return;}
    if(oid==="__alphaRef")    {mut(p=>{AS(p).alphaTestRef=ck;});return;}
    if(oid==="__alphaFail")   {mut(p=>{AS(p).alphaTestFail=ck;});return;}
    if(oid==="__alphaBlend")  {mut(p=>{AS(p).pixelAlphaBlend=ck;});return;}
    if(oid==="__cam_pos"){mut(p=>{AS(p).camera&&(AS(p).camera.position[ck]=fld);});return;}
    if(oid==="__cam_tgt"){mut(p=>{AS(p).camera&&(AS(p).camera.target[ck]=fld);});return;}
    if(oid==="__cam_fov"){mut(p=>{AS(p).camera&&(AS(p).camera.fov=ck);});return;}
    if(oid==="__exportEnabled"){const tgts=selIds.length>1?selIds:[ck];mut(p=>tgts.forEach(tid=>mutObj(AS(p).objects,tid,o=>{o.exportEnabled=val;})));return;}
    if(oid==="__ctxEnabled")   {const tgts=selIds.length>1?selIds:[ck];mut(p=>tgts.forEach(tid=>mutObj(AS(p).objects,tid,o=>{o.ctxEnabled=val;})));return;}
    // For regular object component updates: apply to all selected if multi-select
    const targets=selIds.length>1?selIds:[oid];
    mut(p=>targets.forEach(tid=>mutObj(AS(p).objects,tid,o=>{
      if(!o.components[ck])return;
      if(fld&&typeof fld==="string"&&fld.includes(".")){
        const pts=fld.split(".");let ref=o.components[ck];
        for(let i=0;i<pts.length-1;i++)ref=ref[pts[i]];
        ref[pts[pts.length-1]]=val;
      }else if(fld!==undefined&&fld!==""){
        o.components[ck][fld]=val;
      }else{
        o.components[ck]=val;
      }
    })));
  };

  // Update transform from gizmo drag
  const updateTransform=useCallback((id,transform)=>{
    mut(p=>{
      mutObj(p.scenes.find(s=>s.id===p.activeSceneId).objects, id, o=>{
        o.components.transform.position=transform.position;
        o.components.transform.rotation=transform.rotation;
        o.components.transform.scale=transform.scale;
        // If this is a light, update direction from the rotated quaternion
        if(transform.lightDir && o.components.light){
          o.components.light.direction=transform.lightDir;
        }
      });
    });
  },[mut]);

  const addScene=name=>{mut(p=>{
    // Copy settings from the currently active scene
    const src=p.scenes.find(s=>s.id===p.activeSceneId);
    const ns=mkScene(name);
    if(src){
      ns.modelsDir=src.modelsDir; ns.texturesDir=src.texturesDir;
      ns.background={...src.background};
      ns.psm=src.psm; ns.psmCustomColor=src.psmCustomColor; ns.psmCustomDepth=src.psmCustomDepth;
      ns.showDebugInfo=src.showDebugInfo;
      ns.alphaTestEnable=src.alphaTestEnable; ns.alphaTestMethod=src.alphaTestMethod;
      ns.alphaTestRef=src.alphaTestRef; ns.alphaTestFail=src.alphaTestFail;
      ns.pixelAlphaBlend=src.pixelAlphaBlend;
    }
    p.scenes.push(ns);
  });setModal(null);};
  const renameScene=(id,name)=>{if(name.trim())mut(p=>{const s=p.scenes.find(x=>x.id===id);if(s)s.name=name.trim();});};
  const renameProject=(name)=>{if(name.trim())mut(p=>{p.name=name.trim();});};
  const deleteScene=(id)=>{mut(p=>{if(p.scenes.length<=1)return;p.scenes=p.scenes.filter(s=>s.id!==id);if(p.activeSceneId===id)p.activeSceneId=p.scenes[0].id;});};
  const switchScene=id=>{mut(p=>{p.activeSceneId=id;});selectOne(null);setSelUIId(null);};
  const linkScene=id=>mut(p=>{const s=AS(p);if(!s.linkedScenes.includes(id))s.linkedScenes.push(id);});
  const unlinkScene=id=>mut(p=>{const s=AS(p);s.linkedScenes=s.linkedScenes.filter(x=>x!==id);});
  const addUIEl=type=>mut(p=>{const s=AS(p);if(!s.uiElements)s.uiElements=[];s.uiElements.push(mkUIEl(type));});
  const updUIEl=(id,f,v)=>mut(p=>{const el=(AS(p).uiElements||[]).find(e=>e.id===id);if(el)el[f]=v;});
  const delUIEl=id=>{mut(p=>{const s=AS(p);s.uiElements=(s.uiElements||[]).filter(e=>e.id!==id);});if(selUIId===id)setSelUIId(null);};
  const dupUIEl=id=>{mut(p=>{const s=AS(p);const src=(s.uiElements||[]).find(e=>e.id===id);if(!src)return;const c={...structuredClone(src),id:uid(),x:src.x+10,y:src.y+10};s.uiElements.push(c);setTimeout(()=>setSelUIId(c.id),0);});};
  const toggleUIEl=id=>mut(p=>{const el=(AS(p).uiElements||[]).find(e=>e.id===id);if(el)el.visible=!el.visible;});
  const renameUIEl=(id,name)=>mut(p=>{const el=(AS(p).uiElements||[]).find(e=>e.id===id);if(el)el.name=name;});
  // Save prefab — overwrite if same name already exists
  const savePrefab=()=>{if(!selObj)return;mut(p=>{
    const c=structuredClone(selObj);
    const existing=p.prefabs.findIndex(x=>x.name===selObj.name);
    if(existing>=0){ c._pid=p.prefabs[existing]._pid; p.prefabs[existing]=c; }
    else { c._pid=uid(); p.prefabs.push(c); }
  });};

  // Refresh: sync uploaded files from a folder pick — add new, remove deleted
  const refreshFiles=async(files)=>{
    const KNOWN_DIRS=new Set(['3dmodels','textures','sounds','fonts','scripts']);
    const freshMap=new Map();
    for(const file of files){
      const parts=(file.webkitRelativePath||file.name).split('/');
      const shortName=file.name;
      const ext=shortName.split('.').pop().toLowerCase();
      const inKnownDir=parts.slice(0,-1).some(p=>KNOWN_DIRS.has(p.toLowerCase()));
      if(!inKnownDir) continue;
      if(shortName.endsWith('.athena.json')) continue;
      const cat=ext==='js'?'other':categorize(shortName);
      const entry={id:uid(),name:shortName,cat,size:file.size,folder:parts[parts.length-2]||''};
      try{
        if(cat==='models'){
          if(ext==='obj') entry.content=await readFileAs(file,'text');
          else { entry.dataUrl=await readFileAs(file,'dataUrl'); entry.isGltf=true; }
        } else if(cat==='textures'||cat==='sounds') entry.dataUrl=await readFileAs(file,'dataUrl');
        else if(cat==='fonts') entry.dataUrl=await readFileAs(file,'dataUrl');
        else if(ext==='js'){ entry.content=await readFileAs(file,'text'); entry.cat='scripts'; }
      }catch(e){console.warn('Could not read',shortName,e);}
      freshMap.set(shortName,entry);
    }
    setUploadedFiles(prev=>{
      // Keep existing entries whose files still exist (preserve id/content for already-loaded)
      const kept=prev.filter(f=>freshMap.has(f.name)).map(f=>{
        const fresh=freshMap.get(f.name);
        // Update content if file was modified (different size)
        return fresh.size!==f.size ? {...f,...fresh,id:f.id} : f;
      });
      // Add new files not in prev
      const keptNames=new Set(kept.map(f=>f.name));
      const added=[...freshMap.values()].filter(f=>!keptNames.has(f.name));
      return [...kept,...added];
    });
  };

  // Make a unique name: if "Player" already exists, use "Player_2", "Player_3", ...
  const makeUniqueName=(baseName, objects)=>{
    const allNames=new Set();
    const collect=(objs)=>objs.forEach(o=>{allNames.add(o.name);collect(o.children||[]);});
    collect(objects);
    if(!allNames.has(baseName)) return baseName;
    let i=2;
    while(allNames.has(`${baseName}_${i}`)) i++;
    return `${baseName}_${i}`;
  };

  const instPrefab=pf=>mut(p=>{
    const c=structuredClone(pf);
    c.id=uid(); delete c._pid;
    c.name=makeUniqueName(pf.name, AS(p).objects);
    const reId=(obj)=>{ obj.id=uid(); (obj.children||[]).forEach(reId); };
    reId(c);
    AS(p).objects.push(c);
  });

  const duplicateObj=useCallback(()=>{
    const targets=selObjs.length>0?selObjs:(selObj?[selObj]:[]);
    if(!targets.length) return;
    const newIds=[];
    mut(p=>{
      targets.forEach(src=>{
        const c=structuredClone(src);
        const reId=(obj)=>{ obj.id=uid(); (obj.children||[]).forEach(reId); };
        reId(c);
        c.name=makeUniqueName(src.name, AS(p).objects);
        AS(p).objects.push(c);
        newIds.push(c.id);
      });
    });
    setTimeout(()=>{
      if(newIds.length===1) selectOne(newIds[0]);
      else { setSelIds(newIds); setSelId(newIds[newIds.length-1]); }
    },0);
  },[selObjs,selObj,mut]);

  const delPrefab=pid=>mut(p=>{p.prefabs=p.prefabs.filter(x=>x._pid!==pid);});
  const handleExport=()=>{setExpData(generateProject(project,uploadedFiles));setModal("export");};

  // Keyboard shortcuts
  useEffect(()=>{
    const handler=(e)=>{
      const tag=e.target.tagName;
      const isInput=tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT";

      // Ctrl combos — work even in inputs
      if(e.ctrlKey&&e.key==='z'&&!e.shiftKey){ e.preventDefault(); undo(); return; }
      if(e.ctrlKey&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){ e.preventDefault(); redo(); return; }
      if(e.ctrlKey&&e.key==='d'&&!e.shiftKey){ e.preventDefault(); duplicateObj(); return; }
      if(e.ctrlKey&&e.key==='s'){ e.preventDefault(); saveProject(); return; }
      if(e.ctrlKey&&e.key==='c'&&!isInput){
        const targets=selObjs.length>0?selObjs:(selObj?[selObj]:[]);
        if(targets.length){ clipboardRef.current=structuredClone(targets); }
        return;
      }
      if(e.ctrlKey&&e.key==='v'&&!isInput){
        if(clipboardRef.current&&clipboardRef.current.length){
          const newIds=[];
          mut(p=>{
            clipboardRef.current.forEach(src=>{
              const c=structuredClone(src);
              const reId=(obj)=>{ obj.id=uid(); (obj.children||[]).forEach(reId); };
              reId(c);
              c.name=makeUniqueName(src.name, AS(p).objects);
              // Keep exact same transform as original
              AS(p).objects.push(c);
              newIds.push(c.id);
            });
          });
          setTimeout(()=>{
            if(newIds.length===1) selectOne(newIds[0]);
            else{ setSelIds(newIds); setSelId(newIds[newIds.length-1]); }
          },0);
        }
        return;
      }

      if(isInput) return; // below shortcuts only when not typing

      // Delete/Backspace — delete selected object or UI element
      if(e.key==='Delete'||e.key==='Backspace'){
        if(selId) delObj(selId);
        else if(selUIId) delUIEl(selUIId);
        return;
      }

      if(e.key==='q'||e.key==='Q'){ setGizmoMode('translate'); }
      else if(e.key==='w'||e.key==='W'){ setGizmoMode('rotate'); }
      else if(e.key==='e'||e.key==='E'){ setGizmoMode('scale'); }
      else if(e.key==='Tab'){ e.preventDefault(); setGizmoSpace(s=>s==='world'?'local':'world'); }
      else if(e.key==='l'||e.key==='L'){ setViewLighting(v=>v==='unlit'?'shaded':'unlit'); }
      else if(e.key==='g'||e.key==='G'){ setSnapEnabled(v=>!v); }
      else if(e.key==='h'||e.key==='H'){ if(selId) toggleVis(selId); }
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[undo,redo,duplicateObj,saveProject,selObjs,selObj,selId,selUIId,toggleVis,mut,delObj,delUIEl]);

  // ── Save / Load project JSON ─────────────────────────────────
  const saveProject=()=>{
    const current=projectRef.current; // always latest, not stale closure
    const stripFile=({content:_c,dataUrl:_d,...rest})=>rest;
    const slim={
      ...current,
      _filesMeta: uploadedFilesRef.current.map(stripFile),
    };
    const json=JSON.stringify(slim,null,2);
    try{
      // Use data: URI with base64 to avoid InvalidCharacterError with special chars
      const b64=btoa(unescape(encodeURIComponent(json)));
      const a=document.createElement("a");
      a.href=`data:application/json;base64,${b64}`;
      a.download=`${project.name||'project'}.athena.json`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }catch(err){
      // Fallback: copy to clipboard
      navigator.clipboard?.writeText(json).then(()=>alert("JSON copied to clipboard (download unavailable in sandbox)"))
        .catch(()=>alert("Save failed: "+err.message));
    }
  };
  const loadJsonOnly=async(file)=>{
    // Load just the JSON — keeps currently loaded assets, only replaces project structure
    readFileAs(file,'text').then(text=>{
      try{
        const data=JSON.parse(text);
        setProject(data);
        setSelId(null); setSelUIId(null);
      }catch(err){alert("Failed to parse JSON: "+err.message);}
    }).catch(err=>alert("Failed to read file: "+err.message));
  };
  const loadProject=async(files)=>{
    // files = Array of File objects from a folder picked with webkitdirectory

    // 1. Read ALL relevant files in one pass (including the JSON)
    const KNOWN_DIRS = new Set(['3dmodels','textures','sounds','fonts','scripts']);
    const loadedMap=new Map(); // name → entry
    let jsonText=null;

    for(const file of files){
      const parts = (file.webkitRelativePath||file.name).split('/');
      const shortName=file.name;
      const ext=shortName.split('.').pop().toLowerCase();

      // Only accept .athena.json — avoid picking up package.json, tsconfig.json, etc.
      if(shortName.endsWith('.athena.json')){
        if(!jsonText){
          try{ jsonText=await readFileAs(file,'text'); }catch(e){console.warn('Could not read JSON',e);}
        }
        continue;
      }

      // Only load assets from known subdirs
      const inKnownDir = parts.slice(0,-1).some(p=>KNOWN_DIRS.has(p.toLowerCase()));
      if(!inKnownDir) continue;

      const cat = ext==='js' ? 'other' : categorize(shortName);
      const entry={id:uid(),name:shortName,cat,size:file.size,folder:parts[parts.length-2]||''};
      try{
        if(cat==='models'){
          if(ext==='obj') entry.content=await readFileAs(file,'text');
          else { entry.dataUrl=await readFileAs(file,'dataUrl'); entry.isGltf=true; }
        }
        else if(cat==='textures'||cat==='sounds') entry.dataUrl=await readFileAs(file,'dataUrl');
        else if(cat==='fonts') entry.dataUrl=await readFileAs(file,'dataUrl');
        else if(ext==='js') { entry.content=await readFileAs(file,'text'); entry.cat='scripts'; }
      }catch(e){console.warn('Could not read',shortName,e);}
      loadedMap.set(shortName, entry);
    }

    if(!jsonText){
      // No .athena.json found — still apply the loaded assets so they appear in Navigator
      setSelId(null); setSelUIId(null);
      setUploadedFiles([...loadedMap.values()]);
      return;
    }

    let data;
    try{ data=JSON.parse(jsonText); }
    catch(err){alert("Failed to parse project JSON: "+err.message);return;}

    const loaded=[...loadedMap.values()];

    // Apply assets first, then JSON in the next tick so React doesn't batch them
    // and the project state is guaranteed to reflect the JSON, not the default
    setSelId(null); setSelUIId(null);
    setUploadedFiles(loaded);
    setTimeout(()=>setProject(data), 0);
  };

  // Deduplicate by filename
  const handleUpload=f=>setUploadedFiles(prev=>prev.find(x=>x.name===f.name)?prev:[...prev,f]);
  const handleDeleteFile=id=>setUploadedFiles(prev=>prev.filter(f=>f.id!==id));

  return(
    <div style={{width:"100%",height:"100vh",background:T.bg0,display:"flex",flexDirection:"column",fontFamily:"'Courier New',monospace",color:T.text,overflow:"hidden"}}>
      <MenuBar project={project} onAdd={addObj} onExport={handleExport}
        onNewScene={()=>setModal("newScene")} onSwitchScene={switchScene}
        onSaveProject={saveProject} onLoadProject={loadProject} onLoadJson={loadJsonOnly} onDocs={()=>setShowDocs(true)}
        onUndo={undo} onRedo={redo}
        canUndo={historyRef.current.past.length>0}
        canRedo={historyRef.current.future.length>0}
        lang={lang} onLangChange={l=>{setLang(l);_lang=l;}}
        onRenameScene={renameScene} onDeleteScene={deleteScene} onRenameProject={renameProject}
        layout={layout} onLayout={setL}/>

      <div style={{flex:1,display:"flex",overflow:"hidden",minHeight:0}}>
        {layout.showOutliner&&<Outliner objects={activeScene?.objects||[]} uiElements={activeScene?.uiElements||[]}
          sel={selId} selIds={selIds} selUI={selUIId}
          onSel={selectOne} onToggleSel={toggleSel} onRangeSel={rangeSel} onSelUI={id=>{setSelUIId(id);if(id)setTab("ui");}}
          onDel={delObj} onDelUI={delUIEl}
          onToggle={toggleVis} onToggleUI={toggleUIEl}
          onRename={renameObj} onRenameUI={renameUIEl}
          onAdd={addObj} onAddUI={addUIEl}
          onSavePrefab={savePrefab} onDuplicate={duplicateObj}
          width={layout.outlinerWidth}/>}

        <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden",minWidth:0}}>
          {/* Tab bar + gizmo toolbar */}
          <div style={{display:"flex",background:T.bg2,borderBottom:`1px solid ${T.border}`,flexShrink:0,alignItems:"stretch"}}>
            {[["viewport","⬡ Viewport 3D"],["ui","⬢ UI Editor"]].map(([t,lb])=>
              <button key={t} onClick={()=>{setTab(t);if(t==="viewport")setSelUIId(null);else setSelId(null);}}
                style={sBtn({borderRadius:0,border:"none",borderRight:`1px solid ${T.border}`,padding:"6px 16px",
                  background:tab===t?T.bg1:"transparent",color:tab===t?T.accent:T.textMuted,
                  fontWeight:tab===t?700:400,borderBottom:tab===t?`2px solid ${T.accent}`:"2px solid transparent",
                  letterSpacing:"0.06em",textTransform:"uppercase",fontSize:10})}>
                {lb}
              </button>)}
            {tab==="viewport"&&<div style={{display:"flex",alignItems:"center",gap:4,padding:"0 8px",marginLeft:"auto",borderLeft:`1px solid ${T.border}`}}>
              <button onClick={()=>setSnapEnabled(v=>!v)} title="Toggle grid snap [G]"
                style={sBtn({padding:"3px 9px",fontSize:10,fontWeight:700,
                  background:snapEnabled?T.warn+"22":"transparent",
                  color:snapEnabled?T.warn:T.textMuted,
                  border:snapEnabled?`1px solid ${T.warn}`:`1px solid transparent`})}>
                ⊞ {snapEnabled?"Snap":"Snap"}
              </button>
              {snapEnabled&&<select value={snapSize} onChange={e=>setSnapSize(parseFloat(e.target.value))}
                style={sInp({width:52,padding:"2px 4px",fontSize:10})}>
                {[0.1,0.25,0.5,1,2,5,10].map(v=><option key={v} value={v}>{v}</option>)}
              </select>}
              <button onClick={()=>setViewLighting(v=>v==='unlit'?'shaded':'unlit')} title="Toggle lighting [L]"
                style={sBtn({padding:"3px 9px",fontSize:10,fontWeight:700,
                  background:viewLighting==='shaded'?T.accent+"22":"transparent",
                  color:viewLighting==='shaded'?T.accent:T.textMuted,
                  border:viewLighting==='shaded'?`1px solid ${T.accent}`:`1px solid transparent`})}>
                {viewLighting==='shaded'?'☀ Shaded':'◑ Unlit'}
              </button>
            </div>}
            {tab==="viewport"&&selId&&<div style={{display:"flex",alignItems:"center",gap:2,padding:"0 8px",borderLeft:`1px solid ${T.border}`}}>
              <span style={{color:T.textMuted,fontSize:10,marginRight:4}}>GIZMO:</span>
              {[["Q","translate","Move [Q]",T.success],["W","rotate","Rotate [W]",T.warn],["E","scale","Scale [E]",T.accent]].map(([k,m,lb,col])=>
                <button key={m} onClick={()=>setGizmoMode(m)} title={lb}
                  style={sBtn({padding:"3px 9px",fontWeight:700,fontSize:11,
                    background:gizmoMode===m?col+"22":"transparent",
                    color:gizmoMode===m?col:T.textMuted,
                    border:gizmoMode===m?`1px solid ${col}`:`1px solid transparent`})}>
                  {k}
                </button>)}
              <div style={{width:1,background:T.border,alignSelf:"stretch",margin:"4px 4px"}}/>
              <button onClick={()=>setGizmoSpace(s=>s==='world'?'local':'world')}
                title={`${gizmoSpace==='world'?'Switch to Local':'Switch to World'} [Tab]`}
                style={sBtn({padding:"3px 9px",fontSize:10,fontWeight:700,
                  background:gizmoSpace==='local'?T.accent+"22":"transparent",
                  color:gizmoSpace==='local'?T.accent:T.textMuted,
                  border:gizmoSpace==='local'?`1px solid ${T.accent}`:`1px solid transparent`})}>
                {gizmoSpace==='world'?'W':'L'}
              </button>
              {selIds.length>1&&<>
                <div style={{width:1,background:T.border,alignSelf:"stretch",margin:"4px 2px"}}/>
                <button onClick={()=>setPivotMode(m=>m==='individual'?'median':'individual')}
                  title={pivotMode==='individual'?'Pivot: Individual Origins (click for Median)':'Pivot: Median Center (click for Individual)'}
                  style={sBtn({padding:"3px 9px",fontSize:10,fontWeight:700,
                    background:pivotMode==='median'?T.warn+"22":"transparent",
                    color:pivotMode==='median'?T.warn:T.textMuted,
                    border:pivotMode==='median'?`1px solid ${T.warn}`:`1px solid transparent`})}>
                  {pivotMode==='median'?'⊕':'⊙'}
                </button>
              </>}
            </div>}
          </div>
          {tab==="viewport"
            ?<Viewport3D sceneData={activeScene} selectedId={selId} selectedIds={selIds}
                onSelect={selectOne} onToggleSel={toggleSel}
                onUpdateTransform={updateTransform} uploadedFiles={uploadedFiles} gizmoMode={gizmoMode} gizmoSpace={gizmoSpace} pivotMode={pivotMode}
                viewLighting={viewLighting} onToggleLighting={setViewLighting}
                snapEnabled={snapEnabled} snapSize={snapSize}/>
            :<UIEditor scene={activeScene} sel={selUIId} onSelect={setSelUIId} onAdd={addUIEl} onUpdate={updUIEl} onDelete={delUIEl} onDuplicate={dupUIEl} uploadedFiles={uploadedFiles}/>}
        </div>

        {layout.showInspector&&<Inspector selObj={tab==="viewport"?selObj:null} selUI={tab==="ui"?selUI:null}
          selObjs={tab==="viewport"?selObjs:null} selIds={tab==="viewport"?selIds:null}
          onUpdComp={updComp} onAddComp={id=>{selectOne(id);setModal("addComp");}} onRemComp={remComp}
          onUpdUI={updUIEl} scenes={project.scenes} activeSceneId={project.activeSceneId}
          onLink={linkScene} onUnlink={unlinkScene} activeScene={activeScene} uploadedFiles={uploadedFiles}
          selFileId={navSelFile} width={layout.inspectorWidth}/>}
      </div>

      {layout.showNavigator&&<Navigator uploadedFiles={uploadedFiles} onRefresh={refreshFiles} onDeleteFile={handleDeleteFile}
        prefabs={project.prefabs} onSavePrefab={savePrefab} onInstPrefab={instPrefab} onDelPrefab={delPrefab}
        selFileId={navSelFile} onSelFile={selNavFile}
        selPrefabId={navSelPrefab} onSelPrefab={selNavPrefab}
        tab={navTab} onTab={setNavTab} height={layout.navigatorHeight}/>}

      <StatusBar activeScene={activeScene} selObj={selObj} selIds={selIds} selUI={selUI} tab={tab}
        uploadedFiles={uploadedFiles} clipboardCount={clipboardRef.current?.length||0}/>

      {modal==="addComp"&&<AddCompModal onAdd={key=>addComp(selId,key)} onClose={()=>setModal(null)}/>}
      {modal==="newScene"&&<NewSceneModal onCreate={addScene} onClose={()=>setModal(null)}/>}
      {modal==="export"&&expData&&<ExportModal exportData={expData} onClose={()=>setModal(null)}/>}
      {showDocs&&<DocsModal onClose={()=>setShowDocs(false)} lang={lang}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AthenaEditor/>);
</script>
</body>
</html>
